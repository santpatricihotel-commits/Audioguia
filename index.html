<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sant Patrici · Experiencia Inmersiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== FONT ELYSIAN ===== */
@font-face {
  font-family: 'Elysian';
  src: url('fonts/Elysian-Regular.woff2') format('woff2'),
       url('fonts/Elysian-Regular.woff') format('woff'),
       url('fonts/Elysian-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Elysian';
  src: url('fonts/Elysian-Bold.woff2') format('woff2'),
       url('fonts/Elysian-Bold.woff') format('woff'),
       url('fonts/Elysian-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --verde:#0C7B6B;
  --verde-oscuro:#095C50;
  --verde-brand:#0a7c6a;
  --dorado:#C8A951;
  --crema:#FAF8F3;
  --texto:#2D2D2D;
  --gris:#8A8A8A;
  --radius:16px;
}
body{font-family:'Montserrat',sans-serif;background:var(--crema);color:var(--texto);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,.font-elysian{font-family:'Elysian','Cormorant Garamond','Georgia',serif}

/* ===== SCREENS ===== */
.screen{display:none;min-height:100vh;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* ===== WELCOME ===== */
#welcome{
  background:linear-gradient(160deg,#0a6e60,#0C7B6B 40%,#10957f);
  color:#fff;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem 1.5rem;
  position:relative;
  overflow:hidden;
}
#welcome::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 20px);
  pointer-events:none; /* ← FIX: permite clicks a través */
}

.welcome-logo{
  width:180px;
  height:auto;
  margin-bottom:1.8rem;
  position:relative;
  z-index:1;
  filter:brightness(0) invert(1); /* fuerza blanco si el logo no es blanco */
}
/* Si tu logo YA es blanco sobre transparente, quita el filter */

#welcome .subtitle{
  font-family:'Montserrat',sans-serif;
  font-size:.7rem;
  letter-spacing:5px;
  opacity:.7;
  margin-bottom:2.5rem;
  font-weight:400;
  position:relative;
  z-index:1;
}
.lang-selector{
  display:flex;
  gap:.5rem;
  margin-bottom:2.5rem;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
  z-index:1;
}
.lang-btn{
  padding:.55rem 1rem;
  border:1.5px solid rgba(255,255,255,.45);
  border-radius:8px;
  background:transparent;
  color:#fff;
  font-family:'Montserrat',sans-serif;
  font-size:.78rem;
  font-weight:600;
  cursor:pointer;
  letter-spacing:1px;
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
.lang-btn:hover,.lang-btn.active{
  background:#fff;
  color:var(--verde);
  border-color:#fff;
}
.start-btn{
  background:#fff;
  color:var(--verde);
  border:none;
  padding:1rem 2.5rem;
  border-radius:50px;
  font-family:'Montserrat',sans-serif;
  font-size:.82rem;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  position:relative;
  z-index:1;
}
.start-btn:active{transform:scale(.97)}

/* ===== STOP LIST ===== */
#stoplist{background:var(--crema)}
.list-header{
  background:var(--verde);
  color:#fff;
  padding:1.2rem 1.5rem 2rem;
  text-align:center;
  border-radius:0 0 24px 24px;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.header-lang{
  font-size:.65rem;
  background:rgba(255,255,255,.12);
  padding:.35rem .8rem;
  border-radius:20px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
  font-family:'Montserrat',sans-serif;
  letter-spacing:1px;
  transition:background .2s;
}
.header-lang:active{background:rgba(255,255,255,.2)}
.list-logo{height:50px;width:auto;filter:brightness(0) invert(1)}
.list-header h2{font-size:1.5rem;margin-bottom:.15rem;letter-spacing:2px}
.list-header .sub{font-size:.65rem;letter-spacing:3px;opacity:.7}
.stops-container{padding:1rem 1.2rem 2rem}
.stop-card{
  display:flex;align-items:center;background:#fff;border-radius:var(--radius);
  padding:1rem 1.2rem;margin-bottom:.75rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.05);
  -webkit-tap-highlight-color:transparent;
}
.stop-card:active{transform:scale(.98);box-shadow:0 2px 12px rgba(0,0,0,.1)}
.stop-num{
  width:44px;height:44px;border-radius:50%;background:var(--verde);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;
  flex-shrink:0;margin-right:1rem;
}
.stop-num.sub{font-size:.75rem;background:var(--dorado)}
.stop-info{flex:1}
.stop-cat{font-size:.6rem;letter-spacing:2px;color:var(--gris);font-weight:600;margin-bottom:.15rem}
.stop-title{font-family:'Elysian','Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;color:var(--texto)}
.stop-arrow{color:var(--verde);font-size:1.2rem;margin-left:.5rem;opacity:.5}

/* ===== STOP DETAIL ===== */
#detail{background:var(--crema)}
.detail-header{
  background:linear-gradient(160deg,#0a6e60,#0C7B6B 40%,#10957f);
  color:#fff;padding:1.2rem 1.5rem 2.5rem;text-align:center;
  position:relative;border-radius:0 0 24px 24px;
}
.detail-header::before{
  content:'';position:absolute;inset:0;border-radius:0 0 24px 24px;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.02) 10px,rgba(255,255,255,.02) 20px);
  pointer-events:none;
}
.detail-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;position:relative;z-index:1}
.back-btn{
  width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);
  background:transparent;color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.back-btn:active{background:rgba(255,255,255,.1)}
.detail-logo{height:28px;width:auto;filter:brightness(0) invert(1);position:relative;z-index:1}
.detail-header .num{
  width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;
  font-size:1.2rem;font-weight:700;position:relative;z-index:1;
  font-family:'Montserrat',sans-serif;
}
.detail-header .cat{font-size:.65rem;letter-spacing:3px;opacity:.7;margin-bottom:.3rem;position:relative;z-index:1}
.detail-header h2{font-family:'Elysian','Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;line-height:1.3;position:relative;z-index:1}
.detail-body{padding:1.2rem}

/* Player */
.player-card{background:#fff;border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1rem}
.player-controls{display:flex;align-items:center;justify-content:center;gap:1.2rem;margin-bottom:1rem}
.ctrl-btn{
  width:42px;height:42px;border-radius:50%;border:none;background:transparent;
  color:var(--gris);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .2s;
}
.ctrl-btn:active{background:rgba(0,0,0,.05)}
.play-btn{
  width:64px;height:64px;border-radius:50%;border:none;background:var(--verde);
  color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:transform .15s;
}
.play-btn:active{transform:scale(.93)}
.speed-btn{
  font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:600;
  color:var(--verde);border:1.5px solid var(--verde);width:auto;padding:0 .7rem;
}
.progress-wrap{display:flex;align-items:center;gap:.6rem}
.progress-time{font-size:.7rem;color:var(--gris);min-width:32px;font-variant-numeric:tabular-nums}
.progress-bar{flex:1;height:4px;background:#e8e8e8;border-radius:4px;overflow:hidden;cursor:pointer;position:relative}
.progress-fill{height:100%;background:var(--verde);border-radius:4px;width:0%;transition:width .1s linear}
.audio-error{background:#FFF8E1;border:1px solid #FFE082;border-radius:12px;padding:.8rem 1rem;text-align:center;margin-top:.8rem;font-size:.8rem;color:#F9A825;display:none}
.audio-error span{display:block;font-size:.7rem;color:var(--gris);margin-top:.2rem}
.audio-error b{color:var(--verde)}

/* Transcription */
.transcription-toggle{
  width:100%;background:none;border:none;border-top:1px solid #eee;
  padding:1rem 0;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.75rem;
  font-weight:600;letter-spacing:2px;color:var(--gris);
}
.transcription-toggle .arrow{transition:transform .3s}
.transcription-toggle.open .arrow{transform:rotate(180deg)}
.transcription-text{max-height:0;overflow:hidden;transition:max-height .4s ease;font-size:.85rem;line-height:1.8;color:#555}
.transcription-text.open{max-height:3000px}
.transcription-inner{padding:.5rem 0 1rem}

/* Next button */
.next-btn{
  display:flex;align-items:center;justify-content:center;width:100%;
  background:var(--verde);color:#fff;border:none;padding:1.1rem;
  border-radius:var(--radius);font-family:'Montserrat',sans-serif;
  font-size:.78rem;font-weight:700;letter-spacing:2px;cursor:pointer;
  margin-top:.5rem;transition:background .2s;gap:.5rem;
}
.next-btn:active{background:var(--verde-oscuro)}

/* ===== END SCREEN ===== */
#endscreen{
  background:linear-gradient(160deg,#0a6e60,#0C7B6B 40%,#10957f);
  color:#fff;align-items:center;justify-content:center;text-align:center;padding:2rem;
  position:relative;
}
#endscreen::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 20px);
  pointer-events:none;
}
#endscreen>div{position:relative;z-index:1}
#endscreen h2{font-family:'Elysian','Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:1rem;font-weight:400}
#endscreen p{opacity:.8;line-height:1.7;margin-bottom:2rem;max-width:320px}
.restart-btn{
  background:#fff;color:var(--verde);border:none;padding:1rem 2.5rem;
  border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.8rem;
  font-weight:700;letter-spacing:2px;cursor:pointer;
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease both}
</style>
</head>
<body>

<!-- ===================== WELCOME ===================== -->
<div id="welcome" class="screen active">
  <img src="img/logo-santpatrici.png" alt="Sant Patrici" class="welcome-logo" id="welcomeLogo">
  <p class="subtitle" id="welcomeSub">EXPERIENCIA INMERSIVA</p>
  <div class="lang-selector" id="langSelector"></div>
  <button class="start-btn" id="startBtn"></button>
</div>

<!-- ===================== STOP LIST ===================== -->
<div id="stoplist" class="screen">
  <div class="list-header">
    <div class="header-top">
      <button class="header-lang" id="changeLangBtn"></button>
      <img src="img/logo-santpatrici.png" alt="Sant Patrici" class="list-logo">
    </div>
    <p class="sub" id="listSub"></p>
  </div>
  <div class="stops-container" id="stopsContainer"></div>
</div>

<!-- ===================== STOP DETAIL ===================== -->
<div id="detail" class="screen">
  <div class="detail-header">
    <div class="detail-top">
      <button class="back-btn" id="backBtn">←</button>
      <img src="img/logo-santpatrici.png" alt="Sant Patrici" class="detail-logo">
      <span style="width:40px"></span>
    </div>
    <div class="num" id="detailNum"></div>
    <p class="cat" id="detailCat"></p>
    <h2 id="detailTitle"></h2>
  </div>
  <div class="detail-body">
    <div class="player-card">
      <div class="player-controls">
        <button class="ctrl-btn" id="rewindBtn" title="-10s">↺</button>
        <button class="play-btn" id="playBtn">▶</button>
        <button class="ctrl-btn speed-btn" id="speedBtn">1x</button>
      </div>
      <div class="progress-wrap">
        <span class="progress-time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-time" id="totalTime">0:00</span>
      </div>
      <div class="audio-error" id="audioError">
        <span id="audioErrorMsg"></span>
      </div>
    </div>
    <button class="transcription-toggle" id="transToggle">
      <span id="transLabel"></span>
      <span class="arrow">▼</span>
    </button>
    <div class="transcription-text" id="transText">
      <div class="transcription-inner" id="transInner"></div>
    </div>
    <button class="next-btn" id="nextBtn"></button>
  </div>
</div>

<!-- ===================== END SCREEN ===================== -->
<div id="endscreen" class="screen">
  <div>
    <div style="font-size:3rem;margin-bottom:1rem">🌅</div>
    <h2 id="endTitle"></h2>
    <p id="endText"></p>
    <button class="restart-btn" id="restartBtn"></button>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
// ============================================================
//  LANGUAGES & TRANSLATIONS
// ============================================================
const LANGS = ['es','cat','en','fr','de'];
const LANG_LABELS = {es:'ES', cat:'CAT', en:'EN', fr:'FR', de:'DE'};

const UI = {
  es: {
    subtitle:'EXPERIENCIA INMERSIVA',
    start:'COMENZAR VISITA',
    readTrans:'LEER TRANSCRIPCIÓN',
    next:'SIGUIENTE',
    errAudio:'Audio no encontrado.',
    errSub:'Añade el archivo MP3 en la carpeta',
    endTitle:'Gracias por su visita',
    endText:'Esperamos que haya disfrutado del recorrido por Sant Patrici. Llévese consigo el aroma de los jardines, el sabor del vino y la calma de esta tierra.',
    restart:'VOLVER AL INICIO',
    changeLang:'IDIOMA'
  },
  cat: {

    readTrans:'LLEGIR TRANSCRIPCIÓ',
    next:'SEGÜENT',
    errAudio:'Àudio no trobat.',
    errSub:'Afegiu el fitxer MP3 a la carpeta',
    endTitle:'Gràcies per la vostra visita',
    endText:'Esperem que hàgiu gaudit del recorregut per Sant Patrici. Emporteu-vos l\'aroma dels jardins, el gust del vi i la calma d\'aquesta terra.',
    restart:'TORNAR A L\'INICI',
    changeLang:'IDIOMA'
  },
  en: {
    subtitle:'IMMERSIVE EXPERIENCE',
    start:'START TOUR',
    readTrans:'READ TRANSCRIPTION',
    next:'NEXT',
    errAudio:'Audio not found.',

    endTitle:'Thank you for your visit',
    endText:'We hope you enjoyed the tour of Sant Patrici. Take with you the scent of the gardens, the taste of the wine and the calm of this land.',
    restart:'BACK TO START',
    changeLang:'LANGUAGE'
  },
  fr: {

    start:'COMMENCER LA VISITE',
    readTrans:'LIRE LA TRANSCRIPTION',

    errSub:'Ajoutez le fichier MP3 dans le dossier',
    endTitle:'Merci de votre visite',
    endText:'Nous espérons que vous avez apprécié la visite de Sant Patrici. Emportez avec vous le parfum des jardins, le goût du vin et le calme de cette terre.',
    restart:'RETOUR AU DÉBUT',

  },
  de: {
    subtitle:'IMMERSIVES ERLEBNIS',
    start:'TOUR STARTEN',
    readTrans:'TRANSKRIPTION LESEN',
    next:'WEITER',
    errAudio:'Audio nicht gefunden.',
    errSub:'Fügen Sie die MP3-Datei im Ordner hinzu',
    endTitle:'Vielen Dank für Ihren Besuch',
    endText:'Wir hoffen, Sie haben die Tour durch Sant Patrici genossen. Nehmen Sie den Duft der Gärten, den Geschmack des Weins und die Ruhe dieses Landes mit.',
    restart:'ZURÜCK ZUM ANFANG',
    changeLang:'SPRACHE'
  }
};

// ============================================================
//  STOPS DATA (all languages)
// ============================================================
const STOPS = {
  es: [
    { id:'punto-1', num:'1', cat:'EDIFICIO PRINCIPAL', title:'La casa que construyó el amor prohibido',
      nextLabel:'Jardín de las Esculturas',
      trans:'Bienvenidos a Sant Patrici. Esta casa señorial del siglo XIX guarda entre sus muros una historia de amor prohibido. Fue construida por una familia de la nobleza menorquina que buscaba un refugio lejos de las miradas del puerto de Mahón. La leyenda cuenta que el joven heredero se enamoró de una campesina del pueblo vecino, y que los pasillos de esta casa fueron testigos de sus encuentros secretos. Observen la fachada: los muros de piedra de marés, típicos de Menorca, mantienen el interior fresco en verano y cálido en invierno. Las contraventanas verdes no son solo decorativas; protegen del sol y de la tramontana. Cada detalle de esta construcción responde a siglos de sabiduría mediterránea.'
    },
    { id:'punto-2', num:'2', cat:'JARDÍN DE LAS ESCULTURAS', title:'Piedra viva entre jardines',
      nextLabel:'El Olivo Milenario',
      trans:'Se encuentran ahora en el jardín de las esculturas, donde el arte contemporáneo dialoga con la naturaleza menorquina. Cada pieza que ven ha sido seleccionada para complementar el paisaje, no para competir con él. Fíjense en cómo las formas orgánicas de las esculturas imitan las rocas erosionadas por el viento que encontrarán en la costa norte de la isla. Este jardín alberga especies autóctonas de Menorca: lavanda silvestre, romero, tomillo y acebuches. El aroma que les envuelve es el perfume auténtico de la isla. Menorca fue declarada Reserva de la Biosfera por la UNESCO en 1993, y en Sant Patrici nos comprometemos a preservar ese legado natural.'
    },
    { id:'punto-2b', num:'2b', cat:'EL OLIVO MILENARIO', title:'Testigo de mil años',
      nextLabel:'Los Viñedos',
      trans:'Deténganse un momento ante este olivo. Tiene más de mil años de vida. Estaba aquí antes de que existiera esta finca, antes de que los británicos dominaran Menorca, incluso antes de que los árabes le dieran su nombre a Mahón. Sus raíces han resistido temporales de tramontana, sequías interminables y el paso de civilizaciones enteras. En Menorca, el olivo es mucho más que un árbol: es un símbolo de resistencia y de conexión con la tierra. Toquen su tronco si lo desean. Esas formas retorcidas cuentan la historia de mil inviernos y mil primaveras. En Sant Patrici utilizamos su aceite en nuestra cocina, cerrando así un círculo que comenzó hace un milenio.'
    },
    { id:'punto-3', num:'3', cat:'LOS VIÑEDOS', title:'Vino con alma menorquina',
      nextLabel:'La Bodega',
      trans:'Bienvenidos a los viñedos de Sant Patrici. Lo que ven ante ustedes son cepas de variedades autóctonas: Manto Negro y Malvasía. La viticultura en Menorca tiene una historia fascinante. Durante la dominación británica en el siglo XVIII, los ingleses incentivaron la producción de vino, y Menorca llegó a exportar sus caldos al Reino Unido. Con el tiempo, la tradición se perdió casi por completo. En Sant Patrici hemos recuperado esa herencia. El suelo calcáreo y la brisa marina dan a nuestros vinos un carácter mineral único. La tramontana, ese viento del norte que a veces parece implacable, en realidad fortalece las cepas y concentra los sabores en la uva. Naturaleza y paciencia: esos son los ingredientes de nuestro vino.'
    },
    { id:'punto-4', num:'4', cat:'LA BODEGA', title:'Donde el silencio crea',
      nextLabel:'Piscina y Mirador',
      trans:'Entren con cuidado, sus ojos necesitarán un momento para adaptarse a la penumbra. Esta bodega fue excavada en la roca natural de la finca, y mantiene una temperatura constante de dieciséis grados durante todo el año, sin necesidad de climatización artificial. Aquí es donde el mosto se transforma en vino. Observen las barricas de roble francés: cada una contiene el trabajo de un año entero de cuidado en el viñedo. El silencio que perciben no es casual. El vino necesita calma para evolucionar. En esta oscuridad perfumada, el tiempo trabaja a su propio ritmo. Si al salir de aquí desean probar el resultado, en nuestra terraza podrán degustar una selección de vinos de la finca.'
    },
    { id:'punto-5', num:'5', cat:'PISCINA Y MIRADOR', title:'El horizonte como lienzo',
      nextLabel:'Terraza de Despedida',
      trans:'Desde este punto tienen ante ustedes una de las panorámicas más espectaculares del interior de Menorca. En días claros pueden distinguir el perfil de Monte Toro, el punto más alto de la isla con solo trescientos cincuenta y siete metros, pero suficiente para dominar toda Menorca. El paisaje que contemplan es un mosaico de campos divididos por muros de piedra seca, una técnica declarada Patrimonio de la Humanidad por la UNESCO. Esos muros no son simples divisiones: protegen los cultivos del viento, crean microclimas y sirven de refugio a decenas de especies. La piscina a sus pies fue diseñada para integrarse en este paisaje, como si fuera una balsa de riego tradicional. Tómense su tiempo. Este horizonte lleva aquí miles de años y seguirá aquí cuando se marchen.'
    },
    { id:'punto-6', num:'6', cat:'TERRAZA DE DESPEDIDA', title:'Lo que te llevas de Sant Patrici',
      nextLabel:null,
      trans:'Han llegado al final del recorrido. Esta terraza es nuestro lugar favorito al atardecer, cuando la luz dorada tiñe los campos y el silencio se llena de grillos y cigarras. Sant Patrici no es solo un hotel: es un trozo vivo de Menorca. Cada piedra, cada cepa, cada rama de este olivo milenario cuenta una historia que ahora también es la suya. Antes de marcharse, les invitamos a sentarse un momento, quizás con una copa de vino de la finca, y dejar que este lugar se imprima en su memoria. En Menorca decimos que quien bebe agua de un pozo de la isla siempre vuelve. Nosotros preferimos pensar que quien vive un atardecer en Sant Patrici nunca se marcha del todo. Gracias por su visita.'
    }
  ],
  cat: [
    { id:'punto-1', num:'1', cat:'EDIFICI PRINCIPAL', title:'La casa que va construir l\'amor prohibit',
      nextLabel:'Jardí de les Escultures',
      trans:'Benvinguts a Sant Patrici. Aquesta casa senyorial del segle XIX guarda entre els seus murs una història d\'amor prohibit. Va ser construïda per una família de la noblesa menorquina que cercava un refugi lluny de les mirades del port de Maó. La llegenda explica que el jove hereu es va enamorar d\'una pagesa del poble veí, i que els passadissos d\'aquesta casa van ser testimonis de les seves trobades secretes. Observeu la façana: els murs de pedra de marès, típics de Menorca, mantenen l\'interior fresc a l\'estiu i càlid a l\'hivern. Les persianes verdes no són només decoratives; protegeixen del sol i de la tramuntana. Cada detall d\'aquesta construcció respon a segles de saviesa mediterrània.'
    },
    { id:'punto-2', num:'2', cat:'JARDÍ DE LES ESCULTURES', title:'Pedra viva entre jardins',
      nextLabel:'L\'Olivera Mil·lenària',
      trans:'Us trobeu ara al jardí de les escultures, on l\'art contemporani dialoga amb la natura menorquina. Cada peça que veieu ha estat seleccionada per complementar el paisatge, no per competir-hi. Fixeu-vos en com les formes orgàniques de les escultures imiten les roques erosionades pel vent que trobareu a la costa nord de l\'illa. Aquest jardí acull espècies autòctones de Menorca: espígol silvestre, romaní, farigola i ullastres. L\'aroma que us envolta és el perfum autèntic de l\'illa. Menorca va ser declarada Reserva de la Biosfera per la UNESCO el 1993, i a Sant Patrici ens comprometem a preservar aquest llegat natural.'
    },
    { id:'punto-2b', num:'2b', cat:'L\'OLIVERA MIL·LENÀRIA', title:'Testimoni de mil anys',
      nextLabel:'Les Vinyes',
      trans:'Atureu-vos un moment davant d\'aquesta olivera. Té més de mil anys de vida. Era aquí abans que existís aquesta finca, abans que els britànics dominessin Menorca, fins i tot abans que els àrabs donessin el seu nom a Maó. Les seves arrels han resistit temporals de tramuntana, sequeres interminables i el pas de civilitzacions senceres. A Menorca, l\'olivera és molt més que un arbre: és un símbol de resistència i de connexió amb la terra. Toqueu el seu tronc si ho desitgeu. Aquestes formes retorçades expliquen la història de mil hiverns i mil primaveres. A Sant Patrici utilitzem el seu oli a la nostra cuina, tancant així un cercle que va començar fa un mil·lenni.'
    },
    { id:'punto-3', num:'3', cat:'LES VINYES', title:'Vi amb ànima menorquina',
      nextLabel:'El Celler',
      trans:'Benvinguts a les vinyes de Sant Patrici. El que veieu davant vostre són ceps de varietats autòctones: Manto Negro i Malvasia. La viticultura a Menorca té una història fascinant. Durant la dominació britànica al segle XVIII, els anglesos van incentivar la producció de vi, i Menorca va arribar a exportar els seus vins al Regne Unit. Amb el temps, la tradició es va perdre gairebé completament. A Sant Patrici hem recuperat aquesta herència. El sòl calcari i la brisa marina donen als nostres vins un caràcter mineral únic. La tramuntana, aquell vent del nord que de vegades sembla implacable, en realitat enforteix els ceps i concentra els sabors al raïm. Natura i paciència: aquests són els ingredients del nostre vi.'
    },
    { id:'punto-4', num:'4', cat:'EL CELLER', title:'On el silenci crea',
      nextLabel:'Piscina i Mirador',
      trans:'Entreu amb compte, els vostres ulls necessitaran un moment per adaptar-se a la penombra. Aquest celler va ser excavat a la roca natural de la finca i manté una temperatura constant de setze graus durant tot l\'any, sense necessitat de climatització artificial. Aquí és on el most es transforma en vi. Observeu les bótes de roure francès: cadascuna conté el treball d\'un any sencer de cura a la vinya. El silenci que percebeu no és casual. El vi necessita calma per evolucionar. En aquesta foscor perfumada, el temps treballa al seu propi ritme. Si en sortir d\'aquí desitgeu tastar el resultat, a la nostra terrassa podreu degustar una selecció de vins de la finca.'
    },
    { id:'punto-5', num:'5', cat:'PISCINA I MIRADOR', title:'L\'horitzó com a llenç',
      nextLabel:'Terrassa de Comiat',
      trans:'Des d\'aquest punt teniu davant vostre una de les panoràmiques més espectaculars de l\'interior de Menorca. En dies clars podeu distingir el perfil del Monte Toro, el punt més alt de l\'illa amb només tres-cents cinquanta-set metres, però suficient per dominar tota Menorca. El paisatge que contempleu és un mosaic de camps dividits per parets de pedra seca, una tècnica declarada Patrimoni de la Humanitat per la UNESCO. Aquells murs no són simples divisions: protegeixen els conreus del vent, creen microclimes i serveixen de refugi a desenes d\'espècies. La piscina als vostres peus va ser dissenyada per integrar-se en aquest paisatge. Preneu-vos el vostre temps. Aquest horitzó fa milers d\'anys que és aquí i seguirà aquí quan marxeu.'
    },
    { id:'punto-6', num:'6', cat:'TERRASSA DE COMIAT', title:'El que us emporteu de Sant Patrici',
      nextLabel:null,
      trans:'Heu arribat al final del recorregut. Aquesta terrassa és el nostre lloc preferit a la posta de sol, quan la llum daurada tenyeix els camps i el silenci s\'omple de grills i cigales. Sant Patrici no és només un hotel: és un tros viu de Menorca. Cada pedra, cada cep, cada branca d\'aquesta olivera mil·lenària explica una història que ara també és la vostra. Abans de marxar, us convidem a seure un moment, potser amb una copa de vi de la finca, i deixar que aquest lloc s\'imprimeixi en la vostra memòria. A Menorca diuen que qui beu aigua d\'un pou de l\'illa sempre hi torna. Nosaltres preferim pensar que qui viu una posta de sol a Sant Patrici no marxa mai del tot. Gràcies per la vostra visita.'
    }
  ],
  en: [
    { id:'punto-1', num:'1', cat:'MAIN BUILDING', title:'The house that forbidden love built',
      nextLabel:'Sculpture Garden',
      trans:'Welcome to Sant Patrici. This stately nineteenth-century house holds within its walls a story of forbidden love. It was built by a noble Menorcan family seeking refuge far from the prying eyes of Mahón harbour. Legend has it that the young heir fell in love with a peasant girl from the neighbouring village, and that the hallways of this house witnessed their secret encounters. Notice the façade: the marés sandstone walls, typical of Menorca, keep the interior cool in summer and warm in winter. The green shutters are not merely decorative; they protect against the sun and the tramontana wind. Every detail of this construction reflects centuries of Mediterranean wisdom.'
    },
    { id:'punto-2', num:'2', cat:'SCULPTURE GARDEN', title:'Living stone among gardens',
      nextLabel:'The Millennial Olive Tree',
      trans:'You are now in the sculpture garden, where contemporary art converses with Menorcan nature. Each piece you see has been chosen to complement the landscape, not to compete with it. Notice how the organic shapes of the sculptures mimic the wind-eroded rocks found along the island\'s northern coast. This garden is home to native Menorcan species: wild lavender, rosemary, thyme and wild olive trees. The fragrance that surrounds you is the authentic perfume of the island. Menorca was declared a UNESCO Biosphere Reserve in 1993, and at Sant Patrici we are committed to preserving that natural legacy.'
    },
    { id:'punto-2b', num:'2b', cat:'THE MILLENNIAL OLIVE TREE', title:'Witness to a thousand years',
      nextLabel:'The Vineyards',
      trans:'Pause for a moment before this olive tree. It is over a thousand years old. It was here before this estate existed, before the British ruled Menorca, even before the Arabs gave Mahón its name. Its roots have withstood tramontana storms, endless droughts and the passage of entire civilisations. In Menorca, the olive tree is far more than a tree: it is a symbol of resilience and connection to the land. Touch its trunk if you wish. Those twisted forms tell the story of a thousand winters and a thousand springs. At Sant Patrici we use its oil in our kitchen, closing a circle that began a millennium ago.'
    },
    { id:'punto-3', num:'3', cat:'THE VINEYARDS', title:'Wine with a Menorcan soul',
      nextLabel:'The Cellar',
      trans:'Welcome to the Sant Patrici vineyards. Before you are vines of indigenous varieties: Manto Negro and Malvasía. Viticulture in Menorca has a fascinating history. During British rule in the eighteenth century, the English encouraged wine production, and Menorca even exported its wines to the United Kingdom. Over time, the tradition was almost entirely lost. At Sant Patrici we have revived that heritage. The chalky soil and sea breeze give our wines a unique mineral character. The tramontana, that northern wind that can seem relentless, actually strengthens the vines and concentrates the flavours in the grape. Nature and patience: those are the ingredients of our wine.'
    },
    { id:'punto-4', num:'4', cat:'THE CELLAR', title:'Where silence creates',
      nextLabel:'Pool & Viewpoint',
      trans:'Step inside carefully; your eyes will need a moment to adjust to the dimness. This cellar was carved from the estate\'s natural rock and maintains a constant temperature of sixteen degrees all year round, with no need for artificial climate control. This is where grape must becomes wine. Observe the French oak barrels: each one holds an entire year\'s work of vineyard care. The silence you perceive is no accident. Wine needs calm to evolve. In this perfumed darkness, time works at its own pace. If you wish to taste the result after leaving here, you can enjoy a selection of estate wines on our terrace.'
    },
    { id:'punto-5', num:'5', cat:'POOL & VIEWPOINT', title:'The horizon as canvas',
      nextLabel:'Farewell Terrace',
      trans:'From this spot you have before you one of the most spectacular panoramas of inland Menorca. On clear days you can make out the profile of Monte Toro, the island\'s highest point at just three hundred and fifty-seven metres, yet enough to command views of all Menorca. The landscape you contemplate is a mosaic of fields divided by dry-stone walls, a technique declared a UNESCO World Heritage. Those walls are not mere boundaries: they protect crops from the wind, create microclimates and provide shelter for dozens of species. The pool at your feet was designed to blend into this landscape, as if it were a traditional irrigation pond. Take your time. This horizon has been here for thousands of years and will remain long after you leave.'
    },
    { id:'punto-6', num:'6', cat:'FAREWELL TERRACE', title:'What you take with you from Sant Patrici',
      nextLabel:null,
      trans:'You have reached the end of the tour. This terrace is our favourite spot at sunset, when golden light bathes the fields and the silence fills with crickets and cicadas. Sant Patrici is not just a hotel: it is a living piece of Menorca. Every stone, every vine, every branch of that millennial olive tree tells a story that is now yours too. Before you go, we invite you to sit for a moment, perhaps with a glass of estate wine, and let this place imprint itself on your memory. In Menorca they say that whoever drinks water from an island well always returns. We prefer to think that whoever lives a sunset at Sant Patrici never truly leaves. Thank you for your visit.'
    }
  ],
  fr: [
    { id:'punto-1', num:'1', cat:'BÂTIMENT PRINCIPAL', title:'La maison que l\'amour interdit a bâtie',
      nextLabel:'Jardin des Sculptures',
      trans:'Bienvenue à Sant Patrici. Cette demeure seigneuriale du XIXe siècle renferme entre ses murs une histoire d\'amour interdit. Elle fut construite par une famille de la noblesse minorquine cherchant un refuge loin des regards du port de Mahón. La légende raconte que le jeune héritier tomba amoureux d\'une paysanne du village voisin, et que les couloirs de cette maison furent témoins de leurs rencontres secrètes. Observez la façade : les murs en pierre de marès, typiques de Minorque, gardent l\'intérieur frais en été et chaud en hiver. Les volets verts ne sont pas simplement décoratifs ; ils protègent du soleil et de la tramontane. Chaque détail de cette construction témoigne de siècles de sagesse méditerranéenne.'
    },
    { id:'punto-2', num:'2', cat:'JARDIN DES SCULPTURES', title:'Pierre vivante parmi les jardins',
      nextLabel:'L\'Olivier Millénaire',
      trans:'Vous vous trouvez maintenant dans le jardin des sculptures, où l\'art contemporain dialogue avec la nature minorquine. Chaque œuvre que vous voyez a été choisie pour compléter le paysage, non pour rivaliser avec lui. Remarquez comment les formes organiques des sculptures imitent les rochers érodés par le vent que l\'on trouve sur la côte nord de l\'île. Ce jardin abrite des espèces autochtones de Minorque : lavande sauvage, romarin, thym et oliviers sauvages. Le parfum qui vous enveloppe est l\'arôme authentique de l\'île. Minorque a été déclarée Réserve de biosphère par l\'UNESCO en 1993, et à Sant Patrici nous nous engageons à préserver cet héritage naturel.'
    },
    { id:'punto-2b', num:'2b', cat:'L\'OLIVIER MILLÉNAIRE', title:'Témoin de mille ans',
      nextLabel:'Les Vignobles',
      trans:'Arrêtez-vous un instant devant cet olivier. Il a plus de mille ans. Il était là avant que ce domaine n\'existe, avant que les Britanniques ne dominent Minorque, même avant que les Arabes ne donnent son nom à Mahón. Ses racines ont résisté aux tempêtes de tramontane, aux sécheresses interminables et au passage de civilisations entières. À Minorque, l\'olivier est bien plus qu\'un arbre : c\'est un symbole de résistance et de lien avec la terre. Touchez son tronc si vous le souhaitez. Ces formes torsadées racontent l\'histoire de mille hivers et mille printemps. À Sant Patrici, nous utilisons son huile dans notre cuisine, bouclant ainsi un cycle commencé il y a un millénaire.'
    },
    { id:'punto-3', num:'3', cat:'LES VIGNOBLES', title:'Du vin à l\'âme minorquine',
      nextLabel:'La Cave',
      trans:'Bienvenue dans les vignobles de Sant Patrici. Ce que vous voyez devant vous sont des ceps de variétés autochtones : Manto Negro et Malvasía. La viticulture à Minorque possède une histoire fascinante. Sous la domination britannique au XVIIIe siècle, les Anglais encouragèrent la production de vin, et Minorque exporta même ses crus vers le Royaume-Uni. Avec le temps, la tradition se perdit presque entièrement. À Sant Patrici, nous avons fait revivre cet héritage. Le sol calcaire et la brise marine confèrent à nos vins un caractère minéral unique. La tramontane, ce vent du nord qui peut sembler implacable, renforce en réalité les ceps et concentre les saveurs dans le raisin. La nature et la patience : voilà les ingrédients de notre vin.'
    },
    { id:'punto-4', num:'4', cat:'LA CAVE', title:'Là où le silence crée',
      nextLabel:'Piscine et Belvédère',
      trans:'Entrez avec précaution ; vos yeux auront besoin d\'un instant pour s\'adapter à la pénombre. Cette cave a été creusée dans la roche naturelle du domaine et maintient une température constante de seize degrés toute l\'année, sans climatisation artificielle. C\'est ici que le moût se transforme en vin. Observez les barriques de chêne français : chacune contient le travail d\'une année entière de soins au vignoble. Le silence que vous percevez n\'est pas un hasard. Le vin a besoin de calme pour évoluer. Dans cette obscurité parfumée, le temps travaille à son propre rythme. Si vous souhaitez goûter le résultat en sortant d\'ici, notre terrasse propose une sélection de vins du domaine.'
    },
    { id:'punto-5', num:'5', cat:'PISCINE ET BELVÉDÈRE', title:'L\'horizon comme toile',
      nextLabel:'Terrasse d\'Adieu',
      trans:'Depuis ce point, vous avez devant vous l\'un des panoramas les plus spectaculaires de l\'intérieur de Minorque. Par temps clair, vous pouvez distinguer le profil du Monte Toro, point culminant de l\'île à seulement trois cent cinquante-sept mètres, mais suffisant pour dominer toute Minorque. Le paysage que vous contemplez est une mosaïque de champs délimités par des murs de pierre sèche, une technique classée au patrimoine mondial de l\'UNESCO. Ces murs ne sont pas de simples clôtures : ils protègent les cultures du vent, créent des microclimats et servent de refuge à des dizaines d\'espèces. La piscine à vos pieds a été conçue pour s\'intégrer dans ce paysage. Prenez votre temps. Cet horizon est là depuis des milliers d\'années et sera encore là quand vous partirez.'
    },
    { id:'punto-6', num:'6', cat:'TERRASSE D\'ADIEU', title:'Ce que vous emportez de Sant Patrici',
      nextLabel:null,
      trans:'Vous êtes arrivés à la fin du parcours. Cette terrasse est notre endroit préféré au coucher du soleil, quand la lumière dorée baigne les champs et que le silence se remplit de grillons et de cigales. Sant Patrici n\'est pas seulement un hôtel : c\'est un morceau vivant de Minorque. Chaque pierre, chaque cep, chaque branche de cet olivier millénaire raconte une histoire qui est désormais aussi la vôtre. Avant de partir, nous vous invitons à vous asseoir un moment, peut-être avec un verre de vin du domaine, et à laisser ce lieu s\'imprimer dans votre mémoire. À Minorque, on dit que celui qui boit l\'eau d\'un puits de l\'île revient toujours. Nous préférons penser que celui qui vit un coucher de soleil à Sant Patrici ne part jamais vraiment. Merci de votre visite.'
    }
  ],
  de: [
    { id:'punto-1', num:'1', cat:'HAUPTGEBÄUDE', title:'Das Haus, das die verbotene Liebe erbaute',
      nextLabel:'Skulpturengarten',
      trans:'Willkommen in Sant Patrici. Dieses herrschaftliche Haus aus dem neunzehnten Jahrhundert birgt in seinen Mauern eine Geschichte verbotener Liebe. Es wurde von einer menorquinischen Adelsfamilie erbaut, die fernab der Blicke des Hafens von Mahón Zuflucht suchte. Die Legende erzählt, dass sich der junge Erbe in eine Bauerntochter aus dem Nachbardorf verliebte und dass die Flure dieses Hauses Zeugen ihrer geheimen Begegnungen wurden. Betrachten Sie die Fassade: Die Marés-Sandsteinmauern, typisch für Menorca, halten das Innere im Sommer kühl und im Winter warm. Die grünen Fensterläden sind nicht nur dekorativ; sie schützen vor Sonne und Tramontana-Wind. Jedes Detail dieser Konstruktion zeugt von Jahrhunderten mediterraner Weisheit.'
    },
    { id:'punto-2', num:'2', cat:'SKULPTURENGARTEN', title:'Lebendiger Stein zwischen Gärten',
      nextLabel:'Der Tausendjährige Olivenbaum',
      trans:'Sie befinden sich nun im Skulpturengarten, wo zeitgenössische Kunst mit der menorquinischen Natur in Dialog tritt. Jedes Werk, das Sie sehen, wurde ausgewählt, um die Landschaft zu ergänzen, nicht um mit ihr zu konkurrieren. Beachten Sie, wie die organischen Formen der Skulpturen die vom Wind erodierten Felsen nachahmen, die Sie an der Nordküste der Insel finden. Dieser Garten beherbergt einheimische Arten Menorcas: wilden Lavendel, Rosmarin, Thymian und wilde Olivenbäume. Der Duft, der Sie umgibt, ist das authentische Parfüm der Insel. Menorca wurde 1993 von der UNESCO zum Biosphärenreservat erklärt, und in Sant Patrici verpflichten wir uns, dieses Naturerbe zu bewahren.'
    },
    { id:'punto-2b', num:'2b', cat:'DER TAUSENDJÄHRIGE OLIVENBAUM', title:'Zeuge von tausend Jahren',
      nextLabel:'Die Weinberge',
      trans:'Halten Sie einen Moment inne vor diesem Olivenbaum. Er ist über tausend Jahre alt. Er stand hier, bevor dieses Anwesen existierte, bevor die Briten über Menorca herrschten, sogar bevor die Araber Mahón seinen Namen gaben. Seine Wurzeln haben Tramontana-Stürme, endlose Dürren und den Lauf ganzer Zivilisationen überstanden. Auf Menorca ist der Olivenbaum weit mehr als ein Baum: Er ist ein Symbol für Widerstandskraft und Verbundenheit mit dem Land. Berühren Sie seinen Stamm, wenn Sie möchten. Diese verschlungenen Formen erzählen die Geschichte von tausend Wintern und tausend Frühlingen. In Sant Patrici verwenden wir sein Öl in unserer Küche und schließen damit einen Kreislauf, der vor einem Jahrtausend begann.'
    },
    { id:'punto-3', num:'3', cat:'DIE WEINBERGE', title:'Wein mit menorquinischer Seele',
      nextLabel:'Der Weinkeller',
      trans:'Willkommen in den Weinbergen von Sant Patrici. Vor Ihnen sehen Sie Rebstöcke einheimischer Sorten: Manto Negro und Malvasía. Der Weinbau auf Menorca hat eine faszinierende Geschichte. Während der britischen Herrschaft im achtzehnten Jahrhundert förderten die Engländer die Weinproduktion, und Menorca exportierte seine Weine sogar ins Vereinigte Königreich. Im Laufe der Zeit ging die Tradition fast vollständig verloren. In Sant Patrici haben wir dieses Erbe wiederbelebt. Der kalkhaltige Boden und die Meeresbrise verleihen unseren Weinen einen einzigartigen mineralischen Charakter. Die Tramontana, jener Nordwind der manchmal unerbittlich erscheint, stärkt tatsächlich die Rebstöcke und konzentriert die Aromen in der Traube. Natur und Geduld: Das sind die Zutaten unseres Weins.'
    },
    { id:'punto-4', num:'4', cat:'DER WEINKELLER', title:'Wo die Stille erschafft',
      nextLabel:'Pool und Aussichtspunkt',
      trans:'Treten Sie vorsichtig ein; Ihre Augen brauchen einen Moment, um sich an das Halbdunkel zu gewöhnen. Dieser Keller wurde aus dem natürlichen Fels des Anwesens gehauen und hält das ganze Jahr über eine konstante Temperatur von sechzehn Grad, ohne künstliche Klimatisierung. Hier verwandelt sich Most in Wein. Betrachten Sie die Fässer aus französischer Eiche: Jedes enthält die Arbeit eines ganzen Jahres der Pflege im Weinberg. Die Stille, die Sie wahrnehmen, ist kein Zufall. Wein braucht Ruhe, um sich zu entwickeln. In dieser duftenden Dunkelheit arbeitet die Zeit in ihrem eigenen Rhythmus. Wenn Sie nach dem Verlassen das Ergebnis probieren möchten, können Sie auf unserer Terrasse eine Auswahl an Weinen des Anwesens genießen.'
    },
    { id:'punto-5', num:'5', cat:'POOL UND AUSSICHTSPUNKT', title:'Der Horizont als Leinwand',
      nextLabel:'Abschiedsterrasse',
      trans:'Von diesem Punkt aus haben Sie eines der spektakulärsten Panoramen des menorquinischen Hinterlands vor sich. An klaren Tagen können Sie das Profil des Monte Toro erkennen, des höchsten Punktes der Insel mit nur dreihundertsiebenundfünfzig Metern, aber ausreichend, um ganz Menorca zu überblicken. Die Landschaft, die Sie betrachten, ist ein Mosaik aus Feldern, die durch Trockensteinmauern geteilt werden, eine Technik die von der UNESCO zum Weltkulturerbe erklärt wurde. Diese Mauern sind nicht bloße Begrenzungen: Sie schützen die Kulturen vor Wind, schaffen Mikroklimate und bieten Dutzenden von Arten Unterschlupf. Der Pool zu Ihren Füßen wurde so gestaltet, dass er sich in diese Landschaft einfügt. Nehmen Sie sich Zeit. Dieser Horizont ist seit Tausenden von Jahren hier und wird noch hier sein, wenn Sie gegangen sind.'
    },
    { id:'punto-6', num:'6', cat:'ABSCHIEDSTERRASSE', title:'Was Sie von Sant Patrici mitnehmen',
      nextLabel:null,
      trans:'Sie haben das Ende der Tour erreicht. Diese Terrasse ist unser Lieblingsort bei Sonnenuntergang, wenn goldenes Licht die Felder taucht und die Stille sich mit Grillen und Zikaden füllt. Sant Patrici ist nicht nur ein Hotel: Es ist ein lebendiges Stück Menorca. Jeder Stein, jeder Rebstock, jeder Ast dieses tausendjährigen Olivenbaums erzählt eine Geschichte, die nun auch Ihre ist. Bevor Sie gehen, laden wir Sie ein, einen Moment Platz zu nehmen, vielleicht mit einem Glas Wein vom Anwesen, und diesen Ort in Ihre Erinnerung einzuprägen. Auf Menorca sagt man, wer Wasser aus einem Brunnen der Insel trinkt, kehrt immer zurück. Wir glauben lieber, dass wer einen Sonnenuntergang in Sant Patrici erlebt, nie ganz fortgeht. Vielen Dank für Ihren Besuch.'
    }
  ]
};

// ============================================================
//  APP STATE
// ============================================================
let lang = 'es';
let currentStop = 0;
let isPlaying = false;
let playbackRate = 1;
const audio = document.getElementById('audioEl');

// ============================================================
//  NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================
//  LANGUAGE
// ============================================================
function setLang(l) {
  lang = l;
  // Update button styles
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  // Update welcome texts
  document.getElementById('welcomeSub').textContent = UI[l].subtitle;
  document.getElementById('startBtn').textContent = UI[l].start;
}

// ============================================================
//  WELCOME INIT
// ============================================================
(function initWelcome() {
  const sel = document.getElementById('langSelector');
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-btn' + (l === lang ? ' active' : '');
    b.dataset.lang = l;
    b.textContent = LANG_LABELS[l];
    b.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setLang(l);
    });
    sel.appendChild(b);
  });
  document.getElementById('welcomeSub').textContent = UI[lang].subtitle;
  document.getElementById('startBtn').textContent = UI[lang].start;
  document.getElementById('startBtn').addEventListener('click', function() {
    renderStopList();
  });
})();

// ============================================================
//  STOP LIST
// ============================================================
function renderStopList() {
  const ui = UI[lang];
  const stops = STOPS[lang];
  document.getElementById('listSub').textContent = ui.subtitle;
  document.getElementById('changeLangBtn').textContent = '🌐 ' + ui.changeLang + ' (' + LANG_LABELS[lang] + ')';
  document.getElementById('changeLangBtn').onclick = () => { stopAudio(); showScreen('welcome'); };

  const c = document.getElementById('stopsContainer');
  c.innerHTML = '';
  stops.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'stop-card fade-in';
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="stop-num ${s.num.includes('b') ? 'sub' : ''}">${s.num}</div>
      <div class="stop-info">
        <div class="stop-cat">${s.cat}</div>
        <div class="stop-title">${s.title}</div>
      </div>
      <div class="stop-arrow">→</div>
    `;
    card.onclick = () => openStop(i);
    c.appendChild(card);
  });
  showScreen('stoplist');
}

// ============================================================
//  STOP DETAIL
// ============================================================
function openStop(index) {
  currentStop = index;
  const ui = UI[lang];
  const s = STOPS[lang][index];

  document.getElementById('detailNum').textContent = s.num;
  document.getElementById('detailCat').textContent = s.cat;
  document.getElementById('detailTitle').textContent = s.title;
  document.getElementById('transLabel').textContent = ui.readTrans;
  document.getElementById('transInner').textContent = s.trans;

  // Next button
  const nextBtn = document.getElementById('nextBtn');
  if (s.nextLabel) {
    nextBtn.style.display = 'flex';
    nextBtn.innerHTML = ui.next + ': ' + s.nextLabel + ' →';
    nextBtn.onclick = () => openStop(index + 1);
  } else {
    nextBtn.style.display = 'flex';
    nextBtn.innerHTML = ui.endTitle + ' 🌅';
    nextBtn.onclick = () => showEnd();
  }

  // Reset player
  resetPlayer();
  loadAudio(s.id);

  // Reset transcription
  document.getElementById('transToggle').classList.remove('open');
  document.getElementById('transText').classList.remove('open');

  showScreen('detail');
}

function showEnd() {
  const ui = UI[lang];
  document.getElementById('endTitle').textContent = ui.endTitle;
  document.getElementById('endText').textContent = ui.endText;
  document.getElementById('restartBtn').textContent = ui.restart;
  document.getElementById('restartBtn').onclick = () => showScreen('welcome');
  stopAudio();
  showScreen('endscreen');
}

// ============================================================
//  AUDIO PLAYER
// ============================================================
function loadAudio(id) {
  const errEl = document.getElementById('audioError');
  const errMsg = document.getElementById('audioErrorMsg');
  errEl.style.display = 'none';

  audio.src = 'audio/' + lang + '/' + id + '.mp3';
  audio.playbackRate = playbackRate;
  audio.load();

  audio.onerror = function() {
    errEl.style.display = 'block';
    errMsg.innerHTML = '⚠️ ' + UI[lang].errAudio + '<br><span>' + UI[lang].errSub + ' <b>audio/' + lang + '/</b></span>';
  };
}

function resetPlayer() {
  stopAudio();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('totalTime').textContent = '0:00';
  playbackRate = 1;
  document.getElementById('speedBtn').textContent = '1x';
}

function stopAudio() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
}

function togglePlay() {
  if (audio.error || !audio.src) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
  } else {
    audio.play().then(function() {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
    }).catch(function() {});
  }
}

function rewind10() {
  audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function cycleSpeed() {
  var speeds = [1, 1.5, 2];
  var i = (speeds.indexOf(playbackRate) + 1) % speeds.length;
  playbackRate = speeds[i];
  audio.playbackRate = playbackRate;
  document.getElementById('speedBtn').textContent = playbackRate + 'x';
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// Player events
audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  var pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', function() {
  document.getElementById('totalTime').textContent = fmtTime(audio.duration);
});

audio.addEventListener('ended', function() {
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
});

// Progress bar click
document.getElementById('progressBar').addEventListener('click', function(e) {
  if (!audio.duration) return;
  var rect = e.currentTarget.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// Button handlers
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('rewindBtn').addEventListener('click', rewind10);
document.getElementById('speedBtn').addEventListener('click', cycleSpeed);
document.getElementById('backBtn').addEventListener('click', function() {
  stopAudio();
  renderStopList();
});

// Transcription toggle
document.getElementById('transToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('transText').classList.toggle('open');
});
</script>

</body>
