Du jour au lendemain, Xini se retrouva avec les murs, mais plus rien dedans. Elle renvoya le jardinier. Elle acheta des poules, des cochons, deux vaches laitières. Et là où il y avait eu du marbre et de la musique, des animaux commencèrent à apparaître partout. Les vaches se frottaient contre les statues des quatre saisons. Les cochons dormaient là où l'on avait dansé. Xini apprit à traire, à faucher, à faire du fromage — un fromage blanc et salé qu'elle vendait dans les boutiques de Ferreries. La pauvreté la poussa à voler des légumes dans les fermes voisines pour survivre. Mais elle ne cessa jamais de marcher droite. Et toujours sur ses talons : à la fin, les mains abîmées par le travail, elle ne pouvait plus les enfiler seule. Elle marchait pieds nus jusqu'à chez son amie Rafela, ses chaussures dans un sac, et lui demandait de l'aider à les mettre. Toujours en talons.

Vingt-cinq ans, elle tint bon ici, toute seule. Sans se rendre. Sans partir. Comme si s'en aller aurait été trahir la mémoire de Fernando.

Elle mourut en octobre 1966, à 69 ans. Ses amies la trouvèrent dans la cuisine, assise sur une chaise, la tête sur la table. Sur sa tombe, au cimetière de Mahón, aucune pierre tombale ne rappelle son nom.

Ses frères arrivèrent de la péninsule, vendirent le peu qui avait de la valeur et brûlèrent le reste. Littéralement. Ils entassèrent matelas, portraits, tableaux, lettres, tapis, meubles — toute une vie — dans la cour, et y mirent le feu. Cendres et silence refermèrent l'histoire de Fernando et Xini.

Mais la terre se souvient.

Au fil des ans, ce domaine changea de mains, jusqu'à ce que quelqu'un y voie ce que Fernando y avait vu en 1917 : non pas une affaire, mais une possibilité. Ce que vous voyez aujourd'hui autour de vous — l'hôtel, la fromagerie, la cave, les vignobles — est un acte de résurrection. C'est la preuve qu'un lieu qui a connu l'amour, la décadence et l'abandon peut renaître et porter ses fruits. Des fruits qu'aujourd'hui, littéralement, vous allez pouvoir savourer.

Dirigez-vous maintenant vers la gauche, où vous trouverez la signalisation du point numéro deux. Un jardin qui parle en silence vous y attend.`},

{id:'punto-2',num:'2',cat:'JARDIN DES SCULPTURES',title:'Dix voix dans la spirale',nextLabel:'Les Sculptures une à une',
trans:`Vous venez d'entendre une histoire de feu. Les frères de Xini ont brûlé tout ce qui se trouvait dans ce domaine : les tableaux, les lettres, les meubles, la mémoire. Et pendant des années, il n'y eut rien ici. Seulement une terre muette.

Ce que vous avez maintenant devant vous est la réponse.

Avant de regarder les sculptures, je vous invite à regarder le sol. Observez la forme du chemin que vous allez emprunter. La voyez-vous ? C'est une spirale. Ce n'est pas une décoration : c'est un choix. Ce jardin, qui occupe plus de dix mille mètres carrés, a été dessiné par le paysagiste Josep Bosch Espelta, disciple du grand Nicolau Maria Rubió i Tudurí. Et Bosch a choisi la spirale parce que c'est la forme qu'adopte la vie. Elle est dans les galaxies, dans les coquilles des escargots, dans la double hélice de l'ADN. Si ce tracé vous rappelle quelque chose, c'est probablement le Musée Guggenheim de New York : le dessin de ce jardin s'inspire directement de la rampe hélicoïdale de Frank Lloyd Wright. En marchant sur ce sentier, vous allez parcourir cette même idée : le passage de l'être humain sur la Terre.

Ce qui s'est passé ici pour remplir ce lieu de voix fut extraordinaire. En mai 2003, Minorque célébrait ses dix ans en tant que Réserve de Biosphère, et pour marquer l'événement, on organisa le Premier Symposium International Hort Sant Patrici. Pendant vingt-cinq jours, quatorze artistes du monde entier — une Paraguayenne, un Italien, une Coréenne, un Égyptien, un Roumain, un Haïtien établi en Belgique... — ont vécu ensemble dans ce domaine. Ils ont mangé ensemble, débattu ensemble, travaillé la pierre ensemble. Et de cette cohabitation sont nées dix sculptures taillées dans le marbre de Carrare. Dix réponses différentes à une même question : quelle est la relation de l'être humain avec la nature ?

Au fil de votre promenade, vous les découvrirez. Vous verrez la fontaine de Nélida Mendoza, l'artiste paraguayenne, qui a utilisé l'eau comme matière vivante : l'eau tombe sur la pierre et la façonne lentement, tout comme le temps façonne la Terre. C'est la seule pièce qui ne se trouve pas ici dans le jardin ; vous la découvrirez au bord du lac, car son message avait besoin d'un autre décor.

Vous rencontrerez la Balance de Giacomo Santini, un très jeune sculpteur italien qui a voulu nous rappeler combien l'équilibre entre l'homme et la nature est fragile. Les mains que vous verrez sur la pièce sont bien réelles : ce sont des moulages de mains d'enfants venus pendant le symposium.

Et vous verrez la Terre de George Dan Istrate, le sculpteur roumain : une sphère parfaite fendue par une entaille nette. C'est l'intervention de l'homme. Si nous ne changeons pas de cap, la fracture sera irréversible.

Ainsi, sculpture après sculpture, ce jardin va vous parler. Écoutez-le. Chaque pièce est une lettre d'amour — ou d'avertissement — adressée à l'île qui nous accueille.

Prenez votre temps. Quand vous serez prêts, suivez la spirale jusqu'au point trois, là où la mémoire de cette terre devient liquide. Et si vous souhaitez découvrir chaque sculpture en détail, restez avec nous : nous allons parcourir les dix voix de ce jardin, une à une.`},

{id:'punto-2b',num:'2b',cat:'LES SCULPTURES UNE À UNE',title:'Marbre avec un nom',nextLabel:'Les Vignobles',
trans:Nélida Mendoza — Paraguay.
Commençons par celle qui n'est pas ici. L'œuvre de Nélida se trouve au bord du lac de l'hôtel, et il y a une raison profonde à cela : sa matière première n'est pas seulement la pierre, mais aussi l'eau. Nélida utilise l'eau comme un élément vivant qui transforme la sculpture au fil du temps. L'eau donne peu à peu forme à une fontaine qui représente la Terre. C'est une œuvre qui change, qui vieillit, qui respire. Voilà pourquoi elle devait se trouver là où l'eau règne.

Giacomo Santini — Italie.
Giacomo était à peine un jeune homme lorsqu'il est arrivé au symposium, mais son message était celui d'un sage. Sa « Balance » nous parle de l'équilibre fragile entre la force de la nature et celle de l'homme. Les mains que vous voyez sur la pièce ne sont pas inventées : ce sont des moulages réels de mains d'enfants ayant participé durant ces vingt-cinq jours. L'innocence soutenant le poids du monde.

Oliviero Bertolasso — Italie et Allemagne.
L'italo-allemand a choisi la figure humaine pour délivrer un message dérangeant. Son œuvre est figurative et délibérément pessimiste : elle nous confronte à l'avenir de la nature et à la responsabilité qui nous incombe dans sa préservation. Ce n'est pas une sculpture qui cherche à plaire ; elle cherche à déranger. Et c'est là que réside sa force.

Shin Myong-Ok — Corée.
L'artiste coréenne nous conduit sur le terrain spirituel. Sa sculpture évoque l'imposition des mains, ce geste universel qui, selon les cultures, peut signifier la guérison ou la destruction, la bénédiction ou la condamnation. Les formes que vous voyez suggèrent des mains ouvertes au-dessus de la nature. La question qu'elle laisse en suspens est puissante : sommes-nous en train de guérir la Terre ou de la rendre malade ?

Tristán Casamajor — Haïti, résidant en Belgique.
Tristán a créé un immense totem qui joue avec les éléments et prend le soleil pour protagoniste. C'est, littéralement, un cadran solaire : l'évolution naturelle de la Terre rythmée par la lumière. Si vous observez attentivement les formes du totem, vous y découvrirez des silhouettes qui rappellent le corps humain. Le temps de la nature et le temps de l'homme, fondus dans la même pierre.

Said Badr — Égypte.
L'Égyptien a conçu une œuvre verticale, presque monumentale, dédiée à célébrer la grandeur de la nature à Minorque. La verticalité n'est pas fortuite : c'est la terre qui se redresse, qui s'élève, qui réclame sa présence face à un être humain qui n'a tendance à regarder que devant lui. Said nous demande de lever les yeux.

George Dan Istrate — Roumanie.
C'est l'une des sculptures les plus saisissantes du jardin. Le jeune Roumain a taillé une sphère parfaite — la Terre — puis l'a fendue d'une entaille transversale nette. Cette incision, c'est l'intervention de l'homme : précise, froide, irréversible si nous n'agissons pas à temps. La perfection brisée. Un avertissement taillé dans le marbre de Carrare.

Toni Capó — Majorque.
Le Majorquin a travaillé le marbre pour la première fois à l'occasion de ce symposium, et il a choisi un thème qu'il connaît bien : la fragilité de l'être humain face à la dureté de la nature. Sa sculpture figurative évoque la forme des rochers escarpés de la côte nord de l'île, ce littoral rudoyé sans pitié par la tramontane. L'homme taillé dans la roche, résistant au vent. Ou tentant de le faire.

Filippo Tincolini — Italie.
Filippo utilise le corps humain comme vecteur conceptuel. Son œuvre représente un pubis féminin et parle de fertilité, de l'origine de toute vie. C'est une pièce directe, sans métaphores intermédiaires : la vie naît du corps, et le corps naît de la terre. Le cycle bouclé.

Chacune de ces dix pièces a été créée ici, dans ce domaine, à partir d'un marbre de Carrare acheminé expressément pour le symposium. Les artistes ont cohabité pendant vingt-cinq jours, ils ont dormi ici, mangé ici, respiré cet air. Et cela se ressent : ces sculptures ne sont pas des pièces de musée transportées ; elles sont nées de cette terre et pour cette terre.

Prenez le temps qu'il vous faut. Quand vous serez prêts, suivez la spirale jusqu'au point trois.`},

{id:'punto-3',num:'3',cat:'LES VIGNOBLES',title:'Ceps qui ont survécu au silence',nextLabel:'Fromagerie',
trans:`Vous venez de parcourir un jardin qui est aujourd'hui l'un des recoins les plus intimes de Sant Patrici.
Autrefois, du temps de Xini et Fernando, ce jardin accueillait des fêtes des vendanges, des dîners sous les étoiles, des rencontres où un pêcheur de Fornells pouvait s'asseoir à côté d'un ambassadeur, et personne ne demandait d'où tu venais, seulement si tu voulais rester.
Xini et Fernando avaient compris une chose que très peu de gens comprennent : qu'un lieu ne prend vie que lorsqu'on le remplit de personnes. Et que la beauté, si elle ne se partage pas, ne sert à rien.

Ici, dans les vignobles, il n'y a ni sculptures ni jardins. Seulement des rangées de vignes sous le soleil. Cela paraît simple. Mais ces ceps que vous voyez sont des survivants. Et pour comprendre pourquoi, il vous faut découvrir une histoire qui commence il y a plus de deux mille ans.

Les Romains faisaient déjà du vin à Minorque. Cette île, battue par la tramontane et caressée par la Méditerranée, s'avéra être un lieu exceptionnel pour la vigne. Pendant des siècles, le vin minorquin fut un secret bien gardé. Jusqu'à l'arrivée des Britanniques.

Au XVIIIᵉ siècle, Minorque passa aux mains de l'Empire britannique, et avec eux arriva une soif insatiable. La Royal Navy avait besoin de vin, les commerçants en voulaient, et l'île tout entière se transforma en un vignoble flottant. Le port de Mahón en exportait des millions de litres. Ce fut l'âge d'or.

Et puis, le désastre. À la fin du XIXᵉ siècle, un insecte microscopique appelé phylloxéra traversa l'Atlantique, caché dans quelques ceps américains, et dévasta les vignobles de toute l'Europe. Minorque n'y échappa pas. En quelques années, ce qui avait mis des siècles à pousser disparut. Et le silence s'installa sur cette terre pendant plus d'un siècle.

Ce n'est qu'en l'an 2000 que quelques courageux se remirent à planter. Et en 2002, Sant Patrici décida de s'associer à cette renaissance. On planta entre deux et trois hectares de vignobles là où il n'y avait auparavant qu'un champ en friche. En 2005, la cave fut officiellement fondée. Et en 2008, on mit en bouteille le premier vin. Six ans du cep au verre. Voilà combien la patience est lente quand elle est bien faite.

Les cépages que vous voyez ici n'ont pas été choisis au hasard.
Merlot, Cabernet Sauvignon et Syrah pour les rouges.
Chardonnay, Muscat et Prensal pour les blancs.
Ce sont des raisins qui aiment les conditions extrêmes : le soleil brûlant de l'été minorquin, la tramontane qui durcit la peau du grain et concentre les saveurs, et la brise marine qui apporte cette subtile salinité que vous retrouverez ensuite dans le verre.

Ici, tout est une question d'équilibre. La chaleur apporte le sucre, qui se traduit en corps et en alcool. Le vent et la fraîcheur nocturne préservent l'acidité, qui donne fraîcheur et élégance. Le résultat est un vin qui ne peut naître qu'ici. Un vin portant la dénomination Vi de la Terra Illa de Menorca.

Regardez ces ceps un instant. Ils semblent modestes, presque fragiles. Mais sous le sol, leurs racines s'étendent sur des mètres et des mètres, en quête d'eau et de minéraux. C'est ce qui ne se voit pas qui compte. Comme pour tant de choses.

Dirigez-vous vers le point quatre. Nous allons maintenant entrer dans l'un des lieux les plus anciens de ce domaine : le lieu où les mains transforment le lait en histoire.`},

{id:'punto-4',num:'4',cat:'FROMAGERIE',title:'Là où les mains façonnent le temps',nextLabel:'Cave',
trans:`Vous vous trouvez devant notre fromagerie, et je veux que vous vous prépariez à quelque chose. Si vous veniez le matin, vous verriez à travers les vitres un rituel qui se répète ici exactement comme il y a deux cents ans. Nos maîtres fromagers modèlent chaque pièce, une par une, à la main. Sans moules industriels. Sans raccourcis. Seulement un linge de coton — que nous appelons « fogasser » —, une ficelle — le « lligam » — et la pression de mains qui savent exactement quelle force appliquer.

Ce savoir ne s'apprend pas dans les livres. Il se transmet. Il passe de main en main, de geste en geste, et dans notre cas, depuis plus de trente ans de métier.

Laissez-moi vous expliquer comment naît un fromage à Sant Patrici, étape par étape.

Tout commence avec le lait. Du lait frais de vache provenant de notre environnement, de la campagne de Minorque.
La qualité de ce lait détermine tout : le pâturage que broutent les vaches, la brise marine qui imprègne les champs, la terre calcaire de Minorque. Tout cela est déjà dans le lait avant même que nous ne touchions à quoi que ce soit.

Le lait est versé dans de grandes cuves, et on y ajoute de la présure naturelle. En une quarantaine de minutes, le lait se transforme : il cesse d'être liquide et devient une masse gélatineuse, le caillé.

C'est un moment presque magique, une métamorphose silencieuse.

Les mains entrent alors en scène. Le maître fromager coupe le caillé avec un instrument appelé lyre, en petits morceaux, pour qu'il libère le petit-lait. Puis il recueille ce caillé et l'enveloppe dans le fogasser, le linge de coton traditionnel. Il le noue avec le lligam, la ficelle, et le processus de pressage commence. Sous la presse, le petit-lait restant est expulsé grâce à la pression exercée par un poids de 4,6 kg sur la pièce.

Voyez-vous ce dessin sur le dessus du fromage, cette sorte de gravure en relief ? Nous l'appelons « mamella ». Ce n'est pas une décoration : c'est l'empreinte laissée par le linge lorsqu'il est noué sur le caillé. C'est la signature de la méthode traditionnelle. Si un fromage porte la mamella, vous pouvez être sûrs que des mains humaines l'ont façonné.

Ensuite vient le bain de saumure. Le fromage est plongé dans une solution d'eau et de sel pendant plusieurs heures. Le sel pénètre lentement, agit comme conservateur naturel et commence à définir la saveur. Et à partir de là, le fromage entre dans sa phase la plus mystérieuse : l'affinage. Dans des chambres à température et humidité contrôlées, le temps fait son œuvre. Des semaines, des mois, parfois plus d'un an.

Le fromage Mahón-Minorque bénéficie d'une Appellation d'Origine Protégée, ce qui signifie qu'il ne peut être élaboré que sur cette île, avec du lait de vache issu de la campagne minorquine, en suivant une méthode spécifique et une réglementation très stricte.

C'est l'un des fromages les plus anciens d'Espagne — des vestiges d'ustensiles fromagers ont été retrouvés dans des sites préhistoriques de Minorque. Nous parlons d'un métier vieux de plus de trois mille ans.

Et à Sant Patrici, ce métier se traduit en une famille de fromages aux personnalités bien distinctes.

Au sein de notre gamme sous Appellation d'Origine, vous trouverez trois âges. Le Semi-affiné, avec plus de 3 mois d'affinage en cave. C'est notre fromage le plus polyvalent et celui qui représente le mieux l'essence de l'A.O.P.
Vient ensuite l'Affiné, qui a passé plus de temps en cave, avec plus de 6 mois d'affinage. Il est plus ferme, plus intense.
Enfin, le Vieux, avec plus d'un an de maturation en cave. Un fromage qui a patiemment mûri jusqu'à développer une profondeur de saveur extraordinaire : friable et puissant.

Notre fromage frais est élaboré selon la même méthode traditionnelle. Toutefois, nous utilisons du lait pasteurisé, sans ajout d'additifs ni de conservateurs. Il se caractérise par une saveur très douce et un blanc intense.
Notre recette est un bien précieux, une recette transmise en héritage, que vous ne trouverez dans aucun autre domaine.

Mais la curiosité de nos fromagers ne s'arrête pas là. Nous élaborons également une ligne gourmet, où nous jouons avec les herbes et les saveurs aromatiques.

Dans notre boutique-musée, vous trouverez des ustensiles qu'utilisaient nos fromagers d'autrefois à Sant Patrici. Des presses en bois d'origine, les moules, et bien d'autres objets encore.
Ce sont des objets humbles, usés par le temps, mais ils sont les témoins muets d'un métier que nous refusons de laisser disparaître.

Dirigez-vous maintenant vers le point cinq, où vous trouverez notre cave.`},

{id:'punto-5',num:'5',cat:'CAVE',title:'Là où le silence crée',nextLabel:'Boutique-Musée',
trans:`Sentez le changement en entrant ici. La température baisse et la lumière se tamise.

Vous vous trouvez dans la cave de Sant Patrici.
Si la fromagerie était le lieu des mains, celui-ci est le lieu de la patience.

Faire du vin, c'est au fond une négociation avec le temps. Et cette négociation commence bien avant d'arriver ici, dans les vignes que vous venez de voir.

Tout démarre avec les vendanges. Il existe un instant précis — parfois une question de jours — où le raisin atteint l'équilibre parfait entre sucre et acidité. Si l'on s'y prend trop tôt, le vin sera maigre et sans corps. Si l'on tarde, il perdra sa fraîcheur et gagnera un alcool excessif. À Minorque, où la chaleur estivale accélère la maturation, cette marge est encore plus étroite. Il faut être rapide et précis. On récolte aux premières heures du matin, avec la fraîcheur de la nuit encore sur la peau du raisin, pour qu'il arrive à la cave dans les meilleures conditions.

Une fois ici, le raisin entame sa transformation. La première étape est l'éraflage : séparer chaque grain de la rafle, cette partie boisée, qui apporterait amertume et astringence au vin. Cela se fait avec soin, sans briser les pépins, qui pourraient eux aussi donner des saveurs indésirables.

Vient ensuite le foulage, un pressurage doux qui libère le moût — le jus — sans écraser les peaux à l'excès.
Pour les vins blancs, nous utilisons le Prensal, le Chardonnay et le Muscat. Dans ce cas, le moût est rapidement séparé des peaux afin d'obtenir un jus net et délicat.
Pour les rouges, nous utilisons le Merlot, le Cabernet Sauvignon et la Syrah. Le moût fermente au contact des peaux pendant plusieurs jours, car c'est là que se trouvent la couleur, les tanins et une grande partie de la saveur.

Et c'est ici que Sant Patrici fait quelque chose qui nous distingue : nous fermentons à très basse température, autour de quatorze degrés, bien en deçà de l'habitude. Pourquoi ? Parce qu'une fermentation lente est comme une longue conversation : elle révèle des nuances qu'une fermentation rapide ne découvrirait jamais. Les levures travaillent lentement, sans stress, et produisent des arômes plus fins, plus complexes. Les notes florales, le fruit élégant, cette sensation de fraîcheur en bouche : tout cela exige du temps et du froid.

Pendant la fermentation, le sucre du raisin se transforme en alcool et en dioxyde de carbone. C'est un processus naturel, ancestral, que l'être humain a découvert il y a des milliers d'années et qui, en essence, n'a pas changé : le raisin veut devenir du vin. Nous ne faisons que l'accompagner.

Une fois la fermentation achevée vient le repos. Regardez autour de vous : dans ces cuves que vous voyez, le vin dort pendant des mois. Mais ce n'est pas un sommeil passif. Le vin respire ; une infime quantité d'oxygène le transforme peu à peu : elle adoucit les tanins — cette sensation de sécheresse en bouche —, arrondit le corps, et laisse apparaître des notes nouvelles que le raisin seul n'aurait jamais données.

L'œnologue décide du temps de repos de chaque vin, tel un chef d'orchestre qui assigne à chaque instrument son moment.

Ensuite, le vin est clarifié et filtré 2 ou 3 fois, à l'aide de filtres très fins.

Une fois filtré et clarifié, il ne nous reste plus qu'à le mettre en bouteille de verre. Là, le vin continue d'évoluer en silence et dans l'obscurité, affinant ses arômes, intégrant ses saveurs, jusqu'à ce que quelqu'un le débouche et complète le cycle.

Tous nos vins portent le sceau « Vi de la Terra Illa de Menorca », la certification qui garantit qu'ils sont nés de ces vignes, sous ce soleil et ce vent, et qu'ils ont été intégralement élaborés sur l'île.

Des ceps que vous avez vus dehors jusqu'au verre que vous dégusterez dans quelques minutes, des mois se seront écoulés. Chaque bouteille de Sant Patrici est du temps condensé. Du temps de soleil, de vent, de mains, d'attente.`},

{id:'punto-6',num:'6',cat:'BOUTIQUE-MUSÉE',title:'Le moment de savourer',nextLabel:null,
trans:`Et maintenant, oui : le moment est venu de cesser d'écouter pour commencer à savourer. Rendez-vous à notre boutique-musée, où vous attend un accord de nos fromages et de nos vins. Ne soyez pas pressés. Laissez le vin nettoyer le palais, laissez le gras du fromage étreindre l'acidité. Cherchez les saveurs que je vous ai décrites tout au long de la visite. Car tout ce que vous avez écouté aujourd'hui — l'histoire de Fernando et Xini, la spirale du jardin, les vignes qui ont survécu au phylloxéra, les mains du fromager, le repos du vin — tout cela se retrouve, d'une façon ou d'une autre, dans ce que vous êtes sur le point de goûter.

Profitez-en. Ce moment est le vôtre.`}
],

de:[
{id:'punto-1',num:'1',cat:'HAUPTGEBÄUDE',title:'Das Haus, das die verbotene Liebe erbaute',nextLabel:'Skulpturengarten',
trans:`Halten Sie einen Moment vor dieser Fassade inne. Betrachten Sie die Dicke dieser Mauern: über einen Meter Marès-Stein, derselbe, der hier 1918 verbaut wurde. Und schauen Sie sich die Proportionen an: der quadratische Grundriss, die Symmetrie, diese Freitreppe am Eingang. Das ist kein menorquinisches Landhaus. Wer dieses Haus in Auftrag gab, wollte eine Villa im italienischen Stil, wie er sie auf seinen Reisen gesehen hatte. Es wirkt friedlich, nicht wahr? Heller Stein, Bougainvilleen, dieses menorquinische Licht, das alles liebkost. Doch dieses Haus hütet ein Geheimnis. Denn es wurde nicht von einem Adligen in Auftrag gegeben, noch für eine Familie errichtet. Dieses Haus hat eine verbotene Liebe erbaut.

Um diese Geschichte zu verstehen, müssen wir zunächst ins Madrid des frühen zwanzigsten Jahrhunderts reisen. Stellen Sie sich Fernando Vives vor: 1867 in Mahón geboren, Sohn des gehobenen menorquinischen Bürgertums, aber in der Hauptstadt ansässig, wo er sich ein kleines Imperium aufgebaut hatte. Er war Inhaber von „La Mahonesa", berühmten Konditoreien, die die Süßigkeiten Menorcas in die Salons Madrids brachten. Sammler von Antiquitäten, leidenschaftlicher Liebhaber arabischer Kunst. Sein eigener Bruder Antonio brachte es zu einem der bedeutendsten Numismatiker Spaniens und wurde zum Ehrenbürger von Mahón ernannt. Die Vives waren Leute von Gewicht. Und Fernando war mit Francisca Segura verheiratet — Paca, wie alle sie nannten —, einer Frau, die aus der Welt der Bühne und der Zarzuela stammte.

Doch Madrid lastete auf ihm. Fernando vermisste die Insel, die Ruhe, den Geruch des Landes. Und 1917 kaufte er dieses Anwesen, auf der Suche nach einem Rückzugsort, an dem er fern vom Lärm der Hauptstadt atmen konnte. Das Problem war, dass Paca, an das Leben in Madrid gewöhnt, diese menorquinische Ruhe nicht im Geringsten interessierte. Fernando kam allein. Und da sich ein Mann zu jener Zeit nicht selbst um den Haushalt kümmerte, engagierte er eine junge Frau, die ihm zur Hand gehen sollte.

Sie hieß Virginia López Álvarez, doch alle Welt kannte sie schließlich nur unter dem Namen Xini. Sie war aus Valladolid gekommen, Tochter einer bescheidenen und riesigen Familie — ihre Mutter hatte zwanzig Kinder zur Welt gebracht, von denen achtzehn überlebten. Xini arbeitete bereits in Madrid für Fernando, in der Konditorei. Nun holte er sie nach Menorca, damit sie sich um das Haus kümmerte.

Was danach geschah, war vielleicht unvermeidlich. Fernando kam immer öfter. Er blieb immer länger. Bis er schließlich nicht mehr abreiste. Er hatte sich in Xini verliebt. Als Paca davon erfuhr, verließ sie das Anwesen und zog nach Mahón. Und dieses Haus, das Sie vor sich haben, wurde zum Zuhause von Fernando und Xini.

Er erfüllte es mit allem, was sie verdiente: Marmorstatuen der vier Jahreszeiten im Garten, rote Samtvorhänge, ein Bett mit goldenen Säulen und Seidenlaken. Fernando, Hobbymaler, porträtierte sie auf der Veranda, während die Brise durch eben jene Fenster wehte, die Sie jetzt sehen. Damit Sie sich ein Bild davon machen, wer Xini war: Man erzählt, sie sei von diesem Anwesen bis ins Dorf gelaufen, mit einem Tablett voller Pastissets auf dem Kopf balancierend, aufrecht wie eine Königin, mit ihrem Schmuck und ihren Stöckelschuhen — ja, Stöckelschuhe auf einem Feldweg. In Ferreries nannten sie die Leute „la Gilda", wie die Filmschauspielerin. Sie war diese Art von Frau.

Sie erlebten hier ihr goldenes Zeitalter. Isoliert, ja. Aber frei.

Bis Fernando im Januar 1941 starb. Er war 73 Jahre alt.

Und dann, die Stille. Stellen Sie sich dieses Haus vor, ohne seine Stimme, ohne seine Feste, ohne den Duft der Süßigkeiten, die er backte. Drei Monate vor seinem Tod, im Wissen um das Kommende, hatte Fernando das einzig Mögliche getan: sein Leben in zwei Teile geteilt. Das Haus und den Garten überschrieb er Xini zu Lebzeiten. Alles Übrige — die Konditoreien, die Liegenschaften in Mahón, das Geld — ging an Paca, seine rechtmäßige Ehefrau.

Von einem Tag auf den anderen blieb Xini mit den Mauern zurück, doch ohne alles, was darin gewesen war. Sie entließ den Gärtner. Sie kaufte Hühner, Schweine, ein Paar Milchkühe. Und wo zuvor Marmor und Musik gewesen waren, tauchten nun überall Tiere auf. Die Kühe scheuerten sich an den Statuen der vier Jahreszeiten. Die Schweine schliefen dort, wo man einst getanzt hatte. Xini lernte zu melken, zu mähen, Käse herzustellen — einen weißen, salzigen Käse, den sie in den Läden von Ferreries verkaufte. Die Armut trieb sie dazu, Gemüse von benachbarten Höfen zu stehlen, um zu überleben. Doch sie hörte nie auf, aufrecht zu gehen. Und stets auf Stöckeln: Am Ende, mit vom Arbeiten verwüsteten Händen, konnte sie sie sich nicht mehr allein anziehen. Dann lief sie barfuß zum Haus ihrer Freundin Rafela, die Schuhe in einer Tasche, und bat sie, ihr beim Anlegen zu helfen. Immer mit Absatz.

Fünfundzwanzig Jahre hielt sie hier allein durch. Ohne aufzugeben. Ohne fortzugehen. Als ob Fortgehen Verrat an Fernandos Andenken gewesen wäre.

Sie starb im Oktober 1966, im Alter von 69 Jahren. Ihre Freundinnen fanden sie in der Küche, auf einem Stuhl sitzend, den Kopf auf dem Tisch. Auf ihrem Grab, auf dem Friedhof von Mahón, erinnert kein Stein an ihren Namen.

Ihre Brüder kamen vom Festland, verkauften das Wenige, was Wert hatte, und verbrannten den Rest. Buchstäblich. Sie stapelten Matratzen, Porträts, Gemälde, Briefe, Teppiche, Möbel — ein ganzes Leben — im Hof auf und zündeten alles an. Asche und Stille schlossen die Geschichte von Fernando und Xini.

Doch die Erde erinnert sich.

Im Laufe der Jahre wechselte das Anwesen den Besitzer, bis jemand darin das sah, was Fernando 1917 darin gesehen hatte: kein Geschäft, sondern eine Möglichkeit. Was Sie heute um sich herum sehen — das Hotel, die Käserei, das Weingut, die Weinberge — ist ein Akt der Auferstehung. Es ist der Beweis, dass ein Ort, der Liebe, Verfall und Verlassenheit gekannt hat, wieder auferstehen und Früchte tragen kann. Früchte, die Sie heute, ganz wörtlich, werden kosten können.

Gehen Sie nun nach links, wo Sie die Beschilderung zum zweiten Punkt finden. Dort erwartet Sie ein Garten, der in der Stille spricht.`},

{id:'punto-2',num:'2',cat:'SKULPTURENGARTEN',title:'Zehn Stimmen in der Spirale',nextLabel:'Die Skulpturen einzeln',
trans:`Sie haben soeben eine Geschichte vom Feuer gehört. Xinis Brüder verbrannten alles, was sich in diesem Anwesen befand: die Gemälde, die Briefe, die Möbel, die Erinnerung. Und über Jahre gab es hier nichts. Nur stumme Erde.

Was Sie nun vor sich haben, ist die Antwort.

Bevor Sie die Skulpturen betrachten, bitte ich Sie, zunächst den Boden zu betrachten. Achten Sie auf die Form des Weges, den Sie gleich gehen werden. Sehen Sie sie? Es ist eine Spirale. Das ist keine Dekoration: Es ist eine Entscheidung. Dieser Garten, der über zehntausend Quadratmeter einnimmt, wurde vom Landschaftsarchitekten Josep Bosch Espelta gestaltet, einem Schüler des großen Nicolau Maria Rubió i Tudurí. Und Bosch wählte die Spirale, weil sie die Form ist, die das Leben annimmt. Sie findet sich in den Galaxien, in den Schneckenhäusern, in der Doppelhelix der DNA. Wenn Sie der Verlauf an etwas erinnert, so ist es vermutlich das Guggenheim-Museum in New York: Die Gestaltung dieses Gartens ist direkt von der spiralförmigen Rampe Frank Lloyd Wrights inspiriert. Indem Sie diesen Pfad beschreiten, gehen Sie eben diesen Gedanken nach: den Weg des Menschen auf der Erde.

Was hier geschah, um diesen Ort mit Stimmen zu füllen, war außergewöhnlich. Im Mai 2003 feierte Menorca zehn Jahre als Biosphärenreservat, und zu diesem Anlass wurde das Erste Internationale Symposium Hort Sant Patrici veranstaltet. Fünfundzwanzig Tage lang lebten vierzehn Künstler aus aller Welt — eine Paraguayerin, ein Italiener, eine Koreanerin, ein Ägypter, ein Rumäne, ein in Belgien ansässiger Haitianer … — in diesem Anwesen zusammen. Sie aßen gemeinsam, diskutierten gemeinsam, bearbeiteten gemeinsam den Stein. Und aus diesem Zusammenleben entstanden zehn Skulpturen, gehauen aus Carrara-Marmor. Zehn verschiedene Antworten auf ein und dieselbe Frage: Wie ist das Verhältnis des Menschen zur Natur?

Beim Umherschlendern werden Sie ihnen begegnen. Sie werden den Brunnen von Nélida Mendoza sehen, der paraguayischen Künstlerin, die das Wasser als lebendigen Werkstoff nutzte: Das Wasser fällt auf den Stein und formt ihn langsam, so wie die Zeit die Erde formt. Es ist das einzige Werk, das sich nicht hier im Garten befindet; Sie werden es am See entdecken, denn seine Botschaft brauchte eine andere Kulisse.

Sie werden der Waage von Giacomo Santini begegnen, einem blutjungen italienischen Bildhauer, der uns daran erinnern wollte, wie zerbrechlich das Gleichgewicht zwischen Mensch und Natur ist. Die Hände, die Sie an dem Werk sehen, sind echt: Es sind Abgüsse der Hände von Kindern, die während des Symposiums zu Besuch kamen.

Und Sie werden die Erde von George Dan Istrate sehen, dem rumänischen Bildhauer: eine perfekte Kugel, durchtrennt von einem sauberen Schnitt. Das ist der Eingriff des Menschen. Wenn wir nicht umsteuern, wird der Bruch unumkehrbar sein.

So wird dieser Garten, Skulptur um Skulptur, zu Ihnen sprechen. Hören Sie ihm zu. Jedes Werk ist ein Liebesbrief — oder eine Warnung — an die Insel, die uns aufnimmt.

Nehmen Sie sich Zeit. Wenn Sie bereit sind, folgen Sie der Spirale zum dritten Punkt, dort, wo die Erinnerung dieses Landes flüssig wird. Und falls Sie jede Skulptur im Detail kennenlernen möchten, bleiben Sie: Wir werden die zehn Stimmen dieses Gartens eine nach der anderen durchgehen.`},

{id:'punto-2b',num:'2b',cat:'DIE SKULPTUREN EINZELN',title:'Marmor mit Namen',nextLabel:'Die Weinberge',
trans:`Nélida Mendoza — Paraguay.
Beginnen wir mit derjenigen, die nicht hier ist. Nélidas Werk befindet sich am See des Hotels, und dafür gibt es einen gewichtigen Grund: Ihr Rohstoff ist nicht nur der Stein, sondern auch das Wasser. Nélida nutzt das Wasser als lebendiges Element, das die Skulptur im Laufe der Zeit verwandelt. Das Wasser formt langsam einen Brunnen, der die Erde darstellt. Es ist ein Werk, das sich verändert, das altert, das atmet. Darum musste es dort stehen, wo das Wasser regiert.

Giacomo Santini — Italien.
Giacomo war noch kaum mehr als ein Junge, als er zum Symposium kam, doch seine Botschaft war die eines Weisen. Seine „Waage" spricht vom zerbrechlichen Gleichgewicht zwischen der Kraft der Natur und der des Menschen. Die Hände, die Sie am Werk sehen, sind nicht erfunden: Es sind echte Abgüsse der Hände von Kindern, die während dieser fünfundzwanzig Tage mitwirkten. Die Unschuld, die das Gewicht der Welt trägt.

Oliviero Bertolasso — Italien und Deutschland.
Der Italo-Deutsche wählte die menschliche Gestalt, um eine unbequeme Botschaft zu senden. Sein Werk ist figurativ und bewusst pessimistisch: Es konfrontiert uns mit der Zukunft der Natur und mit der Verantwortung, die wir für ihren Erhalt tragen. Es ist keine Skulptur, die gefallen will; sie will verstören. Und genau darin liegt ihre Kraft.

Shin Myong-Ok — Korea.
Die koreanische Künstlerin führt uns auf spirituelles Terrain. Ihre Skulptur ruft das Handauflegen wach, jene universelle Geste, die je nach Kultur Heilung oder Zerstörung, Segen oder Verdammnis bedeuten kann. Die Formen, die Sie sehen, lassen geöffnete Hände über der Natur erahnen. Die Frage, die sie im Raum stehen lässt, ist mächtig: Heilen wir die Erde oder machen wir sie krank?

Tristán Casamajor — Haiti, wohnhaft in Belgien.
Tristán schuf einen mächtigen Totem, der mit den Elementen spielt und die Sonne zum Protagonisten macht. Es ist, im wahrsten Sinne des Wortes, eine Sonnenuhr: die natürliche Entwicklung der Erde, markiert vom Licht. Wenn Sie die Formen des Totems genau betrachten, werden Sie Silhouetten entdecken, die an den menschlichen Körper erinnern. Die Zeit der Natur und die Zeit des Menschen, verschmolzen im selben Stein.

Said Badr — Ägypten.
Der Ägypter entwarf ein vertikales, geradezu monumentales Werk, das der Erhabenheit der Natur auf Menorca huldigt. Die Vertikalität ist kein Zufall: Es ist die Erde, die sich aufrichtet, die sich erhebt, die ihre Präsenz einfordert gegenüber einem Menschen, der dazu neigt, nur nach vorn zu blicken. Said bittet uns, nach oben zu schauen.

George Dan Istrate — Rumänien.
Dies ist eine der eindrucksvollsten Skulpturen des Gartens. Der junge Rumäne schuf eine perfekte Kugel — die Erde — und durchtrennte sie mit einem sauberen Querschnitt. Dieser Einschnitt ist der Eingriff des Menschen: präzise, kalt, unumkehrbar, wenn wir nicht rechtzeitig handeln. Die zerbrochene Vollkommenheit. Eine Mahnung, gehauen in Carrara-Marmor.

Toni Capó — Mallorca.
Der Mallorquiner arbeitete für dieses Symposium zum ersten Mal mit Marmor und wählte ein Thema, das er bestens kennt: die Zerbrechlichkeit des Menschen angesichts der Härte der Natur. Seine figurative Skulptur ruft die Formen der schroffen Felsen der Nordküste der Insel wach, jener Küste, die von der Tramontana erbarmungslos gezeichnet wird. Der Mensch, in den Fels gehauen, dem Wind widerstehend. Oder es versuchend.

Filippo Tincolini — Italien.
Filippo nutzt den menschlichen Körper als konzeptionelles Vehikel. Sein Werk stellt einen weiblichen Schoß dar und spricht von Fruchtbarkeit, vom Ursprung allen Lebens. Es ist ein direktes Werk, ohne Umwege über Metaphern: Das Leben entspringt dem Körper, und der Körper entspringt der Erde. Der geschlossene Kreislauf.

Jedes dieser zehn Werke wurde hier, in diesem Anwesen, geschaffen, aus Carrara-Marmor, der eigens für das Symposium herbeigeschafft wurde. Die Künstler lebten fünfundzwanzig Tage lang zusammen, schliefen hier, aßen hier, atmeten diese Luft. Und das spürt man: Diese Skulpturen sind keine Museumsstücke, die hierher verlegt wurden; sie sind aus dieser Erde und für diese Erde geboren.

Nehmen Sie sich die Zeit, die Sie brauchen. Wenn Sie bereit sind, folgen Sie der Spirale zum dritten Punkt.`},

{id:'punto-3',num:'3',cat:'DIE WEINBERGE',title:'Reben, die die Stille überlebten',nextLabel:'Käserei',
trans:`Sie haben soeben einen Garten durchschritten, der heute zu den intimsten Winkeln von Sant Patrici zählt.
Einst, zu Zeiten von Xini und Fernando, war dieser Garten Schauplatz von Weinlesefesten, Abendessen unter den Sternen, Begegnungen, bei denen sich ein Fischer aus Fornells neben einen Botschafter setzen konnte, und niemand fragte, wo du herkamst, nur ob du bleiben wolltest.
Xini und Fernando hatten etwas verstanden, was nur wenige Menschen verstehen: dass ein Ort erst dann zum Leben erwacht, wenn man ihn mit Menschen füllt. Und dass Schönheit, wenn sie nicht geteilt wird, zu nichts nütze ist.

Hier, in den Weinbergen, gibt es weder Skulpturen noch Gärten. Nur Reihen von Reben unter der Sonne. Es wirkt schlicht. Doch diese Rebstöcke, die Sie sehen, sind Überlebende. Und um zu verstehen, warum, müssen Sie eine Geschichte kennenlernen, die vor mehr als zweitausend Jahren beginnt.

Schon die Römer kelterten auf Menorca Wein. Diese Insel, von der Tramontana gebeutelt und vom Mittelmeer umspült, erwies sich als außergewöhnlicher Ort für den Weinbau. Jahrhundertelang war der menorquinische Wein ein gut gehütetes Geheimnis. Bis die Briten kamen.

Im achtzehnten Jahrhundert ging Menorca in die Hände des Britischen Empire über, und mit ihnen kam ein unstillbarer Durst. Die Royal Navy brauchte Wein, die Händler wollten Wein, und die gesamte Insel verwandelte sich in einen schwimmenden Weinberg. Der Hafen von Mahón exportierte Millionen Liter. Es war das goldene Zeitalter.

Und dann, die Katastrophe. Ende des neunzehnten Jahrhunderts überquerte ein mikroskopisch kleines Insekt namens Reblaus, versteckt in einigen amerikanischen Reben, den Atlantik und verwüstete die Weinberge ganz Europas. Menorca blieb nicht verschont. Binnen weniger Jahre verschwand, was Jahrhunderte gebraucht hatte zu wachsen. Und die Stille legte sich für mehr als ein Jahrhundert über dieses Land.

Erst im Jahr 2000 fingen einige Mutige wieder an zu pflanzen. Und 2002 beschloss Sant Patrici, sich dieser Wiedergeburt anzuschließen. Man pflanzte zwischen zwei und drei Hektar Weinberge dort, wo zuvor nur brachliegendes Feld gewesen war. 2005 wurde das Weingut formell gegründet. Und 2008 füllte man den ersten Wein in Flaschen. Sechs Jahre vom Rebstock bis ins Glas. So langsam ist die Geduld, wenn sie sich gut entfaltet.

Die Rebsorten, die Sie hier sehen, wurden nicht zufällig gewählt.
Merlot, Cabernet Sauvignon und Syrah für die Rotweine.
Chardonnay, Muskateller und Prensal für die Weißweine.
Es sind Trauben, die extreme Bedingungen lieben: die erbarmungslose Sonne des menorquinischen Sommers, die Tramontana, die die Haut der Traube härtet und die Aromen konzentriert, und die Meeresbrise, die jene dezente Salzigkeit einträgt, die Sie später im Glas wiederfinden werden.

Hier ist alles eine Frage des Gleichgewichts. Die Wärme spendet den Zucker, der sich in Körper und Alkohol umsetzt. Der Wind und die nächtliche Kühle bewahren die Säure, die Frische und Eleganz verleiht. Das Ergebnis ist ein Wein, der nur hier entstehen kann. Ein Wein mit der Herkunftsbezeichnung Vi de la Terra Illa de Menorca.

Betrachten Sie die Rebstöcke einen Moment. Sie wirken bescheiden, fast zerbrechlich. Doch unter der Erde erstrecken sich ihre Wurzeln über viele Meter, auf der Suche nach Wasser und Mineralien. Was man nicht sieht, ist das, was zählt. Wie bei so vielen Dingen.

Gehen Sie nun zum vierten Punkt. Wir werden jetzt einen der ältesten Orte dieses Anwesens betreten: den Ort, an dem Hände Milch in Geschichte verwandeln.`},

{id:'punto-4',num:'4',cat:'KÄSEREI',title:'Wo Hände die Zeit formen',nextLabel:'Weinkeller',
trans:`Sie stehen vor unserer Käserei, und ich möchte Sie auf etwas einstimmen. Kämen Sie am Morgen, so würden Sie durch die Scheiben ein Ritual beobachten, das sich hier genauso wiederholt wie vor zweihundert Jahren. Unsere Käsemeister formen jedes Stück, eines nach dem anderen, von Hand. Ohne industrielle Formen. Ohne Abkürzungen. Nur ein Baumwolltuch — das wir „fogasser" nennen —, eine Schnur — den „lligam" — und den Druck von Händen, die genau wissen, wie viel Kraft sie einsetzen müssen.

Dieses Wissen lernt man nicht aus einem Buch. Es wird vererbt. Es wird von Hand zu Hand, von Handgriff zu Handgriff weitergegeben, in unserem Fall über mehr als dreißig Jahre Erfahrung hinweg.

Lassen Sie mich Ihnen Schritt für Schritt erklären, wie in Sant Patrici ein Käse entsteht.

Alles beginnt mit der Milch. Frische Kuhmilch aus unserer Umgebung, von den Weiden Menorcas.
Die Qualität dieser Milch bestimmt alles: das Gras, das die Kühe fressen, die Meeresbrise, die die Felder durchzieht, der kalkhaltige Boden Menorcas. All das steckt bereits in der Milch, bevor wir irgendetwas anrühren.

Die Milch wird in große Bottiche gegossen, und es wird natürliches Lab hinzugefügt. In etwa vierzig Minuten verwandelt sich die Milch: Sie hört auf, flüssig zu sein, und wird zu einer gallertartigen Masse, dem Bruch.

Es ist ein geradezu magischer Moment, eine stille Verwandlung.

Dann treten die Hände in Aktion. Der Käsemeister schneidet den Bruch mit einem Werkzeug namens Käseharfe in kleine Stücke, damit die Molke abfließt. Dann sammelt er den Bruch ein und hüllt ihn in den fogasser, das traditionelle Baumwolltuch. Er bindet ihn mit dem lligam, der Schnur, zusammen, und der Pressvorgang beginnt. In der Presse wird die restliche Molke dank eines Gewichts von 4,6 kg, das auf dem Laib lastet, herausgedrückt.

Sehen Sie diese Zeichnung auf der Oberseite des Käses, diese Art von Reliefprägung? Wir nennen sie „mamella". Das ist keine Verzierung: Es ist der Abdruck, den das Tuch hinterlässt, wenn es über dem Bruch zusammengebunden wird. Es ist die Signatur der traditionellen Methode. Wenn ein Käse eine mamella trägt, können Sie sicher sein, dass menschliche Hände ihn geformt haben.

Danach folgt das Salzbad. Der Käse wird stundenlang in eine Salzwasserlösung getaucht. Das Salz dringt langsam ein, wirkt als natürliches Konservierungsmittel und beginnt, den Geschmack zu prägen. Und von da an tritt der Käse in die geheimnisvollste Phase ein: die Reifung. In Kammern mit kontrollierter Temperatur und Luftfeuchtigkeit tut die Zeit ihr Werk. Wochen, Monate, manchmal mehr als ein Jahr.

Der Käse Mahón-Menorca trägt die geschützte Ursprungsbezeichnung, das bedeutet, er darf ausschließlich auf dieser Insel hergestellt werden, mit Kuhmilch aus der menorquinischen Landschaft, nach einer spezifischen Methode und unter sehr strengen Vorschriften.

Er ist einer der ältesten Käse Spaniens — in prähistorischen Fundstätten auf Menorca wurden Reste von Käsereigeräten entdeckt. Wir sprechen von einem Handwerk, das über dreitausend Jahre alt ist.

Und in Sant Patrici schlägt sich dieses Handwerk in einer Familie von Käsen mit sehr unterschiedlichen Charakteren nieder.

Innerhalb unseres Sortiments mit Ursprungsbezeichnung finden Sie drei Reifestufen. Den Halbgereiften, mit über 3 Monaten Reifung in der Kammer. Er ist unser vielseitigster Käse und derjenige, der die Essenz der g.U. am besten verkörpert.
Es folgt der Gereifte, der länger in der Kammer verbracht hat, mit über 6 Monaten Reifung. Er ist fester, intensiver.
Und schließlich der Alte, mit über einem Jahr Reifung in der Kammer. Ein Käse, der geduldig gereift ist, bis er eine außergewöhnliche Geschmackstiefe entwickelt hat: brüchig und kraftvoll.

Unser Frischkäse wird auf dieselbe traditionelle Art hergestellt. Allerdings wird pasteurisierte Milch verwendet, ohne Zusatz von Zusatz- oder Konservierungsstoffen. Er zeichnet sich durch einen sehr milden Geschmack und ein intensives Weiß aus.
Unser Rezept ist ein kostbares Gut, ein ererbtes Rezept, das Sie auf keinem anderen Hof finden werden.

Doch die Neugier unserer Käser endet hier nicht. Wir stellen auch eine Gourmet-Linie her, in der wir mit Kräutern und aromatischen Geschmacksnoten spielen.

In unserem Museumsladen finden Sie Geräte, die unsere Käser in vergangenen Zeiten in Sant Patrici verwendeten. Originale Holzpressen, Formen und vieles mehr.
Es sind schlichte Gegenstände, vom Gebrauch gezeichnet, aber sie sind die stummen Zeugen eines Handwerks, das wir nicht sterben lassen wollen.

Gehen Sie nun zum fünften Punkt, wo Sie unser Weingut erwartet.`},

{id:'punto-5',num:'5',cat:'WEINKELLER',title:'Wo die Stille erschafft',nextLabel:'Museumsshop',
trans:`Spüren Sie den Wechsel beim Eintreten. Die Temperatur sinkt und das Licht dämpft sich ab.

Sie befinden sich im Weinkeller von Sant Patrici.
Wenn die Käserei der Ort der Hände war, so ist dies der Ort der Geduld.

Wein zu machen ist im Grunde eine Verhandlung mit der Zeit. Und diese Verhandlung beginnt lange vor dem Eintreffen hier, in den Weinbergen, die Sie gerade gesehen haben.

Alles startet mit der Weinlese. Es gibt einen ganz bestimmten Augenblick — manchmal eine Frage von Tagen —, in dem die Traube das perfekte Gleichgewicht zwischen Zucker und Säure erreicht. Ist man zu früh, wird der Wein dünn und körperlos. Ist man zu spät, verliert er an Frische und gewinnt an überschüssigem Alkohol. Auf Menorca, wo die sommerliche Hitze die Reifung beschleunigt, ist dieser Spielraum noch enger. Man muss schnell und treffsicher sein. Geerntet wird in den frühen Morgenstunden, wenn die Kühle der Nacht noch auf der Haut der Traube liegt, damit sie in bestem Zustand im Keller ankommt.

Einmal hier drin, beginnt die Traube ihre Verwandlung. Der erste Schritt ist das Entrappen: Jede Beere wird vom Stielgerüst, dem Rappen, getrennt, denn dieser holzige Teil würde dem Wein Bitterkeit und Adstringenz verleihen. Das geschieht behutsam, ohne die Kerne zu zerbrechen, die ebenfalls unerwünschte Aromen abgeben könnten.

Danach kommt das Quetschen, eine sanfte Pressung, die den Most — den Saft — freisetzt, ohne die Schalen übermäßig zu zerdrücken.
Bei den Weißweinen verwenden wir Prensal, Chardonnay und Muskateller. Dabei wird der Most rasch von den Schalen getrennt, um einen klaren und feinen Saft zu erhalten.
Bei den Rotweinen verwenden wir Merlot, Cabernet Sauvignon und Syrah. Der Most vergärt tagelang im Kontakt mit den Schalen, denn dort sitzen die Farbe, die Tannine und ein großer Teil des Geschmacks.

Und hier tut Sant Patrici etwas, das uns auszeichnet: Wir vergären bei sehr niedriger Temperatur, um die vierzehn Grad Celsius, deutlich weniger als üblich. Warum? Weil eine langsame Gärung wie ein langes Gespräch ist: Sie fördert Nuancen zutage, die eine schnelle Gärung nie entdecken würde. Die Hefen arbeiten gemächlich, ohne Stress, und erzeugen feinere, komplexere Aromen. Die blumigen Noten, die elegante Frucht, jenes Gefühl von Frische am Gaumen: All das braucht Zeit und Kälte.

Während der Gärung verwandelt sich der Zucker der Traube in Alkohol und Kohlendioxid. Es ist ein natürlicher, uralter Vorgang, den der Mensch vor Jahrtausenden entdeckt hat und der sich im Wesentlichen nicht verändert hat: Die Traube will zu Wein werden. Wir begleiten sie nur.

Ist die Gärung beendet, folgt die Ruhephase. Schauen Sie sich um: In diesen Tanks, die Sie sehen, schläft der Wein monatelang. Doch es ist kein passiver Schlaf. Der Wein atmet; eine winzige Menge Sauerstoff verwandelt ihn langsam: Sie mildert die Tannine — jenes Gefühl von Trockenheit im Mund —, rundet den Körper ab und bringt neue Noten hervor, die die Traube allein nie hätte freigeben können.

Der Önologe entscheidet, wie lange jeder Wein ruht, wie ein Dirigent, der jedem Instrument seinen Einsatz zuweist.

Anschließend wird der Wein geklärt und 2 oder 3 Mal mit sehr feinen Filtern gefiltert.

Einmal gefiltert und geklärt, bleibt nur noch das Abfüllen, in Glasflaschen. Dort entwickelt sich der Wein schweigend und im Dunkeln weiter, verfeinert seine Aromen, fügt seine Geschmacksnoten zusammen, bis jemand ihn entkorkt und den Kreislauf vollendet.

Alle unsere Weine tragen das Siegel „Vi de la Terra Illa de Menorca", die Zertifizierung, die garantiert, dass sie aus diesen Reben, unter dieser Sonne und diesem Wind geboren wurden und vollständig auf der Insel erzeugt worden sind.

Von den Rebstöcken, die Sie draußen gesehen haben, bis zu dem Glas, das Sie in wenigen Minuten verkosten werden, sind Monate vergangen. Jede Flasche von Sant Patrici ist verdichtete Zeit. Zeit aus Sonne, aus Wind, aus Händen, aus Geduld.`},

{id:'punto-6',num:'6',cat:'MUSEUMSSHOP',title:'Der Moment zum Genießen',nextLabel:null,
trans:`Und nun ist es so weit: Der Moment ist gekommen, mit dem Zuhören aufzuhören und mit dem Kosten zu beginnen. Begeben Sie sich zu unserem Museumsladen, wo Sie eine Kombination aus unseren Käsen und unseren Weinen erwartet. Lassen Sie sich Zeit. Lassen Sie den Wein den Gaumen reinigen, lassen Sie die Fettigkeit des Käses die Säure umarmen. Suchen Sie nach den Aromen, die ich Ihnen beschrieben habe. Denn all das, was Sie heute gehört haben — die Geschichte von Fernando und Xini, die Spirale des Gartens, die Reben, die die Reblaus überlebt haben, die Hände des Käsers, die Ruhe des Weins — all das steckt, auf die eine oder andere Weise, in dem, was Sie gleich kosten werden.

Genießen Sie es. Dieser Moment gehört Ihnen.`}
],

it:[
{id:'punto-1',num:'1',cat:'EDIFICIO PRINCIPALE',title:'La casa che l\'amore proibito costruì',nextLabel:'Giardino delle Sculture',
trans:`Fermatevi un momento davanti a questa facciata. Osservate lo spessore di queste mura: più di un metro di pietra di marés, la stessa che fu posata qui nel 1918. E guardate le proporzioni: la pianta quadrata, la simmetria, quella scalinata d'ingresso. Questa non è una casa di campagna minorchina. Chi la fece costruire volle una villa in stile italiano, come quelle che aveva visto nei suoi viaggi. Sembra tranquilla, vero? Pietra chiara, buganvillee, quella luce di Minorca che accarezza ogni cosa. Ma questa casa custodisce un segreto. Perché non la commissionò un nobile, né fu eretta per una famiglia. Questa casa la costruì un amore proibito.

Per capire questa storia bisogna viaggiare prima nella Madrid di inizio Novecento. Immaginate Fernando Vives: nato a Mahón nel 1867, figlio dell'alta borghesia minorchina, ma trasferitosi nella capitale, dove aveva costruito un piccolo impero. Era proprietario de "La Mahonesa", celebri pasticcerie che portavano i dolci di Minorca nei salotti di Madrid. Collezionista di antichità, appassionato d'arte araba. Suo fratello Antonio divenne uno dei più importanti numismatici di Spagna, dichiarato Figlio Illustre di Mahón. I Vives erano gente di peso. E Fernando era sposato con Francisca Segura —Paca, come la chiamavano tutti—, una donna che veniva dal mondo dello spettacolo e della zarzuela.

Ma Madrid gli pesava. Fernando sentiva la nostalgia dell'isola, della calma, del profumo della campagna. E nel 1917 acquistò questa tenuta cercando un rifugio dove respirare lontano dal frastuono della capitale. Il problema fu che a Paca, abituata alla vita madrilena, quella quiete minorchina non interessava minimamente. Fernando veniva solo. E siccome a quell'epoca un uomo non si occupava della casa, assunse una giovane perché lo aiutasse.

Si chiamava Virginia López Álvarez, anche se tutti avrebbero finito per conoscerla come Xini. Era arrivata da Valladolid, figlia di una famiglia umile ed enorme —sua madre ebbe venti figli, di cui ne sopravvissero diciotto—. Xini lavorava già per Fernando a Madrid, nella pasticceria. Ora la portò a Minorca perché si prendesse cura della casa.

Quello che accadde dopo era forse inevitabile. Fernando veniva sempre più spesso. Si fermava sempre più a lungo. Finché non smise di ripartire. Si era innamorato di Xini. Paca, venutolo a sapere, abbandonò la tenuta e andò a vivere a Mahón. E questa casa, quella che avete davanti, divenne il focolare di Fernando e Xini.

Lui la riempì di tutto ciò che lei meritava: statue di marmo delle quattro stagioni in giardino, tende di velluto rosso, un letto dalle sbarre dorate con lenzuola di seta. Fernando, pittore dilettante, la ritraeva sotto il porticato mentre la brezza entrava da queste stesse finestre che state osservando adesso. Per darvi un'idea di chi fosse Xini: si racconta che camminasse da questa tenuta fino al paese con un vassoio di pastissets in equilibrio sulla testa, eretta come una regina, con i suoi gioielli addosso e i tacchi —sì, i tacchi su una strada sterrata—. A Ferreries la chiamavano la Gilda, come l'attrice del cinema. Era quel tipo di donna.

Vissero qui la loro età d'oro. Isolati, sì. Ma liberi.

Finché Fernando morì, nel gennaio del 1941. Aveva 73 anni.

E allora, il silenzio. Immaginate questa casa senza la sua voce, senza le sue feste, senza il profumo dei dolci che sfornava. Tre mesi prima di morire, sapendo ciò che stava per arrivare, Fernando aveva fatto l'unica cosa che poteva: dividere la sua vita in due. La casa e il giardino li cedette a Xini, in vita. Tutto il resto —le pasticcerie, le proprietà di Mahón, il denaro— andò a Paca, la sua moglie legittima.

Da un giorno all'altro, Xini si ritrovò con le pareti, ma senza nulla dentro. Licenziò il giardiniere. Comprò galline, maiali, un paio di mucche da latte. E dove prima c'erano marmo e musica, cominciarono a comparire animali dappertutto. Le mucche si grattavano contro le statue delle quattro stagioni. I maiali dormivano dove un tempo si ballava. Xini imparò a mungere, a mietere, a fare il formaggio —un formaggio bianco e salato che vendeva nelle botteghe di Ferreries—. La povertà la spinse a rubare ortaggi dalle tenute vicine per sopravvivere. Ma non smise mai di camminare eretta. E sempre coi tacchi: alla fine, con le mani distrutte dal lavoro, non riusciva più a infilarseli da sola. Camminava scalza fino a casa della sua amica Rafela, portando le scarpe in una borsa, e le chiedeva di aiutarla a metterseli. Sempre col tacco.

Venticinque anni resistette qui, da sola. Senza arrendersi. Senza andarsene. Come se andarsene significasse tradire la memoria di Fernando.

Morì nell'ottobre del 1966, a 69 anni. La trovarono le sue amiche in cucina, seduta su una sedia, con la testa appoggiata sul tavolo. Sulla sua tomba, nel cimitero di Mahón, non c'è alcuna lapide che ne ricordi il nome.

I suoi fratelli arrivarono dalla penisola, vendettero il poco che aveva un valore e bruciarono il resto. Letteralmente. Ammassarono materassi, ritratti, quadri, lettere, tappeti, mobili —un'intera vita— nel cortile, e vi appiccarono il fuoco. Cenere e silenzio chiusero la storia di Fernando e Xini.

Ma la terra ricorda.

Con il passare degli anni, questa tenuta cambiò di mano più volte, finché qualcuno vide in essa ciò che Fernando aveva visto nel 1917: non un affare, ma una possibilità. Quello che oggi vedete intorno a voi —l'hotel, il caseificio, la cantina, i vigneti— è un atto di resurrezione. È la prova che un luogo che ha conosciuto l'amore, la decadenza e l'abbandono può rinascere e dare frutti. Frutti che oggi, letteralmente, potrete assaporare.

Camminate ora verso sinistra, dove troverete la segnaletica del punto numero due. Vi attende un giardino che parla in silenzio.`},

{id:'punto-2',num:'2',cat:'GIARDINO DELLE SCULTURE',title:'Dieci voci nella spirale',nextLabel:'Le Sculture una a una',
trans:`Avete appena ascoltato una storia di fuoco. I fratelli di Xini bruciarono tutto ciò che si trovava in questa tenuta: i quadri, le lettere, i mobili, la memoria. E per anni, qui non ci fu nulla. Solo terra silenziosa.

Quello che avete ora davanti è la risposta.

Prima di guardare le sculture, vi chiedo di osservare il suolo. Fate attenzione alla forma del sentiero che state per percorrere. La vedete? È una spirale. Non è una decorazione: è una scelta. Questo giardino, che occupa più di diecimila metri quadrati, è stato progettato dal paesaggista Josep Bosch Espelta, discepolo del grande Nicolau Maria Rubió i Tudurí. E Bosch scelse la spirale perché è la forma che assume la vita. È nelle galassie, nelle conchiglie delle lumache, nella doppia elica del DNA. Se il tracciato vi ricorda qualcosa, probabilmente è il Museo Guggenheim di New York: il disegno di questo giardino si ispira direttamente alla rampa elicoidale di Frank Lloyd Wright. Voi, camminando lungo questo sentiero, percorrerete quella stessa idea: il cammino dell'essere umano sulla Terra.

Ciò che accadde qui per riempirlo di voci fu straordinario. Nel maggio del 2003, Minorca festeggiava dieci anni come Riserva della Biosfera, e per celebrarlo si organizzò il Primo Simposio Internazionale Hort Sant Patrici. Per venticinque giorni, quattordici artisti provenienti da tutto il mondo —una paraguaiana, un italiano, una coreana, un egiziano, un rumeno, un haitiano residente in Belgio...— convissero in questa tenuta. Mangiarono insieme, discussero insieme, lavorarono la pietra insieme. E da quella convivenza nacquero dieci sculture scolpite in marmo di Carrara. Dieci risposte diverse a una stessa domanda: qual è il rapporto dell'essere umano con la natura?

Durante la passeggiata, le incontrerete una a una. Vedrete la fontana di Nélida Mendoza, l'artista paraguaiana, che ha usato l'acqua come materia viva: l'acqua cade sulla pietra e la modella lentamente, così come il tempo modella la Terra. È l'unica opera che non si trova qui in giardino; la troverete accanto al lago, perché il suo messaggio aveva bisogno di un altro scenario.

Troverete la Bilancia di Giacomo Santini, giovanissimo scultore italiano che ha voluto ricordarci quanto sia fragile l'equilibrio tra l'uomo e la natura. Le mani che vedrete nell'opera sono reali: sono calchi delle mani di bambini che vennero durante il simposio.

E vedrete la Terra di George Dan Istrate, lo scultore rumeno: una sfera perfetta spezzata da un taglio netto. È l'intervento dell'uomo. Se non cambiamo rotta, la frattura sarà irreversibile.

Così, scultura dopo scultura, questo giardino vi parlerà. Ascoltatelo. Ogni opera è una lettera d'amore —o di avvertimento— all'isola che ci accoglie.

Prendetevi il vostro tempo. Quando siete pronti, seguite la spirale fino al punto tre, dove la memoria di questa terra si fa liquida. E se desiderate conoscere ogni scultura nel dettaglio, restate: percorreremo le dieci voci di questo giardino, una a una.`},

{id:'punto-2b',num:'2b',cat:'LE SCULTURE UNA A UNA',title:'Marmo con un nome',nextLabel:'Vigneti',
trans:`Nélida Mendoza — Paraguay.
Iniziamo da quella che non si trova qui. L'opera di Nélida si trova nel lago dell'hotel, e c'è una ragione potente: la sua materia prima non è solo la pietra, ma l'acqua. Nélida utilizza l'acqua come un elemento vivo che trasforma la scultura con il passare del tempo. L'acqua dà lentamente forma a una fontana che rappresenta la Terra. È un'opera che cambia, che invecchia, che respira. Per questo doveva trovarsi dove l'acqua comanda.

Giacomo Santini — Italia.
Giacomo era poco più che un ragazzo quando arrivò al simposio, ma il suo messaggio era quello di un saggio. La sua «Bilancia» ci parla del fragile equilibrio tra la forza della natura e quella dell'uomo. Le mani che vedete nell'opera non sono inventate: sono calchi reali delle mani di bambini che parteciparono durante quei venticinque giorni. L'innocenza che sorregge il peso del mondo.

Oliviero Bertolasso — Italia e Germania.
L'italo-tedesco ha scelto la figura umana per lanciare un messaggio scomodo. La sua opera è figurativa e deliberatamente pessimista: ci mette di fronte al futuro della natura e alla responsabilità che abbiamo nella sua conservazione. Non è una scultura che cerca di piacere; cerca di mettere a disagio. E in ciò risiede la sua forza.

Shin Myong-Ok — Corea.
L'artista coreana ci conduce sul terreno spirituale. La sua scultura evoca l'imposizione delle mani, quel gesto universale che, a seconda della cultura, può significare guarigione o distruzione, benedizione o condanna. Le forme che vedete suggeriscono mani aperte sulla natura. La domanda che lascia in sospeso è potente: stiamo guarendo la Terra o la stiamo ammalando?

Tristán Casamajor — Haiti, residente in Belgio.
Tristán ha creato un enorme totem che gioca con gli elementi e utilizza il sole come protagonista. È, letteralmente, una meridiana: l'evoluzione naturale della Terra segnata dalla luce. Se osservate bene le forme del totem, scoprirete silhouette che ricordano il corpo umano. Il tempo della natura e il tempo dell'uomo, che si fondono nella stessa pietra.

Said Badr — Egitto.
L'egiziano ha concepito un'opera verticale, quasi monumentale, dedicata a esaltare la grandezza della natura a Minorca. La verticalità non è casuale: è la terra che si erge, che si innalza, che reclama la propria presenza di fronte a un essere umano che tende a guardare solo in avanti. Said ci chiede di guardare verso l'alto.

George Dan Istrate — Romania.
Questa è una delle sculture più d'impatto del giardino. Il giovane rumeno ha scolpito una sfera perfetta —la Terra— per poi spezzarla con un taglio trasversale netto. Quell'incisione è l'intervento dell'uomo: preciso, freddo, irreversibile se non agiamo in tempo. La perfezione spezzata. Un monito scolpito nel marmo di Carrara.

Toni Capó — Maiorca.
Il maiorchino ha lavorato per la prima volta con il marmo per questo simposio, e ha scelto un tema che conosce bene: la fragilità dell'essere umano di fronte alla durezza della natura. La sua scultura figurativa evoca la forma delle rocce aspre della costa settentrionale dell'isola, quella costa flagellata senza pietà dalla tramontana. L'uomo scolpito nella roccia, che resiste al vento. O che cerca di farlo.

Filippo Tincolini — Italia.
Filippo utilizza il corpo umano come veicolo concettuale. La sua opera rappresenta un pube femminile e parla di fertilità, dell'origine di ogni vita. È un'opera diretta, senza metafore intermedie: la vita nasce dal corpo, e il corpo nasce dalla terra. Il cerchio che si chiude.

Ognuna di queste dieci opere è stata creata qui, in questa tenuta, con marmo di Carrara portato appositamente per il simposio. Gli artisti convissero per venticinque giorni, dormirono qui, mangiarono qui, respirarono quest'aria. E si percepisce: queste sculture non sono pezzi da museo trasportati; sono nate da questa terra e per questa terra.

Prendetevi tutto il tempo che vi serve. Quando siete pronti, seguite la spirale fino al punto tre.
.`},

{id:'punto-3',num:'3',cat:'VIGNETI',title:'Viti sopravvissute al silenzio',nextLabel:'Caseificio',
trans:`Avete appena percorso un giardino che oggi è uno degli angoli più intimi di Sant Patrici.
Anni addietro, ai tempi di Xini e Fernando, il giardino dava vita a feste della vendemmia, cene sotto le stelle, incontri in cui un pescatore di Fornells poteva sedersi accanto a un ambasciatore e nessuno chiedeva da dove venissi, ma solo se volessi restare.
Xini e Fernando avevano compreso qualcosa che poche persone comprendono: che un luogo prende vita solo quando lo riempi di persone. E che la bellezza, se non la condividi, non serve a nulla.

Qui nei Vigneti non ci sono sculture né giardini. Solo filari di vigne sotto il sole. Sembra semplice. Ma queste viti che vedete sono sopravvissute. E per capire il perché, dovete conoscere una storia che comincia più di duemila anni fa.

I romani facevano già vino a Minorca. Quest'isola, battuta dalla tramontana e accarezzata dal Mediterraneo, si rivelò un luogo straordinario per la vite. Per secoli, il vino minorchino fu un segreto ben custodito. Finché non arrivarono i britannici.

Nel XVIII secolo, Minorca passò nelle mani dell'Impero Britannico, e con essi arrivò una sete insaziabile. La Royal Navy aveva bisogno di vino, i commercianti volevano vino, e l'isola intera si trasformò in un vigneto galleggiante. Il porto di Mahón esportava milioni di litri. Fu l'età dell'oro.

E poi, il disastro. Alla fine del XIX secolo, un insetto microscopico chiamato fillossera attraversò l'Atlantico nascosto in alcune viti americane e devastò i vigneti di tutta Europa. Minorca non si salvò. In pochi anni, ciò che aveva impiegato secoli a crescere scomparve. E il silenzio si installò su questa terra per più di un secolo.

Non fu che nel 2000 che alcuni coraggiosi cominciarono a piantare di nuovo. E nel 2002, Sant Patrici decise di unirsi a quella rinascita. Furono piantati tra due e tre ettari di vigneti dove prima c'era solo campo vuoto. Nel 2005 fu fondata ufficialmente la cantina. E nel 2008 fu imbottigliato il primo vino. Sei anni dalla vite al calice. Così lenta è la pazienza quando si fa bene.

Le varietà che vedete qui non sono state scelte a caso.
Merlot, Cabernet Sauvignon e Syrah per i rossi.
Chardonnay, Moscato e Prensal per i bianchi.
Sono uve che amano le condizioni estreme: il sole brutale dell'estate minorchina, la tramontana che indurisce la buccia dell'uva e ne concentra i sapori, e la brezza marina che apporta quella sottile salinità che poi ritroverete nel calice.

Qui tutto è una questione di equilibrio. Il caldo dà zucchero, che si traduce in corpo e alcol. Il vento e il fresco notturno preservano l'acidità, che regala freschezza ed eleganza. Il risultato è un vino che può nascere solo qui. Un vino con denominazione Vi de la Terra Illa de Menorca.

Guardate le viti per un momento. Sembrano modeste, quasi fragili. Ma sotto il suolo, le loro radici si estendono per metri e metri alla ricerca di acqua e minerali. Ciò che non si vede è ciò che conta. Come in tante cose.

Camminate verso il punto quattro. Stiamo per entrare in uno dei luoghi più antichi di questa tenuta: il luogo in cui le mani trasformano il latte in storia.`},

{id:'punto-4',num:'4',cat:'CASEIFICIO',title:'Dove le mani modellano il tempo',nextLabel:'Cantina',
trans:`Vi trovate davanti al nostro caseificio, e voglio che vi prepariate a qualcosa. Se veniste la mattina, vedreste attraverso i vetri un rituale che qui si ripete esattamente come duecento anni fa. I nostri maestri casari modellano ogni forma, una a una, con le mani. Senza stampi industriali. Senza scorciatoie. Solo un panno di cotone —che chiamiamo «fogasser»—, una cordicella —il «lligam»— e la pressione di mani che sanno esattamente quanta forza applicare.

Quel sapere non si impara sui libri. Si eredita. Si trasmette di mano in mano, di gesto in gesto, lungo più di trent'anni di attività, nel nostro caso.

Lasciate che vi spieghi come nasce un formaggio a Sant Patrici, passo dopo passo.

Tutto comincia dal latte. Latte fresco di vacca del nostro territorio, della campagna di Minorca.
La qualità di quel latte determina tutto: il pascolo che mangiano le vacche, la brezza marina che impregna i campi, la terra calcarea di Minorca. Tutto questo si trova già nel latte prima che noi tocchiamo qualsiasi cosa.

Il latte viene versato in grandi tini e vi si aggiunge caglio naturale. In circa quaranta minuti, il latte si trasforma: smette di essere liquido e diventa una massa gelatinosa, la cagliata.

È un momento quasi magico, una metamorfosi silenziosa.

Allora entrano in gioco le mani. Il maestro casaro taglia la cagliata con uno strumento chiamato lira, in piccoli pezzi, perché rilasci il siero. Poi raccoglie quella cagliata e la avvolge nel fogasser, il panno di cotone tradizionale. Lo lega con il lligam, la cordicella, e inizia il processo di pressatura. Nella pressa, il siero residuo viene espulso grazie alla pressione esercitata da un peso di 4,6 kg sulla forma.

Vedete quel disegno sulla parte superiore del formaggio, quella sorta di incisione in rilievo? La chiamiamo «mamella». Non è una decorazione: è l'impronta che lascia il panno quando viene annodato sulla cagliata. È la firma del metodo tradizionale. Se un formaggio ha la mamella, potete essere certi che mani umane gli hanno dato forma.

Poi arriva il bagno in salamoia. Il formaggio viene immerso in una soluzione di acqua e sale per diverse ore. Il sale penetra lentamente, agisce come conservante naturale e inizia a definire il sapore. E da lì, il formaggio entra nella fase più misteriosa: la stagionatura. In celle a temperatura e umidità controllate, il tempo fa il suo lavoro. Settimane, mesi, a volte più di un anno.

Il formaggio Mahón-Menorca ha Denominazione di Origine Protetta, il che significa che può essere prodotto solo su quest'isola, con latte di vacca della campagna minorchina, seguendo un metodo specifico e normative molto rigorose.

È uno dei formaggi più antichi di Spagna —sono stati trovati resti di utensili caseari in siti preistorici di Minorca—. Stiamo parlando di un mestiere che ha più di tremila anni.

E a Sant Patrici, quel mestiere si traduce in una famiglia di formaggi dalle personalità molto diverse.

All'interno della nostra gamma con Denominazione di Origine troverete tre stagionature. Il Semistagionato, con più di 3 mesi di stagionatura in cella. È il nostro formaggio più versatile e quello che meglio rappresenta l'essenza della D.O.P.
Segue lo Stagionato, che ha trascorso più tempo in cella, con più di 6 mesi di stagionatura. È più compatto, più intenso.
Infine, l'Invecchiato, con più di 1 anno di stagionatura in cella. Un formaggio che è maturato pazientemente fino a sviluppare una profondità di sapore straordinaria: friabile e potente.

Il nostro Formaggio fresco è prodotto nello stesso modo tradizionale. Tuttavia, si utilizza latte pastorizzato, senza aggiungere additivi né conservanti. Si caratterizza per un sapore molto delicato e un colore bianco intenso.
La nostra ricetta è un bene molto prezioso, una ricetta ereditata, che non troverete in nessun'altra tenuta.

Ma la curiosità dei nostri casari non si ferma qui. Produciamo anche una linea gourmet, in cui giochiamo con erbe e sapori aromatici.

Nella nostra bottega-museo troverete utensili che venivano usati dai casari di Sant Patrici di un tempo. Presse di legno originali, gli stampi, e così via.
Sono oggetti umili, logorati dall'uso, ma sono i testimoni muti di un mestiere che ci rifiutiamo di lasciar morire.

Camminate ora verso il punto cinque, dove troverete la nostra cantina.`},

{id:'punto-5',num:'5',cat:'CANTINA',title:'Dove il silenzio crea',nextLabel:'Negozio Museo',
trans:`Notate il cambiamento entrando qui. La temperatura scende e la luce si attenua.

Vi trovate nella cantina di Sant Patrici.
Se il caseificio era il luogo delle mani, questo è il luogo della pazienza.

Fare il vino è, in fondo, una negoziazione con il tempo. E quella negoziazione comincia molto prima di arrivare qui, nelle vigne che avete appena visto.

Tutto parte dalla vendemmia. C'è un istante preciso —a volte una questione di giorni— in cui l'uva raggiunge l'equilibrio perfetto tra zucchero e acidità. Se ti anticipi, il vino sarà esile e senza corpo. Se ti attardi, perderà freschezza e guadagnerà un eccesso di alcol. A Minorca, dove il caldo estivo accelera la maturazione, quel margine è ancora più stretto. Bisogna essere rapidi e precisi. Si raccoglie alle prime ore del mattino, con il fresco della notte ancora sulla buccia dell'uva, perché arrivi in cantina nelle migliori condizioni.

Una volta qui dentro, l'uva comincia la sua trasformazione. Il primo passo è la diraspatura: separare ogni acino dal raspo, quella parte legnosa che conferirebbe amarezza e astringenza al vino. Si procede con cautela, senza rompere i vinaccioli, che potrebbero anch'essi rilasciare sapori indesiderati.

Poi arriva la pigiatura, una pressatura delicata che libera il mosto —il succo— senza schiacciare eccessivamente le bucce.
Per i vini bianchi utilizziamo Prensal, Chardonnay e Moscato. Il mosto viene separato rapidamente dalle bucce per ottenere un succo pulito e delicato.
Per i rossi utilizziamo Merlot, Cabernet Sauvignon, Syrah. Il mosto fermenta a contatto con le bucce per diversi giorni, perché è lì che risiedono il colore, i tannini e gran parte del sapore.

Ed è qui che Sant Patrici fa qualcosa che ci distingue: fermentiamo a temperature molto basse, intorno ai quattordici gradi centigradi, decisamente meno del consueto. Perché? Perché una fermentazione lenta è come una lunga conversazione: estrae sfumature che una fermentazione rapida non scoprirebbe mai. I lieviti lavorano con calma, senza stress, e producono aromi più fini, più complessi. Le note floreali, la frutta elegante, quella sensazione di freschezza in bocca: tutto questo ha bisogno di tempo e di freddo.

Durante la fermentazione, lo zucchero dell'uva si trasforma in alcol e anidride carbonica. È un processo naturale, ancestrale, che l'essere umano ha scoperto migliaia di anni fa e che, nella sua essenza, non è cambiato: l'uva vuole diventare vino. Noi ci limitiamo ad accompagnarla.

Terminata la fermentazione, arriva il riposo. Guardatevi intorno: in quelle vasche che vedete, il vino dorme per mesi. Ma non è un sonno passivo. Il vino respira, una quantità minuscola di ossigeno lo trasforma lentamente: ammorbidisce i tannini —quella sensazione di asciuttezza in bocca—, arrotonda il corpo e lascia emergere note nuove che l'uva da sola non avrebbe mai saputo dare.

L'enologo decide quanto tempo riposa ogni vino, come un direttore d'orchestra che assegna a ogni strumento il suo momento.

Dopodiché, il vino viene chiarificato e filtrato 2 o 3 volte, con filtri molto fini.

Una volta filtrato e chiarificato, non resta che imbottigliare, in bottiglia di vetro. Lì il vino continua a evolversi in silenzio e nell'oscurità, affinando i suoi aromi, integrando i suoi sapori, finché qualcuno non lo stapperà per completare il ciclo.

Tutti i nostri vini portano il marchio «Vi de la Terra Illa de Menorca», la certificazione che garantisce che sono nati da queste vigne, sotto questo sole e questo vento, e che sono stati prodotti interamente sull'isola.

Dalle viti che avete visto fuori fino al calice che assaggerete tra pochi minuti, saranno passati dei mesi. Ogni bottiglia di Sant Patrici è tempo condensato. Tempo di sole, di vento, di mani, di attesa.`},

{id:'punto-6',num:'6',cat:'NEGOZIO MUSEO',title:'Il momento di assaporare',nextLabel:null,
trans:`E ora sì: è arrivato il momento di smettere di ascoltare e iniziare ad assaporare. Dirigetevi verso la nostra bottega-museo, dove vi attende un abbinamento dei nostri formaggi e dei nostri vini. Non abbiate fretta. Lasciate che il vino pulisca il palato, che la grassezza del formaggio abbracci l'acidità. Cercate i sapori che vi ho descritto. Perché tutto ciò che avete ascoltato oggi —la storia di Fernando e Xini, la spirale del giardino, le viti sopravvissute alla fillossera, le mani del casaro, il riposo del vino— tutto questo è, in qualche modo, in ciò che state per assaggiare.

Godetevelo. Questo momento è vostro.`}
]
};

let lang = 'es';
let currentStop = 0;
let isPlaying = false;
let playbackRate = 1;
const audio = document.getElementById('audioEl');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  document.getElementById('welcomeSub').textContent = UI[l].subtitle;
  document.getElementById('startBtn').textContent = UI[l].start;
}

(function initWelcome() {
  const sel = document.getElementById('langSelector');
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-btn' + (l === lang ? ' active' : '');
    b.dataset.lang = l;
    b.textContent = LANG_LABELS[l];
    b.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setLang(l);
    });
    sel.appendChild(b);
  });
  document.getElementById('welcomeSub').textContent = UI[lang].subtitle;
  document.getElementById('startBtn').textContent = UI[lang].start;
  document.getElementById('startBtn').addEventListener('click', function() {
    renderStopList();
  });
})();

function renderStopList() {
  const ui = UI[lang];
  const stops = STOPS[lang];
  document.getElementById('listSub').textContent = ui.subtitle;
  document.getElementById('changeLangBtn').textContent = '🌐 ' + ui.changeLang + ' (' + LANG_LABELS[lang] + ')';
  document.getElementById('changeLangBtn').onclick = () => { stopAudio(); showScreen('welcome'); };
  const c = document.getElementById('stopsContainer');
  c.innerHTML = '';
  stops.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'stop-card fade-in';
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="stop-num ${s.num.includes('b') ? 'sub' : ''}">${s.num}</div>
      <div class="stop-info">
        <div class="stop-cat">${s.cat}</div>
      </div>
      <div class="stop-arrow">→</div>`;
    card.onclick = () => openStop(i);
    c.appendChild(card);
  });
  showScreen('stoplist');
}

function openStop(index) {
  currentStop = index;
  const ui = UI[lang];
  const s = STOPS[lang][index];
  document.getElementById('detailNum').textContent = s.num;
  document.getElementById('detailCat').textContent = s.cat;
  document.getElementById('detailTitle').textContent = s.title;
  document.getElementById('transLabel').textContent = ui.readTrans;
  document.getElementById('transInner').textContent = s.trans;
  const nextBtn = document.getElementById('nextBtn');
  if (s.nextLabel) {
    nextBtn.style.display = 'flex';
    nextBtn.innerHTML = ui.next + ': ' + s.nextLabel + ' →';
    nextBtn.onclick = () => openStop(index + 1);
  } else {
    nextBtn.style.display = 'flex';
    nextBtn.innerHTML = ui.endTitle + ' 🌅';
    nextBtn.onclick = () => showEnd();
  }
  resetPlayer();
  loadAudio(s.id);
  document.getElementById('transToggle').classList.remove('open');
  document.getElementById('transText').classList.remove('open');
  showScreen('detail');
}

function showEnd() {
  const ui = UI[lang];
  document.getElementById('endTitle').textContent = ui.endTitle;
  document.getElementById('endText').textContent = ui.endText;
  document.getElementById('restartBtn').textContent = ui.restart;
  document.getElementById('restartBtn').onclick = () => showScreen('welcome');
  stopAudio();
  showScreen('endscreen');
}

function loadAudio(id) {
  const errEl = document.getElementById('audioError');
  const errMsg = document.getElementById('audioErrorMsg');
  errEl.style.display = 'none';
  audio.src = 'audio/' + lang + '/' + id + '.mp3';
  audio.playbackRate = playbackRate;
  audio.load();
  audio.onerror = function() {
    errEl.style.display = 'block';
    errMsg.innerHTML = '⚠️ ' + UI[lang].errAudio + '<br><span>' + UI[lang].errSub + ' <b>audio/' + lang + '/</b></span>';
  };
}

function resetPlayer() {
  stopAudio();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('totalTime').textContent = '0:00';
  playbackRate = 1;
  document.getElementById('speedBtn').textContent = '1x';
}

function stopAudio() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
}

function togglePlay() {
  if (audio.error || !audio.src) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
  } else {
    audio.play().then(function() {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
    }).catch(function() {});
  }
}

function rewind10() { audio.currentTime = Math.max(0, audio.currentTime - 10); }

function cycleSpeed() {
  var speeds = [1, 1.5, 2];
  var i = (speeds.indexOf(playbackRate) + 1) % speeds.length;
  playbackRate = speeds[i];
  audio.playbackRate = playbackRate;
  document.getElementById('speedBtn').textContent = playbackRate + 'x';
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  document.getElementById('progressFill').style.width = ((audio.currentTime / audio.duration) * 100) + '%';
  document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', function() {
  document.getElementById('totalTime').textContent = fmtTime(audio.duration);
});
audio.addEventListener('ended', function() {
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
});
document.getElementById('progressBar').addEventListener('click', function(e) {
  if (!audio.duration) return;
  var rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('rewindBtn').addEventListener('click', rewind10);
document.getElementById('speedBtn').addEventListener('click', cycleSpeed);
document.getElementById('backBtn').addEventListener('click', function() {
  stopAudio();
  renderStopList();
});
document.getElementById('transToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('transText').classList.toggle('open');
});
</script>
</body>
</html>
