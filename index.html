.lang-btn{padding:.55rem 1rem;border:1.5px solid rgba(255,255,255,.45);border-radius:8px;background:transparent;color:#fff;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;letter-spacing:1px;transition:all .25s;-webkit-tap-highlight-color:transparent}
.lang-btn:hover,.lang-btn.active{background:#fff;color:var(--verde);border-color:#fff}
.start-btn{background:#fff;color:var(--verde);border:none;padding:1rem 2.5rem;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;z-index:1}

.header-lang:active{background:rgba(255,255,255,.2)}
.list-logo{height:50px;width:auto;filter:brightness(0) invert(1)}
.list-header h2{font-size:1.5rem;margin-bottom:.15rem;letter-spacing:2px}

const STOPS = {
es:[
{id:'punto-1',num:'1',cat:'EDIFICIO PRINCIPAL',nextLabel:'Jardín de las Esculturas',
trans:`Deténganse un momento frente a esta fachada. Fíjense en el grosor de estos muros: tienen más de un metro de piedra de marés, la misma que se colocó aquí en 1918. Y miren las proporciones: la planta cuadrada, la simetría, esa escalinata de entrada. Esto no es una casa de campo menorquina. Quien la mandó construir quiso una villa al estilo italiano, como las que había visto en sus viajes. Parece tranquila, ¿verdad? Piedra clara, buganvillas, esa luz de Menorca que lo acaricia todo. Pero esta casa guarda un secreto. Porque no la encargó un noble ni la levantó para una familia. Esta casa la construyó un amor prohibido.

Para entender esta historia hay que viajar primero al Madrid de principios del siglo XX. Imaginen a Fernando Vives: nacido en Mahón en 1867, hijo de la alta burguesía menorquina, pero afincado en la capital, donde había levantado un pequeño imperio. Era dueño de "La Mahonesa", unas pastelerías célebres que llevaban los dulces de Menorca a los salones de Madrid. Coleccionista de antigüedades, apasionado del arte árabe. Su propio hermano, Antonio, llegó a ser uno de los numismáticos más importantes de España, declarado Hijo Ilustre de Mahón. Los Vives eran gente de peso. Y Fernando estaba casado con Francisca Segura —Paca, como la llamaban todos—, una mujer que venía del mundo del espectáculo y la zarzuela.

Pero Madrid le pesaba. Fernando echaba de menos la isla, la calma, el olor a campo. Y en 1917 compró esta finca buscando un refugio donde respirar lejos del ruido de la capital. El problema fue que a Paca, acostumbrada a la vida madrileña, aquella tranquilidad menorquina no le interesaba lo más mínimo. Fernando venía solo. Y como en aquella época un hombre no se hacía la casa, contrató a una joven para que le ayudara.

Se llamaba Virginia López Álvarez, aunque todo el mundo acabaría conociéndola como Xini. Había llegado de Valladolid, hija de una familia humilde y enorme —su madre tuvo veinte hijos, de los que sobrevivieron dieciocho—. Xini ya trabajaba para Fernando en Madrid, en la pastelería. Ahora la trajo a Menorca para encargarse de la casa.

Lo que pasó después era quizá inevitable. Fernando, cada vez, venía más. Se quedaba más tiempo. Hasta que dejó de irse. Se había enamorado de Xini. Paca, al enterarse, abandonó la finca y se marchó a vivir a Mahón. Y esta casa, la que ustedes tienen delante, se convirtió en el hogar de Fernando y Xini.

Él la llenó de todo lo que ella merecía: estatuas de mármol de las cuatro estaciones en el jardín, cortinas de terciopelo rojo, una cama de barras doradas con sábanas de seda. Fernando, pintor aficionado, la retrataba en el porche mientras la brisa entraba por esas mismas ventanas que ustedes están viendo ahora. Para que se hagan una idea de quién era Xini: cuentan que caminaba desde esta finca hasta el pueblo con una bandeja de pastissets equilibrada sobre la cabeza, erguida como una reina, con sus joyas puestas y sus tacones —sí, tacones en un camino de tierra—. En Ferreries la llamaban la Gilda, como la actriz de cine. Era ese tipo de mujer.

Vivieron aquí su edad dorada. Aislados, sí. Pero libres.

Hasta que Fernando murió, en enero de 1941. Tenía 73 años.

Y entonces, el silencio. Imaginen esta casa sin su voz, sin sus fiestas, sin el olor de los dulces que horneaba. Tres meses antes de morir, sabiendo lo que venía, Fernando había hecho lo único que podía: partir su vida en dos. La casa y el jardín se los cedió a Xini, en vida. Todo lo demás —las pastelerías, las propiedades de Mahón, el dinero— fue para Paca, su esposa legítima.

De la noche a la mañana, Xini se quedó con las paredes, pero sin nada dentro. Despidió al jardinero. Compró gallinas, cerdos, un par de vacas lecheras. Y donde antes había mármol y música, empezaron a aparecer animales por todas partes. Las vacas se rascaban contra las estatuas de las cuatro estaciones. Los cerdos dormían donde antes se bailaba. Xini aprendió a ordeñar, a segar, a hacer queso —un queso blanco y salado que vendía en las tiendas de Ferreries—. La pobreza la empujó a robar hortalizas de las fincas vecinas para sobrevivir. Pero jamás dejó de caminar erguida. Y siempre con tacones: al final, con las manos destrozadas por el trabajo, ya no podía calzárselos sola. Caminaba descalza hasta casa de su amiga Rafela, llevando los zapatos en una bolsa, y le pedía que la ayudara a ponérselos. Siempre fue con tacón.

Veinticinco años resistió aquí sola. Sin rendirse. Sin marcharse. Como si irse fuera traicionar la memoria de Fernando.

Murió en octubre de 1966, a los 69 años. La encontraron sus amigas en la cocina, sentada en una silla, con la cabeza sobre la mesa. En su tumba, en el cementerio de Mahón, no hay ninguna lápida que recuerde su nombre.

Sus hermanos llegaron de la península, vendieron lo poco que valía y quemaron el resto. Literalmente. Apilaron colchones, retratos, cuadros, cartas, alfombras, muebles —toda una vida— en el patio, y les prendieron fuego. Ceniza y silencio cerraron la historia de Fernando y Xini.

Pero la tierra recuerda.

Con los años, esta finca fue cambiando de manos hasta que alguien vio en ella lo que Fernando vio en 1917: no un negocio, sino una posibilidad. Lo que hoy ven a su alrededor —el hotel, la quesería, la bodega, los viñedos— es un acto de resurrección. Es la prueba de que un lugar que conoció el amor, la decadencia y el abandono puede renacer y dar frutos. Frutos que hoy, literalmente, ustedes van a poder saborear.

Caminen ahora hacia la izquierda, donde verán la señalización del punto número dos. Les espera un jardín que habla en silencio.`},

{id:'punto-2',num:'2',cat:'JARDÍN DE LAS ESCULTURAS',title:'Diez voces en la espiral',nextLabel:'Las Esculturas una a una',
trans:`Acaban de escuchar una historia de fuego. Los hermanos de Xini quemaron todo lo que había en esta finca: los cuadros, las cartas, los muebles, la memoria. Y durante años, aquí no hubo nada. Solo tierra callada.

Lo que tienen ahora delante es la respuesta.

Antes de mirar las esculturas, les pido que miren el suelo. Fíjense en la forma del camino que van a recorrer. ¿La ven? Es una espiral. No es decoración: es una decisión. Este jardín, que ocupa más de diez mil metros cuadrados, fue diseñado por el paisajista Josep Bosch Espelta, discípulo del gran Nicolau Maria Rubió i Tudurí. Y Bosch eligió la espiral porque es la forma que adopta la vida. Está en las galaxias, en las conchas de los caracoles, en la doble hélice del ADN. Si el trazado les recuerda a algo, probablemente sea al Museo Guggenheim de Nueva York: el diseño de este jardín está inspirado directamente en la rampa helicoidal de Frank Lloyd Wright. Ustedes, al caminar por este sendero, van a recorrer esa misma idea: el paso del ser humano por la Tierra.

Lo que ocurrió aquí para llenarlo de voces fue extraordinario. En mayo de 2003, Menorca cumplía diez años como Reserva de la Biosfera, y para celebrarlo se organizó el Primer Simposio Internacional Hort Sant Patrici. Durante veinticinco días, catorce artistas de todo el mundo —una paraguaya, un italiano, una coreana, un egipcio, un rumano, un haitiano afincado en Bélgica...— convivieron en esta finca. Comieron juntos, discutieron juntos, trabajaron la piedra juntos. Y de esa convivencia nacieron diez esculturas talladas en mármol de Carrara. Diez respuestas distintas a una misma pregunta: ¿cuál es la relación del ser humano con la naturaleza?

Mientras pasean, irán encontrándolas. Verán la fuente de Nélida Mendoza, la artista paraguaya, que usó el agua como materia viva: el agua cae sobre la piedra y la va moldeando lentamente, igual que el tiempo moldea la Tierra. Es la única pieza que no está aquí en el jardín; la encontrarán junto al lago, porque su mensaje necesitaba otro escenario.

Encontrarán la Balanza de Giacomo Santini, un jovencísimo escultor italiano que quiso recordarnos que el equilibrio entre el hombre y la naturaleza es frágil. Las manos que verán en la pieza son reales: son moldes de las manos de niños que vinieron durante el simposio.

Y verán la Tierra de George Dan Istrate, el escultor rumano: una esfera perfecta partida por un corte limpio. Es la intervención del hombre. Si no cambiamos de rumbo, la fractura será irreversible.

Así, escultura a escultura, este jardín les irá hablando. Escúchenlo. Cada pieza es una carta de amor —o de advertencia— a la isla que nos acoge.

Tómense su tiempo. Cuando estén listos, sigan la espiral hacia el punto tres, donde la memoria de esta tierra se hace líquida. Y si desean conocer cada escultura en detalle, quédense: vamos a recorrer las diez voces de este jardín, una a una.`},

{id:'punto-2b',num:'2b',cat:'LAS ESCULTURAS UNA A UNA',nextLabel:'Viñedos',
trans:`Nélida Mendoza — Paraguay.
Empezamos por la que no está aquí. La obra de Nélida se encuentra en el lago del hotel, y hay una razón poderosa: su materia prima no es solo la piedra, sino el agua. Nélida utiliza el agua como un elemento vivo que transforma la escultura con el paso del tiempo. El agua va dando forma lentamente a una fuente que representa la Tierra. Es una obra que cambia, que envejece, que respira. Por eso necesitaba estar donde el agua manda.

Giacomo Santini — Italia.
Giacomo era apenas un joven cuando llegó al simposio, pero su mensaje era el de un sabio. Su «Balanza» nos habla del equilibrio frágil entre la fuerza de la naturaleza y la del hombre. Las manos que ven en la pieza no son inventadas: son moldes reales de las manos de niños que participaron durante aquellos veinticinco días. La inocencia sosteniendo el peso del mundo.

Oliviero Bertolasso — Italia y Alemania.
El italo-alemán eligió la figura humana para lanzar un mensaje incómodo. Su obra es figurativa y deliberadamente pesimista: nos confronta con el futuro de la naturaleza y con la responsabilidad que tenemos en su conservación. No es una escultura que busque agradar; busca incomodar. Y en eso reside su fuerza.

Shin Myong-Ok — Corea.
La artista coreana nos lleva al terreno espiritual. Su escultura evoca la imposición de manos, ese gesto universal que según la cultura puede significar curación o destrucción, bendición o condena. Las formas que ven sugieren manos abiertas sobre la naturaleza. La pregunta que deja en el aire es poderosa: ¿estamos sanando la Tierra o estamos enfermándola?

Tristán Casamajor — Haití, residente en Bélgica.
Tristán creó un enorme tótem que juega con los elementos y utiliza el sol como protagonista. Es, literalmente, un reloj de sol: la evolución natural de la Tierra marcada por la luz. Si se fijan en las formas del tótem, descubrirán siluetas que recuerdan al cuerpo humano. El tiempo de la naturaleza y el tiempo del hombre, fundiéndose en la misma piedra.

Said Badr — Egipto.
El egipcio concibió una obra vertical, casi monumental, dedicada a ensalzar la magnitud de la naturaleza en Menorca. La verticalidad no es casual: es la tierra que se yergue, que se alza, que reclama su presencia frente a un ser humano que tiende a mirar solo hacia adelante. Said nos pide que miremos hacia arriba.

George Dan Istrate — Rumanía.
Esta es una de las esculturas más impactantes del jardín. El joven rumano talló una esfera perfecta —la Tierra— y luego la partió con un corte transversal limpio. Esa incisión es la intervención del hombre: precisa, fría, irreversible si no actuamos a tiempo. La perfección rota. Un aviso tallado en mármol de Carrara.

Toni Capó — Mallorca.
El mallorquín trabajó por primera vez en mármol para este simposio, y eligió un tema que conoce bien: la fragilidad del ser humano frente a la dureza de la naturaleza. Su escultura figurativa evoca la forma de las rocas abruptas de la cara norte de la isla, esa costa castigada sin piedad por la tramontana. El hombre tallado en la roca, resistiendo el viento. O intentándolo.

Filippo Tincolini — Italia.
Filippo utiliza el cuerpo humano como vehículo conceptual. Su obra representa un pubis femenino y habla de fertilidad, del origen de toda vida. Es una pieza directa, sin metáforas intermedias: la vida nace del cuerpo, y el cuerpo nace de la tierra. El ciclo cerrado.

Cada una de estas diez piezas fue creada aquí, en esta finca, con mármol de Carrara traído expresamente para el simposio. Los artistas convivieron durante veinticinco días, durmieron aquí, comieron aquí, respiraron este aire. Y eso se nota: estas esculturas no son piezas de museo trasladadas; nacieron de esta tierra y para esta tierra.

Tómense el tiempo que necesiten. Cuando estén listos, sigan la espiral hacia el punto tres.`},

{id:'punto-3',num:'3',cat:'VIÑEDOS',nextLabel:'Quesería',
trans:`Acaban de recorrer un jardín que hoy es uno de los rincones más íntimos de Sant Patrici.
Años atrás, en tiempos de Xini y Fernando, el jardín dio vida a fiestas de vendimia, cenas bajo las estrellas, encuentros donde un pescador de Fornells podía sentarse junto a un embajador y nadie preguntaba de dónde venías, solo si querías quedarte.
Xini y Fernando entendieron algo que muy poca gente entiende: que un lugar solo cobra vida cuando lo llenas de personas. Y que la belleza, si no se comparte, no sirve de nada.

Aquí en los Viñedos, no hay esculturas ni jardines. Solo hileras de viñas bajo el sol. Parece sencillo. Pero estas cepas que ven son sobrevivientes. Y para entender por qué, necesitan conocer una historia que empieza hace más de dos mil años.

Los romanos ya hacían vino en Menorca. Esta isla, batida por la tramontana y acariciada por el Mediterráneo, resultó ser un lugar extraordinario para la vid. Durante siglos, el vino menorquín fue un secreto bien guardado. Hasta que llegaron los británicos.

En el siglo XVIII, Menorca pasó a manos del Imperio Británico, y con ellos llegó una sed insaciable. La Royal Navy necesitaba vino, los comerciantes querían vino, y la isla entera se transformó en un viñedo flotante. El puerto de Mahón exportaba millones de litros. Fue la edad de oro.

Y entonces, el desastre. A finales del siglo XIX, un insecto microscópico llamado filoxera cruzó el Atlántico escondido en unas cepas americanas y arrasó los viñedos de toda Europa. Menorca no se salvó. En pocos años, lo que había tardado siglos en crecer desapareció. Y el silencio se instaló en esta tierra durante más de un siglo.

No fue hasta el año 2000 cuando algunos valientes empezaron a plantar de nuevo. Y en 2002, Sant Patrici decidió sumarse a ese renacimiento. Plantaron entre dos y tres hectáreas de viñedos donde antes solo había campo vacío. En 2005 fundaron formalmente la bodega. Y en 2008 embotellaron su primer vino. Seis años de la cepa a la copa. Así de lenta es la paciencia cuando se hace bien.

Las variedades que ven aquí no fueron elegidas al azar.
Merlot, Cabernet Sauvignon y Syrah para los tintos.
Chardonnay, Moscatel y Prensal para los blancos.
Son uvas que aman las condiciones extremas: el sol brutal del verano menorquín, la tramontana que endurece la piel de la uva y concentra los sabores, y la brisa marina que aporta esa salinidad sutil que luego encontrarán en la copa.

Aquí todo es cuestión de equilibrio. El calor da azúcar, que se traduce en cuerpo y alcohol. El viento y el fresco nocturno conservan la acidez, que da frescura y elegancia. El resultado es un vino que solo puede nacer aquí. Un vino con denominación Vi de la Terra Illa de Menorca.

Miren las cepas un momento. Parecen modestas, casi frágiles. Pero bajo el suelo, sus raíces se extienden metros y metros buscando agua y minerales. Lo que no se ve es lo que importa. Como en tantas cosas.

Caminen hacia el punto cuatro. Vamos a entrar ahora en uno de los lugares más antiguos de esta finca: el lugar donde las manos convierten la leche en historia.`},

{id:'punto-4',num:'4',cat:'QUESERÍA',nextLabel:'Bodega',
trans:`Están en frente de nuestra quesería, y quiero que se preparen para algo. Si vinieran por la mañana, verían a través de los cristales un ritual que se repite aquí exactamente igual que hace doscientos años. Nuestros maestros queseros moldean cada pieza, una por una, con las manos. Sin moldes industriales. Sin atajos. Solo un paño de algodón —que llamamos «fogasser»—, un cordel —el «lligam»— y la presión de unas manos que saben exactamente cuánta fuerza aplicar.

Ese saber no se aprende en un libro. Se hereda. Se transmite de mano a mano, de gesto a gesto, durante más de treinta años de trayectoria en nuestro caso.

Déjenme explicarles cómo nace un queso en Sant Patrici, paso a paso.

Todo empieza con la leche. Leche fresca de vaca de nuestro entorno, del campo de Menorca. La calidad de esa leche lo determina todo: el pasto que comen las vacas, la brisa marina que impregna los campos, la tierra calcárea de Menorca. Todo eso ya está en la leche antes de que nosotros toquemos nada.

La leche se vierte en grandes cubas y se le añade cuajo natural. En unos cuarenta minutos, la leche se transforma: deja de ser líquida y se convierte en una masa gelatinosa, la cuajada.

Es un momento casi mágico, una metamorfosis silenciosa.

Entonces intervienen las manos. El maestro quesero corta la cuajada con un instrumento llamado lira, en trozos pequeños, para que suelte el suero. Luego recoge esa cuajada y la envuelve en el fogasser, el paño de algodón tradicional. Lo ata con el lligam, el cordel, y comienza el proceso de prensado. En la prensa, expulsa el suero restante, gracias a la presión que se ejerce con un peso de 4,6kg sobre la pieza.

¿Ven ese dibujo en la parte superior del queso, esa especie de grabado en relieve? Le llamamos «mamella». No es decoración: es la huella que deja el paño al atarse sobre la cuajada. Es la firma del método tradicional. Si un queso tiene mamella, pueden estar seguros de que unas manos humanas lo formaron.

Después viene el baño en salmuera. El queso se sumerge en una solución de agua y sal durante horas. La sal penetra lentamente, actúa como conservante natural y empieza a definir el sabor. Y a partir de ahí, el queso entra en la fase más misteriosa: la maduración. En cámaras con temperatura y humedad controladas, el tiempo hace su trabajo. Semanas, meses, a veces más de un año.

El queso Mahón-Menorca tiene Denominación de Origen Protegida, lo que significa que solo puede elaborarse en esta isla, con leche de vaca del campo menorquin, siguiendo un método específico y unas normativas muy estrictas.

Es uno de los quesos más antiguos de España —se han encontrado restos de utensilios queseros en yacimientos prehistóricos de Menorca—. Estamos hablando de un oficio que tiene más de tres mil años.

Y en Sant Patrici, ese oficio se traduce en una familia de quesos con personalidades muy distintas.

Dentro de nuestra gama con Denominación de Origen, encontrarán tres edades. El Semicurado, con más de 3 meses de curación en cámara. Es nuestro queso más versátil y el que mejor representa la esencia de la D.O.P. Después viene el Curado, que ha pasado más tiempo en cámara, con más de 6 meses de curación. Es más firme, más intenso. Finalmente, el Añejo, con más de 1 año de maduración en cámara. Un queso que ha madurado pacientemente hasta desarrollar una profundidad de sabor extraordinaria: Quebradizo y potente.

Nuestro Queso fresco, es elaborado de la misma forma tradicional. Sin embargo, se usa leche pasteurizada, sin añadir aditivos ni conservantes. Es característico por tener un sabor muy suave y un color blanco intenso. Nuestra receta es un bien muy preciado, una receta heredada, que no van a encontrar en ninguna otra finca.

Pero la curiosidad de nuestros queseros no se detiene ahí. También elaboramos una línea gourmet, donde jugamos con hierbas y sabores aromáticos.

En nuestra tienda museo encontrarán utensilios que usaban nuestros queseros de otra época en Sant Patrici. Prensas de madera originales, los moldes, etc. Son objetos humildes, desgastados por el uso, pero son los testigos mudos de un oficio que nos negamos a dejar morir.

Caminen ahora hacia el punto cinco, donde encontraran nuestra bodega.`},

{id:'punto-5',num:'5',cat:'BODEGA',nextLabel:'Tienda Museo',
trans:`Noten el cambio al entrar aquí. La temperatura baja y la luz se atenúa.

Se encuentran en la bodega de Sant Patrici. Si la quesería era el lugar de las manos, este es el lugar de la paciencia.

Hacer vino es, en el fondo, una negociación con el tiempo. Y esa negociación empieza mucho antes de llegar aquí, en las viñas que acaban de ver.

Todo arranca con la vendimia. Hay un instante preciso —a veces cuestión de días— en el que la uva alcanza el equilibrio perfecto entre azúcar y acidez. Si te adelantas, el vino será delgado y sin cuerpo. Si te retrasas, perderá frescura y ganará un alcohol excesivo. En Menorca, donde el calor del verano acelera la maduración, ese margen es aún más estrecho. Hay que ser rápido y certero. Se recoge a primera hora de la mañana, con el frescor de la noche aún en la piel de la uva, para que llegue a la bodega en las mejores condiciones.

Una vez aquí dentro, la uva comienza su transformación. El primer paso es el despalillado: separar cada grano de la rama, el raspón, porque esa parte leñosa aportaría amargor y astringencia al vino. Se hace con cuidado, sin romper las pepitas, que también podrían dar sabores no deseados.

Después viene el estrujado, un prensado suave que libera el mosto —el jugo— sin machacar las pieles en exceso. En los vinos blancos, utilizamos Prensal, Chardonnay y Moscatel. En el que el mosto se separa rápidamente de las pieles para obtener un zumo limpio y delicado. En los tintos utilizamos Merlot, Cabernet Sauvignon, Syrah. El mosto fermenta en contacto con las pieles durante días, porque es ahí donde están el color, los taninos y gran parte del sabor.

Y aquí es donde Sant Patrici hace algo que nos distingue: fermentamos a temperatura muy baja, alrededor de catorce grados centígrados, bastante menos de lo habitual. ¿Por qué? Porque una fermentación lenta es como una conversación larga: extrae matices que una fermentación rápida nunca descubriría. Las levaduras trabajan despacio, sin estrés, y producen aromas más finos, más complejos. Las notas florales, la fruta elegante, esa sensación de frescura en boca: todo eso necesita tiempo y frío.

Durante la fermentación, el azúcar de la uva se transforma en alcohol y dióxido de carbono. Es un proceso natural, ancestral, que el ser humano descubrió hace miles de años y que en esencia no ha cambiado: la uva quiere convertirse en vino. Nosotros solo la acompañamos.

Terminada la fermentación, viene el reposo. Miren a su alrededor: en esas cubas que ven, el vino duerme durante meses. Pero no es un sueño pasivo. El vino respira, una cantidad minúscula de oxígeno lo va transformando lentamente: suaviza los taninos —esa sensación de sequedad en la boca—, redondea el cuerpo, y deja notas nuevas que la uva sola nunca habría dado.

El enólogo decide cuánto tiempo descansa cada vino, como un director de orquesta que asigna a cada instrumento su momento.

Después, el vino se clarifica y se filtra 2 o 3 veces, con unos filtros muy finos.

Una vez filtrado y clarificado, solo nos falta embotellar, en botella de cristal. Donde el vino, sigue evolucionando en silencio y en oscuridad, afinando sus aromas, integrando sus sabores, hasta que alguien lo descorcha y completa el ciclo.

Todos nuestros vinos llevan el sello «Vi de la Terra Illa de Menorca», la certificación que garantiza que nacieron de estas viñas, bajo este sol y este viento, y que fueron elaborados íntegramente en la isla.

Desde las cepas que han visto fuera hasta la copa que van a degustar en unos minutos, habrán pasado meses. Cada botella de Sant Patrici es tiempo condensado. Tiempo de sol, de viento, de manos, de espera.`},

{id:'punto-6',num:'6',cat:'TIENDA MUSEO',nextLabel:null,
trans:`Y ahora sí: ha llegado el momento de dejar de escuchar y empezar a saborear. Diríjanse a la nuestra tienda museo, donde les espera un maridaje de nuestros quesos y nuestros vinos. No tengan prisa. Dejen que el vino limpie el paladar, que la grasa del queso abrace la acidez. Busquen los sabores que les he ido describiendo. Porque todo lo que han escuchado hoy —la historia de Fernando y Xini, la espiral del jardín, las vides que sobrevivieron a la filoxera, las manos del quesero, el reposo del vino— todo eso está, de alguna forma, en lo que van a probar.

Disfruten. Este momento es suyo.`}
],

en:[
{id:'punto-1',num:'1',cat:'MAIN BUILDING',title:'The house that forbidden love built',nextLabel:'Sculpture Garden',
trans:`Pause for a moment in front of this façade. Notice the thickness of these walls: more than a metre of marès sandstone, the very same stone laid here back in 1918. And look at the proportions: the square floor plan, the symmetry, that grand entrance staircase. This is no Menorcan country farmhouse. Whoever commissioned it wanted an Italian-style villa, like the ones he'd seen on his travels. It looks peaceful, doesn't it? Pale stone, bougainvillea, that Menorcan light that softens everything it touches. But this house keeps a secret. Because it wasn't commissioned by a nobleman, nor was it built to house a family. This house was built by a forbidden love.

To understand the story, we have to travel first to Madrid at the turn of the twentieth century. Picture Fernando Vives: born in Mahón in 1867, son of the Menorcan upper middle class, but settled in the capital, where he had built up a small empire. He owned "La Mahonesa," a celebrated chain of pastry shops that brought the sweets of Menorca to the salons of Madrid. He was a collector of antiques and passionate about Arab art. His own brother, Antonio, would go on to become one of the most important numismatists in Spain, declared an Illustrious Son of Mahón. The Vives family carried weight. And Fernando was married to Francisca Segura —Paca, as everyone called her— a woman who came from the world of theatre and zarzuela.

But Madrid weighed on him. Fernando missed the island, the calm, the scent of the countryside. And in 1917, he bought this estate looking for a refuge where he could breathe far from the noise of the capital. The problem was that Paca, used to Madrid life, had absolutely no interest in all that Menorcan tranquillity. Fernando came on his own. And since in those days a man didn't look after his own household, he hired a young woman to help him.

Her name was Virginia López Álvarez, though the whole world would come to know her as Xini. She had arrived from Valladolid, the daughter of a humble and enormous family —her mother bore twenty children, eighteen of whom survived. Xini was already working for Fernando in Madrid, at the pastry shop. Now he brought her to Menorca to take charge of the house.

What happened next was perhaps inevitable. Fernando came over more and more often. He stayed longer each time. Until he stopped leaving altogether. He had fallen in love with Xini. When Paca found out, she walked out of the estate and went to live in Mahón. And this house, the one in front of you now, became the home of Fernando and Xini.

He filled it with everything she deserved: marble statues of the four seasons in the garden, red velvet curtains, a bed with gilded bars dressed in silk sheets. Fernando, an amateur painter, would paint her portrait on the porch while the breeze drifted in through those very windows you see now. To give you an idea of who Xini was: they say she would walk from this estate all the way to the village with a tray of pastissets balanced on her head, standing tall as a queen, in all her jewels and her heels —yes, heels on a dirt track. In Ferreries they called her Gilda, like the film star. She was that kind of woman.

They lived their golden age here. Isolated, yes. But free.

Until Fernando died, in January 1941. He was 73.

And then, silence. Imagine this house without his voice, without his parties, without the smell of the pastries he used to bake. Three months before he died, knowing what was coming, Fernando had done the only thing he could: he split his life in two. The house and the garden he signed over to Xini while he was still alive. Everything else —the pastry shops, the properties in Mahón, the money— went to Paca, his lawful wife.

Overnight, Xini was left with the walls, but nothing inside them. She let the gardener go. She bought hens, pigs, a couple of dairy cows. And where once there had been marble and music, animals began to appear everywhere. The cows scratched themselves against the statues of the four seasons. The pigs slept where people used to dance. Xini learned to milk, to mow, to make cheese —a white, salty cheese that she sold to the shops in Ferreries. Poverty drove her to steal vegetables from the neighbouring farms just to survive. But she never once stopped walking tall. And always in heels: in the end, with her hands ruined by work, she could no longer put them on by herself. She would walk barefoot to the house of her friend Rafela, carrying her shoes in a bag, and ask her to help her slip them on. Always in heels.

She held out here alone for twenty-five years. Never giving up. Never leaving. As if walking away would have been a betrayal of Fernando's memory.

She died in October 1966, at the age of 69. Her friends found her in the kitchen, sitting in a chair, her head resting on the table. On her grave, in the cemetery of Mahón, there is no headstone bearing her name.

Her siblings came over from the mainland, sold what little was worth selling, and burned the rest. Literally. They piled up mattresses, portraits, paintings, letters, rugs, furniture —a whole life— in the courtyard, and set fire to it. Ash and silence closed the story of Fernando and Xini.

But the land remembers.

Over the years, this estate passed from hand to hand until someone saw in it what Fernando had seen in 1917: not a business, but a possibility. What you see around you today —the hotel, the cheese dairy, the winery, the vineyards— is an act of resurrection. It is proof that a place that once knew love, decay and abandonment can be reborn and bear fruit. Fruit that today, quite literally, you are about to taste.

Now walk to your left, where you'll find the signpost for stop number two. A garden that speaks in silence awaits you.`},

{id:'punto-2',num:'2',cat:'SCULPTURE GARDEN',title:'Ten voices in the spiral',nextLabel:'The Sculptures One by One',
trans:`You have just heard a story of fire. Xini's siblings burned everything there was on this estate: the paintings, the letters, the furniture, the memory. And for years, there was nothing here. Just silent earth.

What you see in front of you now is the answer.

Before you look at the sculptures, I'd ask you to look at the ground. Notice the shape of the path you are about to walk. Do you see it? It's a spiral. It isn't decoration: it's a deliberate choice. This garden, which covers more than ten thousand square metres, was designed by the landscape architect Josep Bosch Espelta, a disciple of the great Nicolau Maria Rubió i Tudurí. And Bosch chose the spiral because it is the shape that life itself takes. It is found in galaxies, in the shells of snails, in the double helix of DNA. If the layout reminds you of something, it's probably the Guggenheim Museum in New York: the design of this garden is directly inspired by Frank Lloyd Wright's helical ramp. As you walk along this path, you will be tracing that very same idea: humanity's passage across the Earth.

What took place here to fill this space with voices was something extraordinary. In May 2003, Menorca was celebrating ten years as a Biosphere Reserve, and to mark the occasion the First International Hort Sant Patrici Symposium was organised. For twenty-five days, fourteen artists from all over the world —a Paraguayan woman, an Italian man, a Korean woman, an Egyptian, a Romanian, a Haitian living in Belgium...— lived together on this estate. They ate together, argued together, worked the stone together. And out of that shared life came ten sculptures carved in Carrara marble. Ten different answers to a single question: what is the relationship between human beings and nature?

As you wander around, you will come across them one by one. You will see the fountain by Nélida Mendoza, the Paraguayan artist, who used water as a living material: water falls onto stone and slowly shapes it, just as time shapes the Earth. It is the only piece that is not here in the garden; you'll find it beside the lake, because its message needed a different setting.

You will find the Balance by Giacomo Santini, a very young Italian sculptor who wanted to remind us that the balance between humankind and nature is fragile. The hands you will see on the piece are real: they are casts taken from the hands of children who came during the symposium.

And you will see The Earth by George Dan Istrate, the Romanian sculptor: a perfect sphere cut cleanly in two. That cut is the intervention of man. If we don't change course, the fracture will be irreversible.

And so, sculpture by sculpture, this garden will speak to you. Listen to it. Each piece is a love letter —or a warning— to the island that welcomes us.

Take your time. When you're ready, follow the spiral towards stop three, where the memory of this land turns to liquid. And if you'd like to get to know each sculpture in detail, stay with me: we're going to walk through the ten voices of this garden, one by one.`},

{id:'punto-2b',num:'2b',cat:'THE SCULPTURES ONE BY ONE',title:'Marble with a name',nextLabel:'The Vineyards',
trans:`Nélida Mendoza — Paraguay.
We begin with the one that isn't here. Nélida's work stands by the hotel's lake, and there is a powerful reason for that: her raw material is not only stone, but water. Nélida uses water as a living element that transforms the sculpture as time passes. The water slowly shapes a fountain representing the Earth. It is a work that changes, that ages, that breathes. That's why it needed to be where the water is in charge.

Giacomo Santini — Italy.
Giacomo was barely more than a boy when he arrived at the symposium, but his message was that of a wise man. His "Balance" speaks to us of the fragile equilibrium between the force of nature and that of humankind. The hands you see in the piece are not invented: they are real casts of the hands of children who took part during those twenty-five days. Innocence holding up the weight of the world.

Oliviero Bertolasso — Italy and Germany.
The Italian-German artist chose the human figure to deliver an uncomfortable message. His work is figurative and deliberately pessimistic: it confronts us with the future of nature and with the responsibility we bear for its preservation. It is not a sculpture that tries to please; it sets out to unsettle. And that is where its strength lies.

Shin Myong-Ok — Korea.
The Korean artist takes us into spiritual territory. Her sculpture evokes the laying on of hands, that universal gesture which, depending on the culture, can mean healing or destruction, blessing or curse. The forms you see suggest open hands hovering over nature. The question she leaves hanging in the air is a powerful one: are we healing the Earth, or are we making it sick?

Tristán Casamajor — Haiti, based in Belgium.
Tristán created an enormous totem that plays with the elements and puts the sun centre stage. It is, quite literally, a sundial: the natural evolution of the Earth marked by light. If you look closely at the shapes of the totem, you'll discover silhouettes that recall the human body. The time of nature and the time of man, melting together in the same stone.

Said Badr — Egypt.
The Egyptian artist conceived a vertical, almost monumental, work devoted to celebrating the magnitude of nature in Menorca. The verticality is no accident: it is the earth rising up, standing tall, asserting itself in the face of a human being who tends to look only straight ahead. Said asks us to look upwards.

George Dan Istrate — Romania.
This is one of the most striking sculptures in the garden. The young Romanian carved a perfect sphere —the Earth— and then split it with a clean, transverse cut. That incision is the intervention of man: precise, cold, irreversible if we don't act in time. Perfection broken. A warning carved in Carrara marble.

Toni Capó — Mallorca.
The Mallorcan artist worked in marble for the first time at this symposium, and he chose a subject he knows well: the fragility of human beings in the face of the harshness of nature. His figurative sculpture evokes the shape of the rugged rocks on the island's northern coast, that shoreline mercilessly battered by the tramontana wind. Man carved out of the rock, standing up to the wind. Or trying to.

Filippo Tincolini — Italy.
Filippo uses the human body as a conceptual vehicle. His work depicts a female pubis and speaks of fertility, of the origin of all life. It is a direct piece, with no metaphors getting in the way: life is born of the body, and the body is born of the earth. The cycle is complete.

Every one of these ten pieces was created here, on this estate, with Carrara marble brought over especially for the symposium. The artists lived together for twenty-five days, slept here, ate here, breathed this air. And it shows: these sculptures are not museum pieces that have been relocated; they were born of this land and for this land.

Take as much time as you need. When you're ready, follow the spiral towards stop three.`},

{id:'punto-3',num:'3',cat:'THE VINEYARDS',title:'Vines that survived the silence',nextLabel:'Cheese Dairy',
trans:`You have just walked through a garden that is today one of the most intimate corners of Sant Patrici.
Years ago, in the days of Xini and Fernando, this garden was the stage for harvest celebrations, dinners under the stars, gatherings where a fisherman from Fornells could sit next to an ambassador and no one asked where you came from, only whether you wanted to stay.
Xini and Fernando understood something that very few people understand: that a place only truly comes alive when you fill it with people. And that beauty, if it isn't shared, is no use to anyone.

Here in the vineyards, there are no sculptures and no gardens. Just rows of vines under the sun. It looks simple. But these vines you see are survivors. And to understand why, you need to hear a story that begins more than two thousand years ago.

The Romans were already making wine in Menorca. This island, battered by the tramontana and caressed by the Mediterranean, turned out to be an extraordinary place for the vine. For centuries, Menorcan wine was a well-kept secret. Until the British arrived.

In the eighteenth century, Menorca passed into the hands of the British Empire, and with them came an insatiable thirst. The Royal Navy needed wine, the merchants wanted wine, and the whole island turned into a floating vineyard. The port of Mahón was exporting millions of litres. It was the golden age.

And then, disaster. In the late nineteenth century, a microscopic insect called phylloxera crossed the Atlantic hidden on some American vines and laid waste to the vineyards of all Europe. Menorca was not spared. In just a few years, what had taken centuries to grow disappeared. And silence settled over this land for more than a hundred years.

It wasn't until the year 2000 that a few brave souls began to plant once again. And in 2002, Sant Patrici decided to join that rebirth. They planted between two and three hectares of vineyards where there had only been empty fields. In 2005 they formally founded the winery. And in 2008 they bottled their first wine. Six years from vine to glass. That's how slow patience is when it's done right.

The varieties you see here weren't chosen at random.
Merlot, Cabernet Sauvignon and Syrah for the reds.
Chardonnay, Moscatel and Prensal for the whites.
These are grapes that thrive in extreme conditions: the brutal sun of the Menorcan summer, the tramontana wind that toughens the skin of the grape and concentrates its flavours, and the sea breeze that lends that subtle salinity you'll later find in the glass.

Here, everything is a matter of balance. The heat brings sugar, which translates into body and alcohol. The wind and the cool of the night preserve the acidity, which brings freshness and elegance. The result is a wine that could only be born here. A wine bearing the Vi de la Terra Illa de Menorca designation.

Take a moment to look at the vines. They seem modest, almost fragile. But beneath the soil, their roots stretch out metre after metre in search of water and minerals. What you cannot see is what matters. As in so many things.

Walk on towards stop four. We are now going to step into one of the oldest places on this estate: the place where human hands turn milk into history.`},

{id:'punto-4',num:'4',cat:'CHEESE DAIRY',title:'Where hands shape time',nextLabel:'Winery',
trans:`You are standing in front of our cheese dairy, and I want you to brace yourselves for something. If you came by in the morning, through the glass you would see a ritual that is repeated here in exactly the same way as it was two hundred years ago. Our master cheesemakers shape each piece, one by one, by hand. No industrial moulds. No shortcuts. Just a cotton cloth —which we call the "fogasser"—, a cord —the "lligam"— and the pressure of hands that know exactly how much force to apply.

That knowledge isn't learned from a book. It's inherited. It's passed down hand to hand, gesture to gesture, over more than thirty years of experience in our case.

Let me walk you through how a cheese is born at Sant Patrici, step by step.

It all begins with the milk. Fresh cow's milk from our local surroundings, from the Menorcan countryside.
The quality of that milk determines everything: the pasture the cows graze on, the sea breeze that soaks the fields, the limestone soil of Menorca. All of that is already in the milk before we lay a finger on anything.

The milk is poured into large vats and natural rennet is added. In about forty minutes, the milk transforms: it stops being liquid and becomes a gelatinous mass, the curd.

It is an almost magical moment, a silent metamorphosis.

Then the hands step in. The master cheesemaker cuts the curd with an instrument called a lyre, into small pieces, so that it releases the whey. He then gathers up that curd and wraps it in the fogasser, the traditional cotton cloth. He ties it with the lligam, the cord, and the pressing begins. In the press, the remaining whey is squeezed out under the weight of 4.6 kg applied to each piece.

Do you see that pattern on the top of the cheese, that kind of embossed imprint? We call it the "mamella." It isn't decoration: it's the mark left by the cloth as it's tied around the curd. It is the signature of the traditional method. If a cheese has a mamella, you can be sure that human hands shaped it.

Next comes the brine bath. The cheese is submerged in a solution of water and salt for several hours. The salt slowly penetrates, acting as a natural preservative and beginning to shape the flavour. And from that point on, the cheese enters its most mysterious phase: maturing. In chambers with controlled temperature and humidity, time does its work. Weeks, months, sometimes over a year.

Mahón-Menorca cheese has a Protected Designation of Origin, which means it can only be made on this island, with milk from cows of the Menorcan countryside, following a specific method and very strict regulations.

It is one of the oldest cheeses in Spain —remains of cheesemaking tools have been found at prehistoric sites on Menorca. We are talking about a craft that is more than three thousand years old.

And at Sant Patrici, that craft translates into a family of cheeses with very different personalities.

Within our D.O.P. range, you'll find three ages. The Semi-cured, aged for more than 3 months in the chamber. It is our most versatile cheese and the one that best represents the essence of the D.O.P.
Then comes the Cured, which has spent longer in the chamber, more than 6 months of ageing. It is firmer, more intense.
And finally, the Aged, matured for more than a year in the chamber. A cheese that has ripened patiently until it has developed an extraordinary depth of flavour: crumbly and powerful.

Our Fresh cheese is made in the same traditional way. However, we use pasteurised milk, without adding any additives or preservatives. It is characterised by a very mild flavour and a deep white colour.
Our recipe is a treasured possession, an inherited recipe that you won't find on any other estate.

But our cheesemakers' curiosity doesn't stop there. We also produce a gourmet line, where we play with herbs and aromatic flavours.

In our shop-museum you'll find utensils used by the cheesemakers of another era at Sant Patrici. Original wooden presses, moulds, and so on.
They are humble objects, worn down by use, but they are the silent witnesses of a craft we refuse to let die.

Now walk on towards stop five, where you'll find our winery.`},

{id:'punto-5',num:'5',cat:'WINERY',title:'Where silence creates',nextLabel:'Museum Shop',
trans:`Notice the change as you step inside. The temperature drops and the light softens.

You are in the Sant Patrici winery.
If the cheese dairy was the place of hands, this is the place of patience.

Making wine is, essentially, a negotiation with time. And that negotiation begins long before you get here, out in the vineyards you have just seen.

It all starts with the harvest. There is a precise moment —sometimes a matter of days— when the grape reaches the perfect balance between sugar and acidity. If you pick too early, the wine will be thin and bodyless. If you leave it too late, it will lose freshness and gain excess alcohol. In Menorca, where the summer heat speeds up ripening, that window is even narrower. You have to be quick and precise. Harvesting is done first thing in the morning, with the coolness of the night still on the skin of the grape, so that it reaches the winery in the best possible condition.

Once inside, the grape begins its transformation. The first step is destemming: separating each berry from the stem, because that woody part would bring bitterness and astringency to the wine. It is done carefully, without breaking the pips, which could also give off unwanted flavours.

Next comes the crushing, a gentle pressing that releases the must —the juice— without overly crushing the skins.
For our white wines, we use Prensal, Chardonnay and Moscatel. In this case, the must is quickly separated from the skins to obtain a clean, delicate juice.
For the reds we use Merlot, Cabernet Sauvignon and Syrah. The must ferments in contact with the skins for several days, because that is where the colour, the tannins and much of the flavour lie.

And here is where Sant Patrici does something that sets us apart: we ferment at a very low temperature, around fourteen degrees Celsius, considerably below the norm. Why? Because a slow fermentation is like a long conversation: it draws out nuances that a quick fermentation would never uncover. The yeasts work slowly, without stress, and produce finer, more complex aromas. The floral notes, the elegant fruit, that sense of freshness on the palate: all of that takes time and cold.

During fermentation, the sugar in the grape is transformed into alcohol and carbon dioxide. It is a natural, ancestral process that human beings discovered thousands of years ago and which, in essence, has never changed: the grape wants to become wine. We simply accompany it on the way.

Once fermentation is over, the resting begins. Look around you: in those vats you can see, the wine sleeps for months. But it is not a passive sleep. The wine breathes; a tiny amount of oxygen slowly transforms it, softening the tannins —that sensation of dryness on the palate—, rounding out the body, and leaving new notes that the grape alone would never have given.

The oenologist decides how long each wine rests, like a conductor giving each instrument its moment.

After that, the wine is clarified and filtered 2 or 3 times, through very fine filters.

Once filtered and clarified, all that's left is to bottle it in glass. There, the wine goes on evolving in silence and in darkness, refining its aromas, integrating its flavours, until someone pulls the cork and completes the cycle.

All of our wines carry the "Vi de la Terra Illa de Menorca" seal, the certification that guarantees they were born of these vines, under this sun and this wind, and were produced entirely on the island.

From the vines you saw outside to the glass you are about to taste in a few minutes, months will have passed. Every bottle of Sant Patrici is time condensed. Time of sun, of wind, of hands, of waiting.`},

{id:'punto-6',num:'6',cat:'MUSEUM SHOP',title:'The moment to taste',nextLabel:null,
trans:`And now at last: the time has come to stop listening and start tasting. Make your way to our shop-museum, where a pairing of our cheeses and our wines awaits you. Don't rush. Let the wine cleanse the palate, let the fat of the cheese embrace the acidity. Look for the flavours I've been describing. Because everything you've heard today —the story of Fernando and Xini, the spiral of the garden, the vines that survived phylloxera, the hands of the cheesemaker, the resting of the wine— all of it is, in some way, in what you are about to taste.

Enjoy. This moment is yours.`}
],

cat:[
{id:'punto-1',num:'1',cat:'EDIFICI PRINCIPAL',title:'La casa que va construir l\'amor prohibit',nextLabel:'Jardí de les Escultures',
trans:`Atureu-vos un moment davant d'aquesta façana. Fixeu-vos en el gruix d'aquests murs: tenen més d'un metre de pedra de marès, la mateixa que es va col·locar aquí el 1918. I mireu-ne les proporcions: la planta quadrada, la simetria, aquella escalinata d'entrada. Això no és una casa de camp menorquina. Qui la va manar construir volia una vila a l'estil italià, com les que havia vist en els seus viatges. Sembla tranquil·la, oi? Pedra clara, buguenvíl·lees, aquella llum de Menorca que ho acarona tot. Però aquesta casa guarda un secret. Perquè no la va encarregar cap noble ni la van aixecar per a una família. Aquesta casa la va construir un amor prohibit.

Per entendre aquesta història cal viatjar primer al Madrid de principis del segle XX. Imagineu-vos en Fernando Vives: nascut a Maó el 1867, fill de l'alta burgesia menorquina, però establert a la capital, on havia aixecat un petit imperi. Era propietari de "La Mahonesa", unes pastisseries cèlebres que portaven els dolços de Menorca als salons de Madrid. Col·leccionista d'antiguitats, apassionat de l'art àrab. El seu propi germà, l'Antonio, va arribar a ser un dels numismàtics més importants d'Espanya, declarat Fill Il·lustre de Maó. Els Vives eren gent de pes. I en Fernando estava casat amb la Francisca Segura —la Paca, com tothom l'anomenava—, una dona que venia del món de l'espectacle i la sarsuela.

Però Madrid li pesava. En Fernando enyorava l'illa, la calma, la flaire del camp. I el 1917 va comprar aquesta finca buscant un refugi on respirar lluny del soroll de la capital. El problema va ser que a la Paca, acostumada a la vida madrilenya, aquella tranquil·litat menorquina no l'interessava gens ni mica. En Fernando venia sol. I com que en aquella època un home no es feia la casa, va contractar una jove perquè l'ajudés.

Es deia Virginia López Álvarez, tot i que tothom acabaria coneixent-la com a Xini. Havia arribat de Valladolid, filla d'una família humil i enorme —la seva mare va tenir vint fills, dels quals en van sobreviure divuit—. La Xini ja treballava per a en Fernando a Madrid, a la pastisseria. Ara la va portar a Menorca perquè s'encarregués de la casa.

El que va passar després era potser inevitable. En Fernando, cada vegada, venia més. S'hi quedava més temps. Fins que va deixar de marxar. S'havia enamorat de la Xini. La Paca, en assabentar-se'n, va abandonar la finca i se'n va anar a viure a Maó. I aquesta casa, la que teniu davant, es va convertir en la llar d'en Fernando i la Xini.

Ell la va omplir de tot allò que ella mereixia: estàtues de marbre de les quatre estacions al jardí, cortines de vellut vermell, un llit de barres daurades amb llençols de seda. En Fernando, pintor aficionat, la retratava al porxo mentre la brisa entrava per aquestes mateixes finestres que ara esteu veient. Perquè us feu una idea de qui era la Xini: expliquen que caminava des d'aquesta finca fins al poble amb una safata de pastissets ben equilibrada sobre el cap, dreta com una reina, amb les joies posades i els talons —sí, talons per un camí de terra—. A Ferreries l'anomenaven la Gilda, com l'actriu de cinema. Era aquella mena de dona.

Van viure aquí la seva edat daurada. Aïllats, sí. Però lliures.

Fins que en Fernando va morir, el gener de 1941. Tenia 73 anys.

I aleshores, el silenci. Imagineu-vos aquesta casa sense la seva veu, sense les seves festes, sense l'olor dels dolços que coïa al forn. Tres mesos abans de morir, sabent el que venia, en Fernando havia fet l'única cosa que podia: partir la seva vida en dos. La casa i el jardí els va cedir a la Xini, en vida. Tota la resta —les pastisseries, les propietats de Maó, els diners— va ser per a la Paca, la seva esposa legítima.

D'un dia per l'altre, la Xini es va quedar amb les parets, però sense res a dins. Va acomiadar el jardiner. Va comprar gallines, porcs, un parell de vaques lleteres. I on abans hi havia hagut marbre i música, van començar a aparèixer animals per tot arreu. Les vaques es gratejaven contra les estàtues de les quatre estacions. Els porcs dormien on abans s'hi ballava. La Xini va aprendre a munyir, a segar, a fer formatge —un formatge blanc i salat que venia a les botigues de Ferreries—. La pobresa la va empènyer a robar hortalisses de les finques veïnes per sobreviure. Però mai va deixar de caminar ben dreta. I sempre amb talons: al final, amb les mans destrossades per la feina, ja no se'ls podia calçar sola. Caminava descalça fins a casa de la seva amiga Rafela, amb les sabates dins una bossa, i li demanava que l'ajudés a posar-se-les. Sempre amb tacó.

Vint-i-cinc anys va resistir aquí tota sola. Sense rendir-se. Sense marxar. Com si anar-se'n fos trair la memòria d'en Fernando.

Va morir l'octubre de 1966, als 69 anys. La van trobar les seves amigues a la cuina, asseguda en una cadira, amb el cap sobre la taula. A la seva tomba, al cementiri de Maó, no hi ha cap làpida que recordi el seu nom.

Els seus germans van arribar de la península, van vendre el poc que tenia valor i van cremar la resta. Literalment. Van apilar matalassos, retrats, quadres, cartes, catifes, mobles —tota una vida— al pati, i hi van calar foc. Cendra i silenci van tancar la història d'en Fernando i la Xini.

Però la terra recorda.

Amb els anys, aquesta finca va anar canviant de mans fins que algú hi va veure el que en Fernando hi va veure el 1917: no pas un negoci, sinó una possibilitat. El que avui veieu al vostre voltant —l'hotel, la formatgeria, el celler, les vinyes— és un acte de resurrecció. És la prova que un lloc que ha conegut l'amor, la decadència i l'abandonament pot renéixer i donar fruits. Fruits que avui, literalment, podreu assaborir.

Camineu ara cap a l'esquerra, on veureu la senyalització del punt número dos. Us espera un jardí que parla en silenci`},

{id:'punto-2',num:'2',cat:'JARDÍ DE LES ESCULTURES',title:'Deu veus a l\'espiral',nextLabel:'Les Escultures una a una',
trans:`Acabeu d'escoltar una història de foc. Els germans de la Xini van cremar tot el que hi havia en aquesta finca: els quadres, les cartes, els mobles, la memòria. I durant anys, aquí no hi va haver res. Només terra callada.

El que ara teniu davant és la resposta.

Abans de mirar les escultures, us demano que mireu a terra. Fixeu-vos en la forma del camí que recorrereu. La veieu? És una espiral. No és decoració: és una decisió. Aquest jardí, que ocupa més de deu mil metres quadrats, va ser dissenyat pel paisatgista Josep Bosch Espelta, deixeble del gran Nicolau Maria Rubió i Tudurí. I en Bosch va triar l'espiral perquè és la forma que adopta la vida. És a les galàxies, a les petxines dels cargols, a la doble hèlix de l'ADN. Si el traçat us recorda alguna cosa, probablement sigui el Museu Guggenheim de Nova York: el disseny d'aquest jardí està inspirat directament en la rampa helicoïdal de Frank Lloyd Wright. Vosaltres, en caminar per aquest sender, recorrereu aquesta mateixa idea: el pas de l'ésser humà per la Terra.

El que va passar aquí per omplir-lo de veus va ser extraordinari. El maig de 2003, Menorca feia deu anys com a Reserva de la Biosfera, i per celebrar-ho es va organitzar el Primer Simposi Internacional Hort Sant Patrici. Durant vint-i-cinc dies, catorze artistes d'arreu del món —una paraguaiana, un italià, una coreana, un egipci, un romanès, un haitià establert a Bèlgica...— van conviure en aquesta finca. Van menjar plegats, van discutir plegats, van treballar la pedra plegats. I d'aquella convivència van néixer deu escultures tallades en marbre de Carrara. Deu respostes diferents a una mateixa pregunta: quina és la relació de l'ésser humà amb la natura?

Mentre passegeu, les anireu trobant. Veureu la font de la Nélida Mendoza, l'artista paraguaiana, que va fer servir l'aigua com a matèria viva: l'aigua cau sobre la pedra i la va modelant lentament, igual que el temps modela la Terra. És l'única peça que no és aquí al jardí; la trobareu al costat del llac, perquè el seu missatge necessitava un altre escenari.

Trobareu la Balança d'en Giacomo Santini, un jovencíssim escultor italià que va voler recordar-nos que l'equilibri entre l'home i la natura és fràgil. Les mans que veureu a la peça són reals: són motlles de les mans de nens que van venir durant el simposi.

I veureu la Terra d'en George Dan Istrate, l'escultor romanès: una esfera perfecta partida per un tall net. És la intervenció de l'home. Si no canviem de rumb, la fractura serà irreversible.

Així, escultura rere escultura, aquest jardí us anirà parlant. Escolteu-lo. Cada peça és una carta d'amor —o d'advertència— a l'illa que ens acull.

Preneu-vos el vostre temps. Quan estigueu a punt, seguiu l'espiral cap al punt tres, on la memòria d'aquesta terra es fa líquida. I si voleu conèixer cada escultura amb detall, quedeu-vos: recorrerem les deu veus d'aquest jardí, una a una.`},

{id:'punto-2b',num:'2b',cat:'LES ESCULTURES UNA A UNA',title:'Marbre amb nom propi',nextLabel:'Vinyes',
trans:`Nélida Mendoza — Paraguai.
Comencem per la que no és aquí. L'obra de la Nélida es troba al llac de l'hotel, i hi ha una raó poderosa: la seva matèria primera no és només la pedra, sinó l'aigua. La Nélida utilitza l'aigua com un element viu que transforma l'escultura amb el pas del temps. L'aigua va donant forma lentament a una font que representa la Terra. És una obra que canvia, que envelleix, que respira. Per això necessitava ser on l'aigua mana.

Giacomo Santini — Itàlia.
En Giacomo era tot just un jove quan va arribar al simposi, però el seu missatge era el d'un savi. La seva «Balança» ens parla de l'equilibri fràgil entre la força de la natura i la de l'home. Les mans que veieu a la peça no són inventades: són motlles reals de les mans de nens que van participar durant aquells vint-i-cinc dies. La innocència sostenint el pes del món.

Oliviero Bertolasso — Itàlia i Alemanya.
L'italo-alemany va triar la figura humana per llançar un missatge incòmode. La seva obra és figurativa i deliberadament pessimista: ens confronta amb el futur de la natura i amb la responsabilitat que tenim en la seva conservació. No és una escultura que busqui agradar; busca incomodar. I aquí rau la seva força.

Shin Myong-Ok — Corea.
L'artista coreana ens porta al terreny espiritual. La seva escultura evoca la imposició de mans, aquell gest universal que, segons la cultura, pot significar curació o destrucció, benedicció o condemna. Les formes que veieu suggereixen mans obertes sobre la natura. La pregunta que deixa en l'aire és poderosa: estem guarint la Terra o l'estem fent emmalaltir?

Tristán Casamajor — Haití, resident a Bèlgica.
En Tristán va crear un enorme tòtem que juga amb els elements i utilitza el sol com a protagonista. És, literalment, un rellotge de sol: l'evolució natural de la Terra marcada per la llum. Si us fixeu en les formes del tòtem, hi descobrireu siluetes que recorden el cos humà. El temps de la natura i el temps de l'home, fonent-se en la mateixa pedra.

Said Badr — Egipte.
L'egipci va concebre una obra vertical, gairebé monumental, dedicada a enaltir la magnitud de la natura a Menorca. La verticalitat no és casual: és la terra que s'alça, que s'aixeca, que reclama la seva presència davant d'un ésser humà que tendeix a mirar només endavant. En Said ens demana que mirem cap amunt.

George Dan Istrate — Romania.
Aquesta és una de les escultures més impactants del jardí. El jove romanès va tallar una esfera perfecta —la Terra— i després la va partir amb un tall transversal net. Aquella incisió és la intervenció de l'home: precisa, freda, irreversible si no actuem a temps. La perfecció trencada. Un advertiment tallat en marbre de Carrara.

Toni Capó — Mallorca.
El mallorquí va treballar per primera vegada en marbre per a aquest simposi, i va triar un tema que coneix bé: la fragilitat de l'ésser humà davant de la duresa de la natura. La seva escultura figurativa evoca la forma de les roques abruptes de la cara nord de l'illa, aquella costa castigada sense pietat per la tramuntana. L'home tallat a la roca, resistint el vent. O intentant-ho.

Filippo Tincolini — Itàlia.
En Filippo utilitza el cos humà com a vehicle conceptual. La seva obra representa un pubis femení i parla de la fertilitat, de l'origen de tota vida. És una peça directa, sense metàfores pel mig: la vida neix del cos, i el cos neix de la terra. El cicle tancat.

Cadascuna d'aquestes deu peces va ser creada aquí, en aquesta finca, amb marbre de Carrara dut expressament per al simposi. Els artistes van conviure durant vint-i-cinc dies, van dormir aquí, van menjar aquí, van respirar aquest aire. I es nota: aquestes escultures no són peces de museu traslladades; van néixer d'aquesta terra i per a aquesta terra.

Preneu-vos el temps que necessiteu. Quan estigueu a punt, seguiu l'espiral cap al punt tres.`},

{id:'punto-3',num:'3',cat:'VINYES',title:'Ceps que van sobreviure al silenci',nextLabel:'Formatgeria',
trans:`Acabeu de recórrer un jardí que avui és un dels racons més íntims de Sant Patrici.
Anys enrere, en temps de la Xini i en Fernando, el jardí va donar vida a festes de verema, sopars sota les estrelles, trobades on un pescador de Fornells podia seure al costat d'un ambaixador i ningú no preguntava d'on venies, només si et volies quedar.
La Xini i en Fernando van entendre una cosa que molt poca gent entén: que un lloc només pren vida quan l'omples de persones. I que la bellesa, si no es comparteix, no serveix de res.

Aquí, a les vinyes, no hi ha escultures ni jardins. Només filades de ceps sota el sol. Sembla senzill. Però aquests ceps que veieu són supervivents. I per entendre per què, cal que conegueu una història que comença fa més de dos mil anys.

Els romans ja feien vi a Menorca. Aquesta illa, batuda per la tramuntana i acaronada pel Mediterrani, va resultar ser un lloc extraordinari per a la vinya. Durant segles, el vi menorquí va ser un secret ben guardat. Fins que van arribar els britànics.

Al segle XVIII, Menorca va passar a mans de l'Imperi Britànic, i amb ells va arribar una set insaciable. La Royal Navy necessitava vi, els comerciants volien vi, i l'illa sencera es va transformar en una vinya flotant. El port de Maó n'exportava milions de litres. Va ser l'edat d'or.

I aleshores, el desastre. A finals del segle XIX, un insecte microscòpic anomenat fil·loxera va travessar l'Atlàntic amagat en uns ceps americans i va arrasar les vinyes de tota Europa. Menorca no se'n va salvar. En pocs anys, el que havia trigat segles a créixer va desaparèixer. I el silenci es va instal·lar en aquesta terra durant més d'un segle.

No va ser fins a l'any 2000 que alguns valents van començar a plantar de nou. I el 2002, Sant Patrici va decidir sumar-se a aquell renaixement. Van plantar entre dues i tres hectàrees de vinyes on abans només hi havia camp buit. El 2005 van fundar formalment el celler. I el 2008 van embotellar el primer vi. Sis anys del cep a la copa. Així de lenta és la paciència quan es fa ben feta.

Les varietats que veieu aquí no van ser triades a l'atzar.
Merlot, Cabernet Sauvignon i Syrah per als negres.
Chardonnay, Moscatell i Prensal per als blancs.
Són raïms que estimen les condicions extremes: el sol brutal de l'estiu menorquí, la tramuntana que endureix la pell del raïm i concentra els sabors, i la brisa marina que aporta aquella salinitat subtil que després trobareu a la copa.

Aquí tot és qüestió d'equilibri. La calor dona sucre, que es tradueix en cos i alcohol. El vent i la frescor nocturna conserven l'acidesa, que aporta frescor i elegància. El resultat és un vi que només pot néixer aquí. Un vi amb denominació Vi de la Terra Illa de Menorca.

Mireu els ceps un moment. Semblen modestos, gairebé fràgils. Però sota terra, les seves arrels s'estenen metres i metres buscant aigua i minerals. El que no es veu és el que importa. Com en tantes coses.

Camineu cap al punt quatre. Entrarem ara en un dels llocs més antics d'aquesta finca: el lloc on les mans converteixen la llet en història.`},

{id:'punto-4',num:'4',cat:'FORMATGERIA',title:'On les mans modelen el temps',nextLabel:'Celler',
trans:`Sou davant de la nostra formatgeria, i vull que us prepareu per a una cosa. Si venguéssiu al matí, veuríeu a través dels vidres un ritual que es repeteix aquí exactament igual que fa dos-cents anys. Els nostres mestres formatgers modelen cada peça, una per una, amb les mans. Sense motlles industrials. Sense dreceres. Només un drap de cotó —que anomenem «fogasser»—, un cordill —el «lligam»— i la pressió d'unes mans que saben exactament quanta força cal aplicar.

Aquell saber no s'aprèn en cap llibre. S'hereta. Es transmet de mà en mà, de gest en gest, durant més de trenta anys de trajectòria en el nostre cas.

Deixeu-me explicar-vos com neix un formatge a Sant Patrici, pas a pas.

Tot comença amb la llet. Llet fresca de vaca del nostre entorn, del camp de Menorca.
La qualitat d'aquesta llet ho determina tot: la pastura que mengen les vaques, la brisa marina que impregna els camps, la terra calcària de Menorca. Tot això ja és a la llet abans que nosaltres toquem res.

La llet s'aboca en grans cubes i s'hi afegeix quall natural. En uns quaranta minuts, la llet es transforma: deixa de ser líquida i es converteix en una massa gelatinosa, la quallada.

És un moment gairebé màgic, una metamorfosi silenciosa.

Llavors intervenen les mans. El mestre formatger talla la quallada amb un instrument anomenat lira, a trossos petits, perquè deixi anar el xerigot. Després recull aquella quallada i l'embolica amb el fogasser, el drap de cotó tradicional. L'estreny amb el lligam, el cordill, i comença el procés de premsat. A la premsa, s'expulsa el xerigot restant, gràcies a la pressió que s'exerceix amb un pes de 4,6 kg sobre la peça.

Veieu aquell dibuix a la part de dalt del formatge, aquella mena de gravat en relleu? En diem «mamella». No és decoració: és l'empremta que deixa el drap en nuar-se sobre la quallada. És la signatura del mètode tradicional. Si un formatge té mamella, podeu estar segurs que unes mans humanes l'han format.

Després ve el bany en salmorra. El formatge es submergeix en una solució d'aigua i sal durant hores. La sal penetra lentament, actua com a conservant natural i comença a definir-ne el sabor. I a partir d'aquí, el formatge entra en la fase més misteriosa: la maduració. En cambres amb temperatura i humitat controlades, el temps fa la seva feina. Setmanes, mesos, de vegades més d'un any.

El formatge Maó-Menorca té Denominació d'Origen Protegida, cosa que vol dir que només es pot elaborar en aquesta illa, amb llet de vaca del camp menorquí, seguint un mètode específic i una normativa molt estricta.

És un dels formatges més antics d'Espanya —s'han trobat restes d'estris formatgers en jaciments prehistòrics de Menorca—. Estem parlant d'un ofici que té més de tres mil anys.

I a Sant Patrici, aquest ofici es tradueix en una família de formatges amb personalitats molt diferents.

Dins de la nostra gamma amb Denominació d'Origen, hi trobareu tres edats. El Semicurat, amb més de 3 mesos de curació en cambra. És el nostre formatge més versàtil i el que millor representa l'essència de la D.O.P.
Després ve el Curat, que ha passat més temps en cambra, amb més de 6 mesos de curació. És més ferm, més intens.
Finalment, l'Anyenc, amb més d'un any de maduració en cambra. Un formatge que ha madurat pacientment fins a desenvolupar una profunditat de sabor extraordinària: trencadís i potent.

El nostre formatge fresc s'elabora de la mateixa manera tradicional. Tanmateix, s'hi fa servir llet pasteuritzada, sense afegir-hi additius ni conservants. Es caracteritza per tenir un sabor molt suau i un color blanc intens.
La nostra recepta és un bé molt preuat, una recepta heretada, que no trobareu en cap altra finca.

Però la curiositat dels nostres formatgers no s'acaba aquí. També elaborem una línia gourmet, on juguem amb herbes i sabors aromàtics.

A la nostra botiga-museu hi trobareu estris que feien servir els nostres formatgers d'una altra època a Sant Patrici. Premses de fusta originals, els motlles, etc.
Són objectes humils, desgastats per l'ús, però són els testimonis muts d'un ofici que ens neguem a deixar morir.

Camineu ara cap al punt cinc, on hi trobareu el nostre celler.`},

{id:'punto-5',num:'5',cat:'CELLER',title:'On el silenci crea',nextLabel:'Botiga Museu',
trans:`Noteu el canvi en entrar aquí. La temperatura baixa i la llum s'atenua.

Us trobeu al celler de Sant Patrici.
Si la formatgeria era el lloc de les mans, aquest és el lloc de la paciència.

Fer vi és, en el fons, una negociació amb el temps. I aquesta negociació comença molt abans d'arribar aquí, a les vinyes que acabeu de veure.

Tot arrenca amb la verema. Hi ha un instant precís —de vegades qüestió de dies— en què el raïm assoleix l'equilibri perfecte entre sucre i acidesa. Si t'avances, el vi serà prim i sense cos. Si t'endarrereixes, perdrà frescor i guanyarà un alcohol excessiu. A Menorca, on la calor de l'estiu accelera la maduració, aquell marge és encara més estret. Cal ser ràpid i certer. Es recull a primera hora del matí, amb la frescor de la nit encara a la pell del raïm, perquè arribi al celler en les millors condicions.

Un cop aquí dins, el raïm comença la seva transformació. El primer pas és el desrapat: separar cada gra de la rama, el raspó, perquè aquella part llenyosa aportaria amargor i astringència al vi. Es fa amb cura, sense trencar els pinyols, que també podrien donar sabors no desitjats.

Després ve l'esclafat, un premsat suau que allibera el most —el suc— sense aixafar les pells en excés.
Als vins blancs, fem servir Prensal, Chardonnay i Moscatell. En aquest cas, el most se separa ràpidament de les pells per obtenir un suc net i delicat.
Als negres fem servir Merlot, Cabernet Sauvignon i Syrah. El most fermenta en contacte amb les pells durant dies, perquè és allà on hi ha el color, els tanins i gran part del sabor.

I aquí és on Sant Patrici fa una cosa que ens distingeix: fermentem a una temperatura molt baixa, al voltant dels catorze graus centígrads, força menys de l'habitual. Per què? Perquè una fermentació lenta és com una conversa llarga: extreu matisos que una fermentació ràpida no descobriria mai. Els llevats treballen a poc a poc, sense estrès, i produeixen aromes més fins, més complexos. Les notes florals, la fruita elegant, aquella sensació de frescor a la boca: tot això necessita temps i fred.

Durant la fermentació, el sucre del raïm es transforma en alcohol i diòxid de carboni. És un procés natural, ancestral, que l'ésser humà va descobrir fa milers d'anys i que en essència no ha canviat: el raïm es vol convertir en vi. Nosaltres només l'acompanyem.

Acabada la fermentació, ve el repòs. Mireu al vostre voltant: en aquelles cubes que veieu, el vi hi dorm durant mesos. Però no és un son passiu. El vi respira; una quantitat minúscula d'oxigen el va transformant lentament: suavitza els tanins —aquella sensació de sequedat a la boca—, arrodoneix el cos, i hi deixa notes noves que el raïm sol no hauria donat mai.

L'enòleg decideix quant de temps descansa cada vi, com un director d'orquestra que assigna a cada instrument el seu moment.

Després, el vi es clarifica i es filtra 2 o 3 vegades, amb uns filtres molt fins.

Un cop filtrat i clarificat, només ens falta embotellar-lo, en ampolla de vidre. Allà el vi continua evolucionant en silenci i en foscor, afinant els seus aromes, integrant els seus sabors, fins que algú el descorxa i completa el cicle.

Tots els nostres vins porten el segell «Vi de la Terra Illa de Menorca», la certificació que garanteix que han nascut d'aquestes vinyes, sota aquest sol i aquest vent, i que han estat elaborats íntegrament a l'illa.

Des dels ceps que heu vist a fora fins a la copa que tastareu d'aquí a uns minuts, hauran passat mesos. Cada ampolla de Sant Patrici és temps condensat. Temps de sol, de vent, de mans, d'espera.`},

{id:'punto-6',num:'6',cat:'BOTIGA MUSEU',title:'El moment d\'assaborir',nextLabel:null,
trans:`I ara sí: ha arribat el moment de deixar d'escoltar i començar a assaborir. Dirigiu-vos a la nostra botiga-museu, on us espera un maridatge dels nostres formatges i els nostres vins. No tingueu pressa. Deixeu que el vi netegi el paladar, que el greix del formatge abraci l'acidesa. Busqueu els sabors que us he anat descrivint. Perquè tot el que heu escoltat avui —la història d'en Fernando i la Xini, l'espiral del jardí, els ceps que van sobreviure a la fil·loxera, les mans del formatger, el repòs del vi— tot això és, d'alguna manera, en el que estareu a punt de tastar.

Gaudiu-ne. Aquest moment és vostre.`}
],

fr:[
{id:'punto-1',num:'1',cat:'BÂTIMENT PRINCIPAL',title:'La maison que l\'amour interdit a bâtie',nextLabel:'Jardin des Sculptures',
trans:`Arrêtez-vous un instant devant cette façade. Observez l'épaisseur de ces murs : plus d'un mètre de pierre de marès, la même qui fut posée ici en 1918. Et regardez ces proportions : le plan carré, la symétrie, ce perron d'entrée. Ce n'est pas une maison de campagne minorquine. Celui qui l'a fait construire voulait une villa à l'italienne, comme celles qu'il avait vues lors de ses voyages. Elle a l'air paisible, n'est-ce pas ? La pierre claire, les bougainvillées, cette lumière de Minorque qui caresse tout. Mais cette maison garde un secret. Car elle n'a été commandée par aucun noble, ni bâtie pour une famille. Cette maison, c'est un amour interdit qui l'a construite.

Pour comprendre cette histoire, il faut d'abord voyager dans le Madrid du début du XXᵉ siècle. Imaginez Fernando Vives : né à Mahón en 1867, fils de la haute bourgeoisie minorquine, mais établi dans la capitale, où il avait bâti un petit empire. Il était propriétaire de « La Mahonesa », des pâtisseries célèbres qui apportaient les douceurs de Minorque dans les salons de Madrid. Collectionneur d'antiquités, passionné d'art arabe. Son propre frère, Antonio, devint l'un des numismates les plus importants d'Espagne, déclaré Fils Illustre de Mahón. Les Vives étaient des gens de poids. Et Fernando était marié à Francisca Segura — Paca, comme tout le monde l'appelait —, une femme issue du monde du spectacle et de la zarzuela.

Mais Madrid lui pesait. Fernando avait la nostalgie de l'île, du calme, de l'odeur de la campagne. Et en 1917, il acheta ce domaine, cherchant un refuge où respirer loin du tumulte de la capitale. Le problème, c'est que Paca, habituée à la vie madrilène, n'éprouvait pas le moindre intérêt pour cette tranquillité minorquine. Fernando venait seul. Et comme à cette époque un homme ne s'occupait pas lui-même de la maison, il engagea une jeune femme pour l'aider.

Elle s'appelait Virginia López Álvarez, bien que tout le monde finisse par la connaître sous le nom de Xini. Elle était arrivée de Valladolid, fille d'une famille modeste et nombreuse — sa mère avait eu vingt enfants, dont dix-huit avaient survécu. Xini travaillait déjà pour Fernando à Madrid, à la pâtisserie. Il l'emmena alors à Minorque pour s'occuper de la maison.

Ce qui arriva ensuite était peut-être inévitable. Fernando venait de plus en plus souvent. Il restait de plus en plus longtemps. Jusqu'à ce qu'il cesse de repartir. Il était tombé amoureux de Xini. Paca, en l'apprenant, quitta le domaine et s'installa à Mahón. Et cette maison, celle qui se dresse devant vous, devint le foyer de Fernando et Xini.

Il la combla de tout ce qu'elle méritait : des statues de marbre représentant les quatre saisons dans le jardin, des rideaux de velours rouge, un lit aux barreaux dorés avec des draps de soie. Fernando, peintre amateur, la portraiturait sous le porche pendant que la brise entrait par ces mêmes fenêtres que vous contemplez aujourd'hui. Pour vous donner une idée de qui était Xini : on raconte qu'elle parcourait à pied le trajet de ce domaine jusqu'au village avec un plateau de pastissets en équilibre sur la tête, droite comme une reine, parée de ses bijoux et juchée sur ses talons — oui, des talons sur un chemin de terre. À Ferreries, on la surnommait la Gilda, comme l'actrice de cinéma. C'était ce genre de femme.

Ils vécurent ici leur âge d'or. Isolés, certes. Mais libres.

Jusqu'à la mort de Fernando, en janvier 1941. Il avait 73 ans.

Et alors, le silence. Imaginez cette maison sans sa voix, sans ses fêtes, sans l'odeur des douceurs qu'il y faisait cuire. Trois mois avant de mourir, sachant ce qui l'attendait, Fernando avait fait la seule chose qu'il pouvait faire : partager sa vie en deux. La maison et le jardin, il les céda à Xini, de son vivant. Tout le reste — les pâtisseries, les propriétés de Mahón, l'argent — revint à Paca, son épouse légitime.
